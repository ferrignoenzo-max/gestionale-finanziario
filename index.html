            let cum = 0;
            return (
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#f8fafc',color:T.textL,fontSize:10,textTransform:'uppercase'}}>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Num</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Data</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Scadenza</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Tipo</th>
                    <th style={{padding:'8px 12px',textAlign:'right'}}>Imponibile</th>
                    <th style={{padding:'8px 12px',textAlign:'right'}}>% Contr.</th>
                    <th style={{padding:'8px 12px',textAlign:'right'}}>% Cum.</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Stato</th>
                  </tr>
                </thead>
                <tbody>
                  {(()=>{
                    let salN = 0;
                    return fattureSALDyn.map(f=>{
                      const imp = _impOf(f);
                      const pct = c.importoContrattuale>0 ? (imp/c.importoContrattuale*100) : 0;
                      cum += pct;
                      const isAcc = f.tipoRifOverride==='Acconto' || /acconto/i.test(f.oggetto||'');
                      if(!isAcc) salN++;
                      const tipoLabel = isAcc ? '💰 Acconto' : `📊 ${salN}° SAL`;
                      const tipoColor = isAcc ? T.purple : T.blue;
                      return (
                        <tr key={f.id} style={{borderTop:`1px solid ${T.border}`}}>
                          <td style={{padding:'6px 12px',fontFamily:'monospace',fontWeight:600}}>{f.num}</td>
                          <td style={{padding:'6px 12px'}}>{fmtDate(f.data)}</td>
                          <td style={{padding:'6px 12px',color:f.stato==='Scaduta'?T.red:T.text}}>{fmtDate(f.scadenza)||'—'}</td>
                          <td style={{padding:'6px 12px',fontSize:11,fontWeight:700,color:tipoColor}}>{tipoLabel}</td>
                          <td style={{padding:'6px 12px',textAlign:'right',fontWeight:700}}>{fmt(imp)}</td>
                          <td style={{padding:'6px 12px',textAlign:'right',color:T.blue,fontWeight:600}}>{pct.toFixed(2)}%</td>
                          <td style={{padding:'6px 12px',textAlign:'right',color:T.green,fontWeight:700}}>{cum.toFixed(2)}%</td>
                          <td style={{padding:'6px 12px'}}><Badge text={f.stato}/></td>
                        </tr>
                      );
                    });
                  })()}
                </tbody>
              </table>
            );
          })()}
        </Card>
      )}

      {/* TENDINA EXTRA – ordini distinti raggruppati */}
      {expanded==='extra' && (
        <Card style={{marginBottom:18,padding:0,borderTop:`3px solid ${T.purple}`}}>
          <div style={{padding:'12px 16px',background:T.purpleL,borderBottom:`1px solid ${T.border}`,borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:700,fontSize:13,color:T.purple}}>🟣 Extra fatturati – {extraByOrdine.length} ordini · totale {fmt(totExtraDyn)}</div>
            <button onClick={()=>setExpanded(null)} style={{background:'none',border:'none',color:T.textL,cursor:'pointer',fontSize:14}}>✕</button>
          </div>
          {extraByOrdine.length===0 ? (
            <div style={{padding:24,textAlign:'center',color:T.textL}}>Nessun extra fatturato.</div>
          ) : extraByOrdine.map(grp=>(
            <div key={grp.ordine} style={{borderTop:`1px solid ${T.border}`}}>
              <div style={{padding:'10px 16px',background:'#fafbfc',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <span style={{fontFamily:'monospace',fontWeight:700,color:T.text}}>{grp.ordine}</span>
                  <span style={{marginLeft:10,fontSize:11,color:T.textL}}>{grp.fatture.length} {grp.fatture.length===1?'fattura':'fatture'}</span>
                </div>
                <div style={{fontWeight:800,color:T.purple}}>{fmt(grp.totale)}</div>
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#fff',color:T.textL,fontSize:10,textTransform:'uppercase'}}>
                    <th style={{padding:'6px 16px',textAlign:'left'}}>Num</th>
                    <th style={{padding:'6px 12px',textAlign:'left'}}>Data</th>
                    <th style={{padding:'6px 12px',textAlign:'right'}}>Imponibile</th>
                    <th style={{padding:'6px 12px',textAlign:'left'}}>Stato</th>
                    <th style={{padding:'6px 12px',textAlign:'left'}}>Oggetto</th>
                  </tr>
                </thead>
                <tbody>
                  {grp.fatture.sort((a,b)=>(a.data||'').localeCompare(b.data||'')).map(f=>(
                    <tr key={f.id} style={{borderTop:`1px solid ${T.border}`}}>
                      <td style={{padding:'5px 16px',fontFamily:'monospace',fontWeight:600}}>{f.num}</td>
                      <td style={{padding:'5px 12px'}}>{fmtDate(f.data)}</td>
                      <td style={{padding:'5px 12px',textAlign:'right',fontWeight:600}}>{fmt(_impOf(f))}</td>
                      <td style={{padding:'5px 12px'}}><Badge text={f.stato}/></td>
                      <td style={{padding:'5px 12px',color:T.textL,fontSize:11,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.oggetto}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ))}
        </Card>
      )}

      {/* SAL + Fatturato progress – logica corretta */}
      <Card style={{marginBottom:18}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:20,alignItems:'start'}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:12}}>Avanzamento su contratto – Scala 100% = {fmt(c.importoContrattuale)}</div>
            <DualProgressBar c={c} showLabels={true} height={12}/>
            {/* Riga dettaglio numerico */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:14}}>
              <div style={{background:'#eff6ff',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:10,color:'#2563eb',fontWeight:700,marginBottom:2}}>SAL PRODUTTIVO</div>
                <div style={{fontSize:16,fontWeight:800,color:'#2563eb'}}>{fmt(salProdAttivoTotDyn)}</div>
                <div style={{fontSize:10,color:T.textL}}>{c.importoContrattuale>0?Math.round(salProdAttivoTotDyn/c.importoContrattuale*100):0}% del contratto · acconto + SAL</div>
              </div>
              <div style={{background:'#f0fdf4',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:10,color:'#16a34a',fontWeight:700,marginBottom:2}}>FATT. PRODUTTIVO</div>
                <div style={{fontSize:16,fontWeight:800,color:'#16a34a'}}>{fmt(salProdAttivoTotDyn)}</div>
                <div style={{fontSize:10,color:T.textL}}>Da fatture (esclude extra/saldo/garanzia)</div>
              </div>
              {c.acconto?.residuo>0?(
                <div style={{background:'#fffbeb',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#f59e0b',fontWeight:700,marginBottom:2}}>ACCONTO RESIDUO</div>
                  <div style={{fontSize:16,fontWeight:800,color:'#f59e0b'}}>{fmt(c.acconto.residuo)}</div>
                  <div style={{fontSize:10,color:T.textL}}>Da riassorbire su SAL futuri</div>
                </div>
              ):(
                <div style={{background:'#f0fdf4',borderRadius:6,padding:'8px 12px',textAlign:'center'}}>
                  <div style={{fontSize:10,color:T.green,fontWeight:700,marginBottom:2}}>ACCONTO RESIDUO</div>
                  <div style={{fontSize:16,fontWeight:800,color:T.green}}>€ 0</div>
                  <div style={{fontSize:10,color:T.textL}}>Acconto completamente recuperato</div>
                </div>
              )}
            </div>
          </div>
          {/* Incassato + contratto allegato */}
          <div style={{minWidth:180}}>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:T.textL,marginBottom:4,fontWeight:600}}>Incassato / Fatturato</div>
              <ProgressBar pct={c.fatturato>0?(c.incassato/c.fatturato)*100:0} color={T.green}/>
              <div style={{fontSize:11,color:T.textL,marginTop:3}}>{fmt(c.incassato)} / {fmt(c.fatturato)}</div>
            </div>
            {c.contratto&&(
              <div style={{background:'#f0f9ff',border:`1px solid #bae6fd`,borderRadius:8,padding:10}}>
                <div style={{fontSize:10,fontWeight:700,color:'#0369a1',marginBottom:6}}>📎 CONTRATTO ALLEGATO</div>
                <div style={{fontSize:11,color:T.text,marginBottom:8,wordBreak:'break-all'}}>{c.contratto.name}</div>
                <button type="button" onClick={()=>window.open(c.contratto.url,'_blank')}
                  style={{width:'100%',padding:'5px',border:'none',background:'#0369a1',color:'#fff',borderRadius:5,fontSize:11,cursor:'pointer',fontWeight:600}}>
                  👁 Visualizza contratto
                </button>
              </div>
            )}
          </div>
        </div>
      </Card>

      {/* Criticità manuali */}
      {(c.criticita||[]).length>0&&(
        <div style={{background:T.redL,border:`1px solid #fca5a5`,borderRadius:8,padding:12,marginBottom:18}}>
          {(c.criticita||[]).map((cr,i)=><div key={i} style={{fontSize:13,color:T.red,display:'flex',gap:6,marginBottom:i<(c.criticita||[]).length-1?4:0}}><span>⚠</span>{cr}</div>)}
        </div>
      )}

      {/* Alert SAL elevato senza consegna */}
      {c.importoContrattuale>0 && salProdPct>=90 && (
        <div style={{background:salProdPct>=100?T.redL:'#fffbeb',border:`1px solid ${salProdPct>=100?'#fca5a5':'#fde68a'}`,borderRadius:8,padding:'12px 16px',marginBottom:18,display:'flex',gap:10,alignItems:'flex-start'}}>
          <span style={{fontSize:18}}>⚠</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:salProdPct>=100?T.red:'#92400e',marginBottom:3}}>
              {salProdPct>=100 ? 'Hai fatturato oltre il 100% del contratto' : `Hai fatturato il ${salProdPct}% del contratto base`}
            </div>
            <div style={{fontSize:12,color:T.text}}>
              Fatturato SAL <b>{fmt(salProdAttivoTotDyn)}</b> su <b>{fmt(c.importoContrattuale)}</b>.
              {salProdPct>=100 ? ' Verifica con il Committente: extra contrattuali da gestire come ordini Extra separati.' :
               ` Restano ${fmt(c.importoContrattuale-salProdAttivoTotDyn)} prima di passare al saldo (3%) e garanzia (3%). Conferma consegna o emetti fattura saldo.`}
            </div>
          </div>
        </div>
      )}


      {/* 📎 DOCUMENTI (contratto + extra) - sempre visibile, upload diretto */}
      {(() => {
        const docs = [
          ...(c.contratto ? [{...c.contratto, tipo:'Contratto principale', _isContratto:true}] : []),
          ...(Array.isArray(c.documenti) ? c.documenti : []),
        ];
        const fmtSize = (b) => b<1024 ? `${b} B` : b<1024*1024 ? `${(b/1024).toFixed(0)} KB` : `${(b/1024/1024).toFixed(1)} MB`;
        const handleUploadDoc = async (e) => {
          const file = e.target.files?.[0]; if(!file) return;
          const path = `${c.id}/doc_${Date.now()}_${file.name.replace(/[^\w.-]/g,'_')}`;
          try {
            const r = await fetch(`${SB_URL}/storage/v1/object/contratti/${path}`, {
              method:'POST',
              headers:{ 'Authorization':`Bearer ${SB_KEY}`, 'apikey':SB_KEY, 'x-upsert':'true', 'Content-Type':file.type },
              body: file,
            });
            if(r.ok) {
              const url = `${SB_URL}/storage/v1/object/public/contratti/${path}`;
              const tipo = window.prompt('Tipo documento (Specifica tecnica / DDT / Conferma / Allegato / Altro):', 'Specifica tecnica') || 'Allegato';
              const newDoc = { name:file.name, url, size:file.size, path, tipo, data: new Date().toISOString() };
              const newDocs = [...(c.documenti||[]), newDoc];
              if(updateCommessa) updateCommessa(c.id, { documenti: newDocs });
              alert(`Documento "${file.name}" caricato come ${tipo}`);
            } else { alert('Errore upload (codice '+r.status+')'); }
          } catch(err){ alert('Errore: '+err.message); }
          e.target.value='';
        };
        const removeDoc = (idx, doc) => {
          if(doc._isContratto) {
            if(window.confirm('Rimuovere il contratto principale?')) {
              if(updateCommessa) updateCommessa(c.id, { contratto: null });
            }
            return;
          }
          if(!window.confirm(`Rimuovere "${doc.name}"?`)) return;
          const filtered = (c.documenti||[]).filter((_,i)=>i!==(idx-(c.contratto?1:0)));
          if(updateCommessa) updateCommessa(c.id, { documenti: filtered });
        };
        return (
          <Card style={{marginBottom:18,padding:0,borderLeft:`4px solid #0369a1`}}>
            <div style={{padding:'10px 16px',background:'#f0f9ff',borderBottom:`1px solid #bae6fd`,borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <div style={{fontWeight:700,fontSize:13,color:'#0369a1'}}>📎 Documenti commessa <span style={{fontWeight:400,color:T.textL,marginLeft:6,fontSize:11}}>({docs.length} {docs.length===1?'file':'files'})</span></div>
              <label style={{background:'#0369a1',color:'#fff',padding:'6px 12px',borderRadius:5,fontSize:12,cursor:'pointer',fontWeight:600,display:'inline-flex',alignItems:'center',gap:4}}>
                ➕ Aggiungi documento
                <input type="file" accept="application/pdf,image/*,.doc,.docx" style={{display:'none'}} onChange={handleUploadDoc}/>
              </label>
            </div>
            {docs.length===0 ? (
              <div style={{padding:'20px',textAlign:'center',color:T.textL,fontSize:13}}>
                Nessun documento allegato. Click "➕ Aggiungi documento" per caricare contratti, specifiche tecniche, DDT, allegati.
              </div>
            ) : (
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{background:'#f8fafc',color:T.textL,fontSize:10,textTransform:'uppercase'}}>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Tipo</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Nome file</th>
                    <th style={{padding:'8px 12px',textAlign:'right'}}>Dimensione</th>
                    <th style={{padding:'8px 12px',textAlign:'left'}}>Caricato</th>
                    <th style={{padding:'8px 12px',textAlign:'center'}}>Azioni</th>
                  </tr>
                </thead>
                <tbody>
                  {docs.map((d,i)=>(
                    <tr key={i} style={{borderTop:`1px solid ${T.border}`}}>
                      <td style={{padding:'8px 12px'}}>
                        <span style={{background:d._isContratto?'#fffbeb':T.blueL,color:d._isContratto?'#92400e':T.blue,padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                          {d._isContratto?'📜 CONTRATTO':d.tipo||'📄 Allegato'}
                        </span>
                      </td>
                      <td style={{padding:'8px 12px',fontWeight:600,maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={d.name}>{d.name}</td>
                      <td style={{padding:'8px 12px',textAlign:'right',color:T.textL,fontSize:11}}>{d.size?fmtSize(d.size):'—'}</td>
                      <td style={{padding:'8px 12px',color:T.textL,fontSize:11}}>{d.data?fmtDate(d.data.slice(0,10)):'—'}</td>
                      <td style={{padding:'8px 12px',textAlign:'center',whiteSpace:'nowrap'}}>
                        {d.url && <button onClick={()=>window.open(d.url,'_blank')} style={{background:'#0369a1',color:'#fff',border:'none',padding:'4px 10px',borderRadius:4,fontSize:11,cursor:'pointer',marginRight:6,fontWeight:600}}>👁 Apri</button>}
                        <button onClick={()=>removeDoc(i,d)} style={{background:'#fff',color:T.red,border:`1px solid ${T.red}`,padding:'4px 10px',borderRadius:4,fontSize:11,cursor:'pointer'}}>🗑</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </Card>
        );
      })()}

      {/* RIEPILOGO REGOLE PAGAMENTO (sempre visibile in alto) */}
      {(c.regolePagamento?.milestone||[]).length>0&&(()=>{
        const tipoIcon={acconto:'💰',sal:'📊',saldo:'✅',garanzia:'🔐',fideiussione:'📜',altro:'•'};
        const tipoColor={acconto:T.purple,sal:T.blue,saldo:T.green,garanzia:T.amber,fideiussione:'#92400e',altro:T.textL};
        return (
          <Card style={{marginBottom:18,padding:0,borderLeft:`4px solid ${T.blue}`}}>
            <div style={{padding:'10px 16px',background:'#f8fafc',borderBottom:`1px solid ${T.border}`,borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontWeight:700,fontSize:13}}>📋 Regole di pagamento <span style={{color:T.textL,fontWeight:400,marginLeft:6,fontSize:11}}>({c.regolePagamento.milestone.length} rate · totale {c.regolePagamento.totalePerc||c.regolePagamento.milestone.reduce((a,m)=>a+(parseFloat(m.perc)||0),0)}%)</span></div>
              <Btn variant='ghost' size='sm' onClick={()=>setEditOpen(true)}>✏️ Modifica</Btn>
            </div>
            <div style={{display:'grid',gridTemplateColumns:`repeat(${c.regolePagamento.milestone.length},1fr)`,gap:0}}>
              {c.regolePagamento.milestone.map((m,i)=>{
                const importoMs=(c.importoContrattuale||0)*(parseFloat(m.perc)||0)/100;
                const mp=(D.modalitaPagamento||[]).find(x=>x.id===m.modalitaPagamentoId);
                return (
                  <div key={m.id} style={{padding:12,borderRight:i<c.regolePagamento.milestone.length-1?`1px solid ${T.border}`:'none',background:'#fff'}}>
                    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4}}>
                      <span style={{fontSize:14}}>{tipoIcon[m.tipo]||'•'}</span>
                      <span style={{fontWeight:700,color:tipoColor[m.tipo]||T.text,fontSize:18}}>{m.perc}%</span>
                    </div>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:2,maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.titolo}</div>
                    <div style={{fontSize:11,color:T.textL,marginBottom:4}}>{fmt(importoMs)}</div>
                    {mp&&<div style={{fontSize:10,color:T.textL,fontStyle:'italic',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={mp.nome}>{mp.nome}</div>}
                    {m.fideiussioneAlt?.attiva&&<span style={{display:'inline-block',marginTop:4,fontSize:9,padding:'2px 6px',borderRadius:8,background:'#fef9c3',color:'#92400e',fontWeight:600}}>📜 Fideiussione alt.</span>}
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })()}

      {/* Tabs */}
      <div style={{display:'flex',gap:0,borderBottom:`1px solid ${T.border}`,marginBottom:18}}>
        {[{id:'pagamenti',label:'📋 Pagamenti'},{id:'sal',label:'SAL'},{id:'fatture',label:'Fatture'},{id:'extra',label:'Extra'},{id:'compensazioni',label:'Compensazioni'},{id:'regole',label:'Regole Economiche'}].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'8px 16px',cursor:'pointer',borderBottom:tab===t.id?`2px solid ${T.blue}`:'2px solid transparent',color:tab===t.id?T.blue:T.textL,fontWeight:tab===t.id?600:400,fontSize:13,marginBottom:-1}}>
            {t.label}
          </div>
        ))}
      </div>

      {/* Tab: Pagamenti / Milestone */}
      {tab==='pagamenti'&&(()=>{
        const ms = c.regolePagamento?.milestone || [];
        const fattAttive = D.fattureAttive.filter(f=>f.commessa===c.id);
        // Imponibile esclude IVA e bollo. Lordo = imponibile + IVA + bollo (~2€)
        const impOf = (f) => (f.imponibile && f.imponibile>0) ? f.imponibile : (f.lordo||0);
        // Distingue fatture commessa principale da EXTRA/BAP
        const isExtra = (f) => /\bextra\b|\bbap\b/i.test(f.oggetto||'');
        // Estrai e confronta numero ordine: solo fatture col nrOrdine principale = SAL del contratto
        const estraiOrdine = (s)=>{
          if(!s) return '';
          const m = String(s).match(/(?:MYOA\d+(?:\/[A-Z]+)?|OR(?:CA|FO)\/\d{4}\/\d+|OLAV\/\d{4}\/\d+|\d{2}OA\d+|2\d{4}[A-Z]+\d+)/i);
          return m ? m[0].toUpperCase().replace(/\s+/g,'') : '';
        };
        // Confronto flessibile su radice (ignora /APP, /AFS, /INV)
        const ordRoot = (s)=> String(s||'').toUpperCase().replace(/\s+/g,'').split('/')[0];
        const ordPrincipale = ordRoot(c.nrOrdine||'');
        const isMainOrder = (f) => {
          if(!ordPrincipale) return true;
          const ordF = ordRoot(estraiOrdine(f.oggetto));
          if(!ordF) return true;
          return ordF === ordPrincipale;
        };
        // Categorizza ogni fattura
        // - Commessa = !extra E ordine principale (o senza ordine identificabile)
        // - Extra = ha "EXTRA"/"BAP" OPPURE ha un ordine diverso da quello principale
        const fattCommessa = fattAttive.filter(f=>!isExtra(f) && isMainOrder(f));
        const fattExtra = fattAttive.filter(f=>isExtra(f) || (!isExtra(f) && !isMainOrder(f)));
        const totFattCommessa = fattCommessa.reduce((a,f)=>a+impOf(f),0);
        const totFattExtra = fattExtra.reduce((a,f)=>a+impOf(f),0);
        const totFatt = totFattCommessa + totFattExtra;
        const totIncassato = fattAttive.filter(f=>f.stato==='Incassata'||f.stato==='Pagata').reduce((a,f)=>a+impOf(f),0);
        const importoCommessa = c.importoContrattuale||0;
        const daFatturare = Math.max(0, importoCommessa - totFattCommessa);

        // Match euristico: associa fatture a milestone in base al tipoRif/oggetto
        const fattureMS = (m) => {
          // Niente Extra/BAP nelle milestone del contratto base
          const noExtra = (f) => !/\bextra\b|\bbap\b/i.test(f.oggetto||'');
          // Solo fatture con il numero ordine principale (esclude ordini distinti)
          const onlyMainOrder = (f) => isMainOrder(f);
          if(m.tipo==='acconto')  return fattAttive.filter(f=> noExtra(f) && onlyMainOrder(f) && (f.tipoRif==='Acconto'||/acconto|\bacc\b\.?/i.test(f.oggetto||'')));
          if(m.tipo==='sal')      return fattAttive.filter(f=> noExtra(f) && onlyMainOrder(f) && (f.tipoRifOverride==='SAL' || (f.tipoRif!=='Acconto' && f.tipoRif!=='Saldo' && f.tipoRif!=='Garanzia' && !/saldo|garanzia/i.test(f.oggetto||''))) && f.tipoRif!=='Acconto');
          if(m.tipo==='saldo')    return fattAttive.filter(f=> noExtra(f) && onlyMainOrder(f) && (f.tipoRifOverride==='Saldo'||/saldo|fine\s*lavori/i.test(f.oggetto||'')));
          if(m.tipo==='garanzia') return fattAttive.filter(f=> noExtra(f) && onlyMainOrder(f) && (f.tipoRifOverride==='Garanzia'||/garanzia|svincolo/i.test(f.oggetto||'')));
          return [];
        };
        const lookupMP = (id) => (D.modalitaPagamento||[]).find(mp=>mp.id===id);
        const tipoIcon = {acconto:'💰',sal:'📊',saldo:'✅',garanzia:'🔐',fideiussione:'📜',altro:'•'};
        const tipoColor = {acconto:T.purple,sal:T.blue,saldo:T.green,garanzia:T.amber,fideiussione:'#92400e',altro:T.textL};

        return (
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            {/* KPI riepilogo già mostrato in alto pagina – qui solo nota */}
            <div style={{fontSize:11,color:T.textL,textAlign:'center',padding:'4px 0'}}>I 4 KPI riepilogo (Importo / Fatturato SAL / Extra / Da fatturare) sono già visibili in alto pagina ↑</div>

            {/* Progress bar avanzamento commessa principale (esclude extra) */}
            <Card>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13}}>Avanzamento fatturazione commessa (esclude Extra)</span>
                <span style={{fontSize:12,color:T.textL}}>{fmt(totFattCommessa)} / {fmt(importoCommessa)} ({importoCommessa>0?(totFattCommessa/importoCommessa*100).toFixed(1):0}%)</span>
              </div>
              <div style={{height:14,background:'#e2e8f0',borderRadius:7,overflow:'hidden',position:'relative'}}>
                <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${importoCommessa>0?Math.min(100,totFattCommessa/importoCommessa*100):0}%`,background:T.green,transition:'width .4s'}}/>
              </div>
              <div style={{display:'flex',gap:14,fontSize:11,marginTop:8,justifyContent:'space-between'}}>
                <div style={{display:'flex',gap:14}}>
                  <span><span style={{display:'inline-block',width:10,height:10,background:T.green,borderRadius:2,marginRight:4,verticalAlign:'middle'}}/>Fatturato SAL</span>
                  <span><span style={{display:'inline-block',width:10,height:10,background:'#e2e8f0',borderRadius:2,marginRight:4,verticalAlign:'middle'}}/>Da fatturare</span>
                </div>
                {totFattExtra>0 && <span style={{color:T.purple,fontWeight:600}}>+ Extra fuori contratto: {fmt(totFattExtra)}</span>}
              </div>
            </Card>

            {/* Milestone list */}
            {ms.length===0 ? (
              <Card>
                <div style={{padding:24,textAlign:'center',color:T.textL}}>
                  Nessuna milestone configurata. Vai su <b>✏️ Modifica</b> → "📋 Regole di pagamento" per aggiungere le rate (es. 10/84/3/3 stile Benetti).
                </div>
              </Card>
            ) : null}

            {/* ORDINI DISTINTI nelle fatture - utile per creare commesse Extra */}
            {(()=>{
              const ordiniMap = new Map();
              fattAttive.forEach(f=>{
                // Estrai numero ordine (MYOA..., ORCA/yyyy/nnnnn, ORFO/..., OLAV/..., ecc.)
                const matches = (f.oggetto||'').match(/(?:MYOA\d+(?:\/[A-Z]+)?|OR(?:CA|FO)\/\d{4}\/\d+|OLAV\/\d{4}\/\d+|2\d{4}[A-Z]+\d+|2\d{4}OA\d+|[A-Z]{2,4}\d{4,}|\d{5,}[A-Z]?)/gi) || [];
                const isExtra = /\bextra\b/i.test(f.oggetto||'');
                const isBap = /\bbap\b/i.test(f.oggetto||'');
                if(matches.length===0 && isExtra) {
                  // Extra senza numero ordine specifico
                  const k='__extra_senza_ordine__';
                  if(!ordiniMap.has(k)) ordiniMap.set(k,{ordine:'(EXTRA senza nr ordine)',isExtra:true,isBap:false,fatture:[],imp:0,isMain:false});
                  const r=ordiniMap.get(k); r.fatture.push(f); r.imp+=impOf(f);
                  return;
                }
                matches.forEach(ord=>{
                  if(!ordiniMap.has(ord)) ordiniMap.set(ord,{ordine:ord,isExtra,isBap,fatture:[],imp:0,isMain:false});
                  const r=ordiniMap.get(ord); r.fatture.push(f); r.imp+=impOf(f);
                  if(isExtra||isBap) r.isExtra=true;
                });
              });
              // Marca quale è l'ordine principale (= nrOrdine della commessa)
              const ordPrincipale = c.nrOrdine ? normCodice(c.nrOrdine) : null;
              if(ordPrincipale && ordiniMap.has(ordPrincipale)) ordiniMap.get(ordPrincipale).isMain=true;
              const ordini = Array.from(ordiniMap.values()).sort((a,b)=>b.imp-a.imp);
              if(ordini.length<=1) return null;
              return (
                <Card style={{padding:0}}>
                  <div style={{padding:'12px 16px',background:'#fffbeb',borderBottom:`1px solid ${T.border}`,borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:'#92400e'}}>📦 Ordini distinti rilevati ({ordini.length})</div>
                      <div style={{fontSize:11,color:T.textL,marginTop:2}}>Numeri ordine univoci nelle fatture. Quelli marcati EXTRA sono ordini extra da gestire come commesse Extra separate.</div>
                    </div>
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead>
                      <tr style={{background:'#f8fafc',color:T.textL,fontSize:10,textTransform:'uppercase'}}>
                        <th style={{padding:'8px 12px',textAlign:'left'}}>N° Ordine</th>
                        <th style={{padding:'8px 12px',textAlign:'center'}}>Tipo</th>
                        <th style={{padding:'8px 12px',textAlign:'right'}}>Fatture</th>
                        <th style={{padding:'8px 12px',textAlign:'right'}}>Imponibile tot.</th>
                        <th style={{padding:'8px 12px',textAlign:'left'}}>Stato</th>
                        <th style={{padding:'8px 12px',textAlign:'center'}}>Azione</th>
                      </tr>
                    </thead>
                    <tbody>
                      {ordini.map(r=>{
                        const exists = D.commesse.some(cc=>cc.nrOrdine && normCodice(cc.nrOrdine)===normCodice(r.ordine));
                        return (
                          <tr key={r.ordine} style={{borderTop:`1px solid ${T.border}`}}>
                            <td style={{padding:'8px 12px',fontFamily:'monospace',fontWeight:r.isMain?700:500,color:r.isMain?T.blue:T.text}}>{r.ordine}</td>
                            <td style={{padding:'8px 12px',textAlign:'center'}}>
                              {r.isMain ? <span style={{background:T.blueL,color:T.blue,padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700}}>PRINCIPALE</span> :
                               r.isExtra ? <span style={{background:T.purpleL,color:T.purple,padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700}}>EXTRA</span> :
                               <span style={{background:'#f1f5f9',color:T.textL,padding:'2px 8px',borderRadius:10,fontSize:10}}>?</span>}
                            </td>
                            <td style={{padding:'8px 12px',textAlign:'right',color:T.textL}}>{r.fatture.length}</td>
                            <td style={{padding:'8px 12px',textAlign:'right',fontWeight:700}}>{fmt(r.imp)}</td>
                            <td style={{padding:'8px 12px'}}>
                              {exists ? <span style={{color:T.green,fontSize:11,fontWeight:600}}>✓ Commessa già creata</span> :
                               r.isMain ? <span style={{color:T.blue,fontSize:11}}>questa commessa</span> :
                               <span style={{color:T.amber,fontSize:11}}>da creare</span>}
                            </td>
                            <td style={{padding:'8px 12px',textAlign:'center'}}>
                              {!exists && !r.isMain && r.ordine!=='(EXTRA senza nr ordine)' &&
                                <Btn variant='outline' size='sm' onClick={()=>{
                                  navigator.clipboard?.writeText(r.ordine);
                                  if(window.confirm(`Numero ordine "${r.ordine}" copiato. Vuoi aprire ora il form Nuova Commessa per crearlo come EXTRA?`)) onNav('nuovaCommessa');
                                }}>➕ Crea Extra</Btn>
                              }
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </Card>
              );
            })()}

            {ms.map((m,i)=>{
              const importoMs = (importoCommessa * (parseFloat(m.perc)||0)) / 100;
              const fatts = fattureMS(m);
              // Usa imponibile per matching milestone (esclude bollo/IVA)
              const fattLordo = fatts.reduce((a,f)=>a+impOf(f),0);
              const fattIncas = fatts.filter(f=>f.stato==='Incassata'||f.stato==='Pagata').reduce((a,f)=>a+impOf(f),0);
              const pctCop = importoMs>0?Math.round(fattLordo/importoMs*100):0;
              const stato = pctCop===0 ? 'Da fatturare' : pctCop>=99 ? (fattIncas>=fattLordo ? 'Pagata' : 'Fatturata') : 'In corso';
              const statoColor = stato==='Pagata' ? T.green : stato==='Fatturata' ? T.blue : stato==='In corso' ? T.amber : T.textL;
              const mp = lookupMP(m.modalitaPagamentoId);
              return (
                <Card key={m.id} style={{padding:0,borderLeft:`4px solid ${tipoColor[m.tipo]||T.textL}`}}>
                  <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.border}`,background:'#fafbfc',borderRadius:'8px 8px 0 0'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{background:'#fff',width:28,height:28,borderRadius:14,display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12,border:`1px solid ${T.border}`}}>{i+1}</span>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{tipoIcon[m.tipo]||'•'} {m.titolo||'(senza titolo)'}</div>
                          <div style={{fontSize:11,color:T.textL,marginTop:2}}>
                            {mp?`${mp.nome} (${mp.strumento})`:'Modalità non specificata'}
                            {m.condizioni?` · ${m.condizioni.slice(0,80)}${m.condizioni.length>80?'…':''}`:''}
                          </div>
                        </div>
                      </div>
                      <div style={{display:'flex',gap:14,alignItems:'center'}}>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontWeight:800,fontSize:18,color:tipoColor[m.tipo]||T.text}}>{fmt(importoMs)}</div>
                          <div style={{fontSize:10,color:T.textL}}>{m.perc}% del contratto</div>
                        </div>
                        <span style={{background:statoColor,color:'#fff',padding:'4px 10px',borderRadius:12,fontSize:11,fontWeight:700,minWidth:90,textAlign:'center'}}>{stato}</span>
                      </div>
                    </div>
                    {/* Mini progress */}
                    <div style={{marginTop:10}}>
                      <div style={{height:6,background:'#e2e8f0',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${Math.min(100,pctCop)}%`,background:statoColor,transition:'width .3s'}}/>
                      </div>
                      <div style={{fontSize:10,color:T.textL,marginTop:3,display:'flex',justifyContent:'space-between'}}>
                        <span>Fatturato: <b>{fmt(fattLordo)}</b> · Incassato: <b style={{color:T.amber}}>{fmt(fattIncas)}</b></span>
                        <span>{pctCop}% coperto</span>
                      </div>
                    </div>
                  </div>
                  {/* Fatture collegate */}
                  {fatts.length>0 ? (()=>{
                    const sortedF = [...fatts].sort((a,b)=>(a.data||'').localeCompare(b.data||''));
                    let cum = 0;
                    const rows = sortedF.map(f=>{
                      const imp = impOf(f);
                      const pctContratto = importoCommessa>0 ? (imp/importoCommessa*100) : 0;
                      cum += pctContratto;
                      return {f, imp, pctContratto, pctCum: cum};
                    });
                    return (
                      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                        <thead>
                          <tr style={{background:'#f8fafc',color:T.textL,fontSize:10,textTransform:'uppercase'}}>
                            <th style={{padding:'6px 12px',textAlign:'left'}}>Num</th>
                            <th style={{padding:'6px 12px',textAlign:'left'}}>Data</th>
                            <th style={{padding:'6px 12px',textAlign:'left'}}>Scadenza</th>
                            <th style={{padding:'6px 12px',textAlign:'left'}} title="Numero ordine cliente estratto da oggetto">N° Ordine</th>
                            <th style={{padding:'6px 12px',textAlign:'right'}} title="Importo prestazione (esclude IVA/bollo) – conta per i calcoli SAL">Imponibile</th>
                            <th style={{padding:'6px 12px',textAlign:'right'}} title="% di questa fattura sul contratto totale">% Contr.</th>
                            <th style={{padding:'6px 12px',textAlign:'right'}} title="Avanzamento cumulativo % sul contratto">% Cum.</th>
                            <th style={{padding:'6px 12px',textAlign:'left'}}>Stato</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rows.map(({f,imp,pctContratto,pctCum})=>{
                            const nrOrd = estraiOrdine(f.oggetto);
                            return (
                              <tr key={f.id} style={{borderTop:`1px solid ${T.border}`}}>
                                <td style={{padding:'6px 12px',fontFamily:'monospace',fontWeight:600}}>{f.num}</td>
                                <td style={{padding:'6px 12px'}}>{fmtDate(f.data)}</td>
                                <td style={{padding:'6px 12px',color:f.stato==='Scaduta'?T.red:T.text}}>{fmtDate(f.scadenza)||'—'}</td>
                                <td style={{padding:'6px 12px',fontFamily:'monospace',fontSize:11}} title={f.oggetto}>{nrOrd || <span style={{color:T.textL,fontStyle:'italic'}}>—</span>}</td>
                                <td style={{padding:'6px 12px',textAlign:'right',fontWeight:700,color:T.text}}>{fmt(imp)}</td>
                                <td style={{padding:'6px 12px',textAlign:'right',color:T.blue,fontWeight:600}}>{pctContratto.toFixed(2)}%</td>
                                <td style={{padding:'6px 12px',textAlign:'right',color:T.green,fontWeight:700}}>{pctCum.toFixed(2)}%</td>
                                <td style={{padding:'6px 12px'}}><Badge text={f.stato}/></td>
                              </tr>
                            );
                          })}
                          {/* Riga totale */}
                          <tr style={{borderTop:`2px solid ${T.border}`,background:'#f8fafc'}}>
                            <td colSpan={4} style={{padding:'8px 12px',fontWeight:700,color:T.textL,fontSize:11,textTransform:'uppercase'}}>
                              Totale fatturato ({rows.length} fatture)
                            </td>
                            <td style={{padding:'8px 12px',textAlign:'right',fontWeight:800,color:T.text,fontSize:13}}>{fmt(rows.reduce((a,r)=>a+r.imp,0))}</td>
                            <td colSpan={2} style={{padding:'8px 12px',textAlign:'right',fontWeight:800,color:T.green,fontSize:13}}>
                              {cum.toFixed(2)}% del contratto
                              {m.tipo==='sal' && <span style={{marginLeft:8,color:T.textL,fontWeight:400,fontSize:11}}>(milestone target: {m.perc}%)</span>}
                            </td>
                            <td/>
                          </tr>
                        </tbody>
                      </table>
                    );
                  })() : (
                    <div style={{padding:'14px 16px',color:T.textL,fontSize:12,textAlign:'center',fontStyle:'italic'}}>
                      Nessuna fattura associata a questa milestone (auto-detect su tipo/oggetto). Quando emetti una fattura il match avviene automaticamente.
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        );
      })()}

      {/* Tab: SAL */}
      {tab==='sal'&&<Card style={{padding:0}}>
        <div style={{padding:14,borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between'}}>
          <span style={{fontWeight:600}}>SAL registrati</span>
          <Btn onClick={()=>openModal('nuovoSAL')} size='sm'>+ Nuovo SAL</Btn>
        </div>
        <Table headers={[{label:'Mese'},{label:'Descrizione'},{label:'SAL Lordo',right:true},{label:'Rec. Acconto',right:true},{label:'Fattura Emessa',right:true},{label:'Garanzia',right:true},{label:'Incasso Prev.',right:true},{label:'Scadenza'},{label:'Stato'}]}>
          {salC.map(s=>(
            <tr key={s.id}>
              <Td nowrap>{s.mese}</Td>
              <Td>{s.desc}</Td>
              <Td right bold>{fmt(s.lordo)}</Td>
              <Td right color={T.amber}>{fmt(s.recAcc)}</Td>
              <Td right>{s.fattEmessa?fmt(s.fattEmessa):'—'}</Td>
              <Td right color={T.amber}>{fmt(s.garanzia)}</Td>
              <Td right bold color={T.green}>{fmt(s.incassoPrev)}</Td>
              <Td nowrap>{fmtDate(s.scadenza)}</Td>
              <Td><Badge text={s.stato}/></Td>
            </tr>
          ))}
        </Table>
        <div style={{padding:12,background:'#f8fafc',borderTop:`1px solid ${T.border}`,display:'flex',gap:20}}>
          <span style={{fontSize:12,color:T.textL}}>Totale SAL: <b>{fmt(salC.reduce((a,s)=>a+s.lordo,0))}</b></span>
          <span style={{fontSize:12,color:T.textL}}>Tot. Garanzie: <b style={{color:T.amber}}>{fmt(salC.reduce((a,s)=>a+s.garanzia,0))}</b></span>
          <span style={{fontSize:12,color:T.textL}}>Tot. Incasso prev.: <b style={{color:T.green}}>{fmt(salC.reduce((a,s)=>a+s.incassoPrev,0))}</b></span>
        </div>
      </Card>}

      {/* Tab: Fatture */}
      {tab==='fatture'&&<div style={{display:'flex',flexDirection:'column',gap:16}}>
        <Card style={{padding:0}}>
          <div style={{padding:12,borderBottom:`1px solid ${T.border}`}}><span style={{fontWeight:600,color:T.green}}>↗ Fatture Attive</span></div>
          <Table headers={[{label:'Numero'},{label:'Data'},{label:'Scadenza'},{label:'Tipo'},{label:'Lordo',right:true},{label:'Garanzia',right:true},{label:'Netto',right:true},{label:'Stato'}]}>
            {D.fattureAttive.filter(f=>f.commessa===c.id).map(f=>(
              <tr key={f.id}>
                <Td bold>{f.num}</Td><Td>{fmtDate(f.data)}</Td><Td nowrap>{fmtDate(f.scadenza)}</Td>
                <Td><Badge text={f.tipo}/></Td>
                <Td right>{fmt(f.lordo)}</Td><Td right color={T.amber}>{fmt(f.garanzia)}</Td>
                <Td right bold color={f.stato==='Scaduta'?T.red:T.green}>{fmt(f.netto)}</Td>
                <Td><Badge text={f.stato}/></Td>
              </tr>
            ))}
          </Table>
        </Card>
        <Card style={{padding:0}}>
          <div style={{padding:12,borderBottom:`1px solid ${T.border}`}}><span style={{fontWeight:600,color:T.red}}>↙ Fatture Passive</span></div>
          <Table headers={[{label:'Numero'},{label:'Fornitore'},{label:'Scadenza'},{label:'Lordo',right:true},{label:'Garanzia',right:true},{label:'Comp. Sub',right:true},{label:'Netto',right:true},{label:'Stato'}]}>
            {D.fatturePassive.filter(f=>f.commessa===c.id).map(f=>(
              <tr key={f.id}>
                <Td bold>{f.num}</Td><Td>{f.fornitore}</Td><Td nowrap>{fmtDate(f.scadenza)}</Td>
                <Td right>{fmt(f.lordo)}</Td><Td right color={T.amber}>{fmt(f.garanzia)}</Td>
                <Td right color={T.blue}>{fmt(f.compSub)}</Td>
                <Td right bold color={T.red}>{fmt(f.netto)}</Td>
                <Td><Badge text={f.stato}/></Td>
              </tr>
            ))}
          </Table>
        </Card>
      </div>}

      {/* Tab: Extra */}
      {tab==='extra'&&<Card style={{padding:0}}>
        <div style={{padding:12,borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between'}}>
          <span style={{fontWeight:600}}>Extra collegati alla commessa {c.codice}</span>
          <Btn onClick={()=>openModal('nuovoExtra')} size='sm'>+ Nuovo Extra</Btn>
        </div>
        {extraC.length===0?<div style={{padding:32,textAlign:'center',color:T.textL}}>Nessun extra configurato</div>:(
          <Table headers={[{label:'Codice'},{label:'Descrizione'},{label:'Importo',right:true},{label:'Fatturato',right:true},{label:'Acc.'},{label:'Gar.'},{label:'Pag.'},{label:'Fatt.'},{label:'Stato'},{label:'Azioni'}]}>

          <div style={{padding:32,textAlign:'center',color:T.textL}}>Nessuna compensazione registrata</div>:(
          <Table headers={[{label:'Data'},{label:'Direzione'},{label:'Debito',right:true},{label:'Compensato',right:true},{label:'Bonifico res.',right:true},{label:'Origine'},{label:'Stato bancario'}]}>

              <tr key={cp.id}>
                <Td nowrap>{fmtDate(cp.data)}</Td>

                <Td><Badge text={cp.statoBanc}/></Td>
              </tr>
            ))}
          </Table>

      </Card>}

      {/* Tab: Regole Economiche */}
      {tab==='regole'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <Card>
          <SectionTitle children="Acconto"/>
          {c.acconto?(
            <>
              <InfoRow label="Tipo" value={c.acconto.perc?`Percentuale ${c.acconto.perc}%`:'Importo fisso'}/>
              <InfoRow label="Importo totale" value={fmt(c.acconto.importo)}/>
              <InfoRow label="Recuperato" value={fmt(c.acconto.recuperato)}/>
              <InfoRow label="Residuo da recuperare" value={fmt(c.acconto.residuo)} color={T.amber}/>
              <InfoRow label="Regola" value={c.acconto.regola}/>
            </>
          ):<div style={{color:T.textL,fontSize:13}}>Nessun acconto configurato</div>}
        </Card>
        <Card>
          <SectionTitle children="Garanzia"/>
          {c.garanzia?(
            <>
              <InfoRow label="Percentuale" value={`${c.garanzia.perc}%`}/>
              <InfoRow label="Importo originario" value={fmt(c.garanzia.importo)}/>
              <InfoRow label="Residuo" value={fmt(c.garanzia.residuo)} color={T.amber}/>
              <InfoRow label="Condizione svincolo" value={c.garanzia.cond}/>
              <InfoRow label="Data svincolo" value={fmtDate(c.garanzia.svincolo)}/>
              <InfoRow label="Stato" value={c.garanzia.stato}/>
            </>
          ):<div style={{color:T.textL,fontSize:13}}>Nessuna garanzia configurata</div>}
        </Card>
        <Card>
          <SectionTitle children="Pagamento"/>
          <InfoRow label="Termini" value={c.terminePag}/>
          <InfoRow label="Modalità fatturazione" value={c.modalitaFatt}/>
          <InfoRow label="Compensazioni abilitate" value={c.compensazioni?'Sì':'No'}/>
        </Card>
        <Card>
          <SectionTitle children="Extra – eredità regole"/>
          {D.extra.filter(e=>e.commessa===c.id).map(e=>(
            <InfoRow key={e.id} label={e.codice} value={e.autonomo?'Autonomo':'Eredita dalla madre'}/>
          ))}
          {D.extra.filter(e=>e.commessa===c.id).length===0&&<div style={{color:T.textL,fontSize:13}}>Nessun extra</div>}
        </Card>
      </div>}
    </div>
  );
};


/* ─── PAGE: SCADENZIARIO ─────────────────────────────────── */

        <KPICard label="Totale pagamenti previsti" value={fmt(pagMese)} color={T.red} sub="Prossimi pagamenti" />

        <KPICard label="Urgenti (≤7 gg)" value={urgenti.length} sub={fmt(urgenti.reduce((a,s)=>a+s.importo,0))} color={T.amber} alert={urgenti.length>0} onClick={()=>setFiltStato('Urgente')} />

        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>

        </div>
        <Table headers={[{label:'Data calc.'},{label:'Controparte'},{label:'Commessa'},{label:'Tipo'},{label:'Importo',right:true},{label:'Regola'},{label:'Evento attivante'},{label:'Stato'},{label:'Prio'},{label:'Nota'}]}>

              <Td><span style={{fontWeight:600,color:s.tipo==='Incasso'?T.green:T.red}}>{s.tipo==='Incasso'?'↗':'↙'} {s.tipo}</span></Td>

              <Td nowrap><span style={{fontFamily:'monospace',fontSize:11,color:T.textL}}>{s.regola||s.ref||'—'}</span></Td>

/* ─── PAGE: FATTURE ATTIVE ───────────────────────────────── */
const PageFattureAttive = ({onNav,openModal})=>{
  const [soloAperte,setSoloAperte]=useState(true);
  const [filtTxt,setFiltTxt]=useState('');
  const [filtDa,setFiltDa]=useState('');
  const [filtA,setFiltA]=useState('');
  const [filtImpMin,setFiltImpMin]=useState('');
  const [filtImpMax,setFiltImpMax]=useState('');
  const [filtStato,setFiltStato]=useState('');
  const [expanded,setExpanded]=useState(null);

  const base = soloAperte ? D.fattureAttive.filter(f=>f.stato!=='Incassata') : D.fattureAttive;
  const rows = base.filter(f=>{
    if(filtTxt&&!(f.num+f.cliente+(f.commessa||'')+f.tipo).toLowerCase().includes(filtTxt.toLowerCase())) return false;
    if(filtDa&&(f.data||'')<filtDa) return false;
    if(filtA&&(f.data||'')>filtA) return false;
    if(filtImpMin&&f.lordo<parseFloat(filtImpMin)) return false;
    if(filtImpMax&&f.lordo>parseFloat(filtImpMax)) return false;
    if(filtStato&&f.stato!==filtStato) return false;
    return true;
  });

  const totLordo=rows.reduce((a,f)=>a+f.lordo,0);
  const totGar=rows.reduce((a,f)=>a+(f.garanzia||0),0);
  const totNetto=rows.reduce((a,f)=>a+(f.netto||0),0);
  const scadute=rows.filter(f=>f.stato==='Scaduta');
  const incassateHidden=soloAperte?D.fattureAttive.filter(f=>f.stato==='Incassata').length:0;
  const hasFilter=filtTxt||filtDa||filtA||filtImpMin||filtImpMax||filtStato;
  const statiUnici=[...new Set(D.fattureAttive.map(f=>f.stato))].sort();

  return (
    <div style={{padding:24}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:14}}>
        <KPICard label="Lordo filtrato" value={fmt(totLordo)} color={T.blue}/>
        <KPICard label="Garanzie trattenute" value={fmt(totGar)} color={T.amber}/>
        <KPICard label="Netto da incassare" value={fmt(totNetto)} color={T.green} onClick={()=>openModal('daIncassare')}/>
        <KPICard label="Scadute" value={scadute.length} sub={scadute.length>0?fmt(scadute.reduce((a,f)=>a+f.netto,0)):''} color={T.red} alert={scadute.length>0}/>
      </div>

      {/* Filtri con etichette */}
      <Card style={{marginBottom:14,padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,gap:12}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <FicBadge/>
            <span style={{fontSize:12,color:T.textL}}>Sola lettura – Fatture in Cloud</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {hasFilter&&<Btn variant='outline' size='sm' onClick={()=>{setFiltTxt('');setFiltDa('');setFiltA('');setFiltImpMin('');setFiltImpMax('');setFiltStato('');}}>✕ Azzera filtri</Btn>}
            <ViewToggle solo={soloAperte} onChange={setSoloAperte}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',gap:10}}>
          <FilterField label="Cerca (numero, cliente, commessa)">
            <input value={filtTxt} onChange={e=>setFiltTxt(e.target.value)} placeholder="Cerca..." style={inputSt}/>
          </FilterField>
          <FilterField label="Data da">
            <input type="date" value={filtDa} onChange={e=>setFiltDa(e.target.value)} style={inputSt}/>
          </FilterField>
          <FilterField label="Data a">
            <input type="date" value={filtA} onChange={e=>setFiltA(e.target.value)} style={inputSt}/>
          </FilterField>
          <FilterField label="Importo min (€)">
            <input type="number" value={filtImpMin} onChange={e=>setFiltImpMin(e.target.value)} placeholder="0" style={inputSt}/>
          </FilterField>
          <FilterField label="Importo max (€)">
            <input type="number" value={filtImpMax} onChange={e=>setFiltImpMax(e.target.value)} placeholder="∞" style={inputSt}/>
          </FilterField>
          <FilterField label="Stato">
            <select value={filtStato} onChange={e=>setFiltStato(e.target.value)} style={inputSt}>
              <option value="">Tutti</option>
              {statiUnici.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </FilterField>
        </div>
      </Card>

      <Card style={{padding:0}}>
        <div style={{padding:'10px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:13}}>
            {rows.length} fatture {soloAperte?'aperte':'totali'}
            {incassateHidden>0&&<span style={{fontSize:11,color:T.textL,fontWeight:400,marginLeft:8}}> · {incassateHidden} incassate nascoste</span>}
          </span>
        </div>
        <div style={{overflowX:'auto',maxHeight:'calc(100vh - 430px)',overflowY:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr>
              {['Numero','Data','Scadenza','Cliente','Comm.','Tipo','Lordo','Garanzia','Netto','Stato','Note',''].map((h,i)=>(
                <Th key={i} right={i>=6&&i<=8}>{h}</Th>
              ))}
            </tr></thead>
            <tbody>
              {rows.map(f=>{
                const scadMs=f.scadenza?new Date(f.scadenza).getTime():null;
                const diffDays=scadMs?Math.round((scadMs-today.getTime())/86400000):null;
                const isScaduta=f.stato==='Scaduta';
                const isIncassata=f.stato==='Incassata';
                const isUrgente=diffDays!==null&&diffDays<=7&&!isScaduta&&!isIncassata;
                const rowBg=isScaduta?'rgba(220,38,38,.04)':isIncassata?'rgba(22,163,74,.03)':isUrgente?'rgba(217,119,6,.04)':'transparent';
                return (
                  <React.Fragment key={f.id}>
                    <tr style={{background:rowBg,cursor:'pointer'}} onClick={()=>setExpanded(expanded===f.id?null:f.id)}>
                      <Td bold nowrap><span style={{fontFamily:'monospace',fontSize:11}}>{f.num}</span></Td>
                      <Td nowrap>{fmtDate(f.data)}</Td>
                      <Td nowrap>
                        <span style={{color:isScaduta?T.red:isUrgente?T.amber:T.text,fontWeight:isScaduta||isUrgente?700:400}}>
                          {fmtDate(f.scadenza)}
                          {isScaduta&&diffDays!==null?` (${-diffDays}gg)`:isUrgente?` (${diffDays}gg)`:''}
                        </span>
                      </Td>
                      <Td>{f.cliente}</Td>
                      <Td><span style={{background:'#eff6ff',color:'#2563eb',padding:'2px 7px',borderRadius:4,fontSize:11,fontWeight:600}}>{f.commessaCodice||f.commessa||''}</span></Td>
                      <Td><Badge text={f.tipo}/></Td>
                      <Td right>{fmt(f.lordo)}</Td>
                      <Td right color={T.amber}>{(f.garanzia||0)>0?fmt(f.garanzia):'—'}</Td>
                      <Td right bold color={isScaduta?T.red:isIncassata?T.green:T.blue}>{fmt(f.netto)}</Td>
                      <Td><Badge text={f.stato}/></Td>
                      <Td color={T.textL}>{f.note||'—'}</Td>
                      <Td><span style={{color:T.blue,fontSize:11,whiteSpace:'nowrap'}}>{expanded===f.id?'▲':'▼'}</span></Td>
                    </tr>
                    {expanded===f.id&&(
                      <tr><td colSpan={12} style={{padding:'0 16px 14px',background:'#f8fafc',borderBottom:`1px solid ${T.border}`}}>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginTop:8,padding:12,background:'#fff',borderRadius:8,border:`1px solid ${T.border}`}}>
                          {[
                            ['Lordo emesso',fmt(f.lordo),'#1e293b'],
                            ['− Garanzia trattenuta',fmt(f.garanzia||0),T.amber],
                            ['= Netto atteso',fmt(f.netto||0),T.blue],
                            ['Svincolo garanzia',fmtDate(D.garanzie.find(g=>g.ref===f.commessa&&g.tipo==='Attiva')?.svincolo),T.textL],
                            ['Tipo documento',f.tipo,'#64748b'],
                          ].map(([l,v,c],i)=>(
                            <div key={i} style={{textAlign:'center',padding:'10px 8px',background:'#f8fafc',borderRadius:6}}>
                              <div style={{fontSize:10,color:T.textL,marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:.3}}>{l}</div>
                              <div style={{fontSize:14,fontWeight:700,color:c}}>{v||'—'}</div>
                            </div>
                          ))}
                        </div>
                        {f.note&&<div style={{marginTop:6,padding:'6px 12px',background:'#fee2e2',borderRadius:6,fontSize:12,color:T.red}}>⚠ {f.note}</div>}
                      </td></tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
        <TotalsBar items={[
          {label:`${rows.length} doc.`,value:'',color:T.textL},
          {label:'Lordo',value:fmt(totLordo)},
          {label:'Garanzia',value:fmt(totGar),color:T.amber},
          {label:'Netto',value:fmt(totNetto),color:T.green},
          ...(scadute.length>0?[{label:`⚠ ${scadute.length} scadute`,value:fmt(scadute.reduce((a,f)=>a+f.netto,0)),color:T.red}]:[]),
        ]}/>
      </Card>
    </div>
  );
};

/* ─── PAGE: REGOLE ECONOMICHE ────────────────────────────── */
const REGOLE_CATEGORIE=['Acconto','Garanzia','Pagamento','Fatturazione','Compensazione','Scadenza'];
if(!window._regoleCustom) window._regoleCustom=[
  {id:'RC-001',cat:'Acconto',titolo:'Acconto 10% su ogni SAL',desc:'Recupero acconto del 10% applicato proporzionalmente su ogni SAL emesso.',attiva:true},
  {id:'RC-002',cat:'Garanzia',titolo:'Garanzia 5% svincolo 12 mesi',desc:'Ritenuta del 5% su ogni SAL; svincolo a 12 mesi da collaudo. No garanzia su acconto.',attiva:true},
];

const PageRegoleEcon = ({selected})=>{
  const item = selected || D.extra[0];
  const isExtra = D.extra.find(e=>e.id===item.id);
  const [pagMode,setPagMode]=useState('30gg FM');
  const modePag=['30gg','30gg FM','60gg','60+15','90+15','50% 60gg + 50% 90gg','Rate custom'];
  const [regole,setRegole]=useState(window._regoleCustom);
  const [showRForm,setShowRForm]=useState(false);
  const [rCat,setRCat]=useState('Acconto');
  const [rTit,setRTit]=useState('');
  const [rDesc,setRDesc]=useState('');
  const [rEdit,setREdit]=useState(null);

  const salvaRegola=()=>{
    if(!rTit.trim()) return;
    if(rEdit){
      const idx=regole.findIndex(r=>r.id===rEdit.id);
      const updated=[...regole];
      updated[idx]={...updated[idx],cat:rCat,titolo:rTit,desc:rDesc};
      setRegole(updated);window._regoleCustom=updated;
    } else {
      const nuova={id:`RC-${Date.now()}`,cat:rCat,titolo:rTit,desc:rDesc,attiva:true};
      const updated=[...regole,nuova];
      setRegole(updated);window._regoleCustom=updated;
    }
    setShowRForm(false);setREdit(null);setRTit('');setRDesc('');
  };
  const eliminaRegola=(id)=>{
    const updated=regole.filter(r=>r.id!==id);
    setRegole(updated);window._regoleCustom=updated;
  };
  const toggleRegola=(id)=>{
    const updated=regole.map(r=>r.id===id?{...r,attiva:!r.attiva}:r);
    setRegole(updated);window._regoleCustom=updated;
  };

  const scadenzeGenerate = ()=>{
    const base=new Date();
    if(pagMode==='50% 60gg + 50% 90gg') return [
      {data:new Date(base.getTime()+60*864e5).toLocaleDateString('it-IT'),perc:'50%',importo:fmt((item.importo||50000)*0.5)},
      {data:new Date(base.getTime()+90*864e5).toLocaleDateString('it-IT'),perc:'50%',importo:fmt((item.importo||50000)*0.5)},
    ];
    const days={'30gg':30,'30gg FM':45,'60gg':60,'60+15':75,'90+15':105}[pagMode]||30;
    return [{data:new Date(base.getTime()+days*864e5).toLocaleDateString('it-IT'),perc:'100%',importo:fmt(item.importo||50000)}];
  };

  return (
    <div style={{padding:24}}>
      <div style={{background:T.blueL,border:`1px solid #bfdbfe`,borderRadius:8,padding:12,marginBottom:20,display:'flex',gap:12,alignItems:'center'}}>
        <span style={{fontSize:20}}>⚙</span>
        <div><b style={{color:T.blue}}>{item.codice||item.codice}</b> — {item.desc||item.nome} <Badge text={item.stato||'Attiva'}/></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* Acconto */}
        <Card>
          <SectionTitle children="A. Acconto"/>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
            <span style={{background:isExtra?.haAcc?T.greenL:'#f1f5f9',color:isExtra?.haAcc?T.green:T.textL,padding:'2px 8px',borderRadius:12,fontSize:12,fontWeight:600}}>{isExtra?.haAcc?'Attivo':'Non attivo'}</span>
          </div>
          {isExtra?.acc&&<>
            <InfoRow label="Importo" value={fmt(isExtra.acc.importo)}/>
            <InfoRow label="Recuperato" value={fmt(isExtra.acc.recuperato)} color={T.green}/>
            <InfoRow label="Residuo" value={fmt(isExtra.acc.residuo)} color={T.amber}/>
          </>}
          {!isExtra?.haAcc&&<div style={{color:T.textL,fontSize:13}}>Nessun acconto configurato per questo elemento</div>}
        </Card>
        {/* Garanzia */}
        <Card>
          <SectionTitle children="B. Garanzia"/>
          <div style={{marginBottom:12}}><span style={{background:isExtra?.haGar?T.greenL:'#f1f5f9',color:isExtra?.haGar?T.green:T.textL,padding:'2px 8px',borderRadius:12,fontSize:12,fontWeight:600}}>{isExtra?.haGar?'Attiva':'Non attiva'}</span></div>
          {isExtra?.gar&&<>
            <InfoRow label="Percentuale" value={`${isExtra.gar.perc}%`}/>
            <InfoRow label="Importo" value={fmt(isExtra.gar.importo)} color={T.amber}/>
          </>}
        </Card>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {/* Fatturazione */}
        <Card>
          <SectionTitle children="C. Fatturazione"/>
          {['SAL','Milestone','Unica','Libera/Custom'].map(m=>(
            <label key={m} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:'pointer'}}>
              <input type="radio" name="fatt" defaultChecked={m==='SAL'} style={{accentColor:T.blue}}/>
              <span style={{fontSize:13}}>{m}</span>
            </label>
          ))}
        </Card>
        {/* Pagamento */}
        <Card>
          <SectionTitle children="D. Modalità Pagamento"/>
          {modePag.map(m=>(
            <label key={m} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer'}}>
              <input type="radio" name="pag" checked={pagMode===m} onChange={()=>setPagMode(m)} style={{accentColor:T.blue}}/>
              <span style={{fontSize:13}}>{m}</span>
            </label>
          ))}
        </Card>
      </div>
      {/* Scadenze generate */}
      <Card style={{marginBottom:16}}>
        <SectionTitle children={`F. Scadenze generate (modalità: ${pagMode})`}/>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {scadenzeGenerate().map((s,i)=>(
            <div key={i} style={{background:T.blueL,borderRadius:8,padding:12,minWidth:160}}>

/* ─── DUAL-BAR COMPONENT (SAL prod + Fatturato bicolore) ──── */
// Calcola i valori normalizzati su base contratto per una commessa
const calcBarreCommessa = (c)=>{
  // ─── LOGICA KPI GRAFICO ────────────────────────────────────────────
  // SAL produttivo  = avanzamento reale lavori (non influenzato da acconto/garanzia).
  // Acconto residuo GRAFICO = calcolato DINAMICAMENTE proporzionale al SAL:
  //   accResGrafico = acconto.importo × (1 − SAL%)
  //   → a SAL 0%: tutto acconto residuo; a SAL 100%: acconto = 0
  //   → indipendente dalla regola contrattuale specifica (quella resta nel dettaglio)
  // Fatturato grafico = SAL produttivo + acconto residuo grafico
  // Garanzia: trattenuta sul pagamento, NON entra nelle barre.
  // ─────────────────────────────────────────────────────────────────
  // Importo reale contratto (solo > 0, altrimenti niente percentuali)
  const contrReale = Number(c.importoContrattuale) || 0;
  const contr      = contrReale > 0 ? contrReale : 1; // divisore per evitare /0
  // SAL produttivo dinamico: se c.salProdAttivoTot non popolato, calcolalo dalle fatture
  // (acconto + SAL fatturati, escludendo extra/saldo/garanzia/altri ordini)
  let salAbs = Number(c.salProdAttivoTot) || 0;
  if(salAbs===0 && Array.isArray(D.fattureAttive)) {
    const isExtra = (f)=> /\bextra\b|\bbap\b/i.test(f.oggetto||'');
    const isSaldo = (f)=> f.tipoRifOverride==='Saldo' || /saldo|fine\s*lavori/i.test(f.oggetto||'');
    const isGaranzia = (f)=> f.tipoRifOverride==='Garanzia' || /garanzia|svincolo/i.test(f.oggetto||'');
    const impOf = (f)=> (f.imponibile && f.imponibile>0) ? f.imponibile : (f.lordo||0);
    const _root = (s)=> String(s||'').toUpperCase().replace(/\s+/g,'').split('/')[0];
    const ordPrinc = _root(c.nrOrdine||'');
    const estrOrd = (s)=>{ if(!s) return ''; const m=String(s).match(/(?:MYOA\d+(?:\/[A-Z]+)?|OR(?:CA|FO)\/\d{4}\/\d+|OLAV\/\d{4}\/\d+|\d{2}OA\d+|2\d{4}[A-Z]+\d+)/i); return m?_root(m[0]):''; };
    const isMainOrd = (f) => { if(!ordPrinc) return true; const o=estrOrd(f.oggetto); return !o || o===ordPrinc; };
    salAbs = D.fattureAttive.filter(f=>f.commessa===c.id && !isExtra(f) && !isSaldo(f) && !isGaranzia(f) && isMainOrd(f)).reduce((a,f)=>a+impOf(f),0);
  }
  // Se importo contratto non valorizzato (commesse [auto] o non ancora compilate)
  // mostra 0% – non saturare al 100% solo perché il divisore è fittizio
  if(contrReale<=0) {
    return { salPct:0, fattProdPct:0, accResPct:0, fattTotPct:0,
             salAbs, accResAbs:0, fattProdAbs:salAbs, fattTotAbs:salAbs };
  }
  const salRatio   = Math.min(1, salAbs / contr);          // SAL in [0,1]
  const salPct     = salRatio * 100;
  // Acconto residuo grafico: proporzionale, calcolato in tempo reale
  const accontoImp   = c.acconto?.importo || 0;
  const accResGrafico = Math.max(0, accontoImp * (1 - salRatio));
  const fattProdAbs   = salAbs;                             // fatt. produttivo = SAL
  const fattTotAbs    = salAbs + accResGrafico;
  const fattProdPct   = salPct;
  const accResPct     = Math.min(100, accResGrafico / contr * 100);
  const fattTotPct    = Math.min(100, fattTotAbs / contr * 100);
  return {salPct, fattProdPct, accResPct, fattTotPct,
    salAbs, accResAbs: accResGrafico, fattProdAbs, fattTotAbs};
};

// Barra doppia: riga 1 = SAL prod (un colore), riga 2 = Fatturato (2 colori)
const DualProgressBar = ({c, showLabels=true, height=8})=>{
  const {salPct,fattProdPct,accResPct,fattTotPct,salAbs,accResAbs,fattProdAbs,fattTotAbs} = calcBarreCommessa(c);
  const fmt2 = n=>new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
  return (
    <div style={{fontSize:11}}>
      {/* Barra 1: SAL produttivo */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
        <span style={{width:110,color:'#475569',fontWeight:600,flexShrink:0}}>SAL produttivo</span>
        <div style={{flex:1,height,background:'#e2e8f0',borderRadius:4,overflow:'hidden',position:'relative'}}>
          <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${salPct}%`,background:'#2563eb',borderRadius:4,transition:'width .4s'}}
            title={`SAL produttivo: ${fmt2(salAbs)} (${Math.round(salPct)}%)`}/>
        </div>
        <span style={{width:38,textAlign:'right',fontWeight:700,color:'#2563eb',flexShrink:0}}>{Math.round(salPct)}%</span>
      </div>
      {/* Barra 2: Fatturato (fattProd verde + accontoResiduo ambra) */}
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{width:110,color:'#475569',fontWeight:600,flexShrink:0}}>Fatturato tot.</span>
        <div style={{flex:1,height,background:'#e2e8f0',borderRadius:4,overflow:'hidden',position:'relative'}}>
          {/* Segmento verde: fatturato produttivo */}
          <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${fattProdPct}%`,background:'#16a34a',borderRadius:'4px 0 0 4px',transition:'width .4s'}}
            title={`Fatturato produttivo: ${fmt2(fattProdAbs)} (${Math.round(fattProdPct)}%)`}/>
          {/* Segmento ambra: acconto residuo */}
          {accResPct>0.5&&<div style={{position:'absolute',left:`${fattProdPct}%`,top:0,height:'100%',width:`${accResPct}%`,background:'#f59e0b',borderRadius:'0 4px 4px 0',transition:'all .4s'}}
            title={`Acconto residuo: ${fmt2(accResAbs)} (${Math.round(accResPct)}%)`}/>}
        </div>
        <span style={{width:38,textAlign:'right',fontWeight:700,color:'#16a34a',flexShrink:0}}>{Math.round(fattTotPct)}%</span>
      </div>
      {showLabels&&(
        <div style={{display:'flex',gap:14,marginTop:5,fontSize:10,color:'#64748b'}}>
          <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:8,background:'#2563eb',borderRadius:2,display:'inline-block'}}/> SAL produttivo</span>
          <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:8,background:'#16a34a',borderRadius:2,display:'inline-block'}}/> Fatt. produttivo</span>
          <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:8,background:'#f59e0b',borderRadius:2,display:'inline-block'}}/> Acconto residuo</span>
        </div>
      )}
    </div>
  );
};

/* ─── PAGE: ANALISI EXTRA (classifica commesse per % extra) ─ */
const PageAnalisiExtra = ({onNav})=>{
  const [sortKey,setSortKey] = useState('pctExtra'); // 'pctExtra' | 'totExtra' | 'codice' | 'cliente'
  const [sortDir,setSortDir] = useState('desc');
  const impOf = (f) => (f.imponibile && f.imponibile>0) ? f.imponibile : (f.lordo||0);
  const isExtra = (f) => /\bextra\b|\bbap\b/i.test(f.oggetto||'');
  const isSaldo = (f) => f.tipoRifOverride==='Saldo' || /saldo|fine\s*lavori/i.test(f.oggetto||'');
  const isGaranzia = (f) => f.tipoRifOverride==='Garanzia' || /garanzia|svincolo/i.test(f.oggetto||'');
  const ordRoot = (s)=> String(s||'').toUpperCase().replace(/\s+/g,'').split('/')[0];
  const estrOrd = (s)=>{ if(!s) return ''; const m=String(s).match(/(?:MYOA\d+(?:\/[A-Z]+)?|OR(?:CA|FO)\/\d{4}\/\d+|OLAV\/\d{4}\/\d+|\d{2}OA\d+|2\d{4}[A-Z]+\d+)/i); return m?ordRoot(m[0]):''; };

  // Calcolo per ogni commessa
  const rows = D.commesse.filter(c=>c.tipoLavoro==='Commessa').map(c=>{
    const fattureC = D.fattureAttive.filter(f=>f.commessa===c.id);
    const ordPrinc = ordRoot(c.nrOrdine||'');
    const isMainOrd = (f)=> { if(!ordPrinc) return true; const o=estrOrd(f.oggetto); return !o || o===ordPrinc; };
    const fattureSAL = fattureC.filter(f=>!isExtra(f) && !isSaldo(f) && !isGaranzia(f) && isMainOrd(f));
    const fattureExtra = fattureC.filter(f=>isExtra(f) || !isMainOrd(f));
    const totSAL = fattureSAL.reduce((a,f)=>a+impOf(f),0);
    const totExtra = fattureExtra.reduce((a,f)=>a+impOf(f),0);
    const totFatt = totSAL + totExtra;
    const importo = Number(c.importoContrattuale)||0;
    const pctExtra = importo>0 ? (totExtra/importo*100) : 0;
    const pctSAL   = importo>0 ? (totSAL/importo*100) : 0;
    return {c, totSAL, totExtra, totFatt, importo, pctExtra, pctSAL,
            nFattExtra: fattureExtra.length, nFattSAL: fattureSAL.length};
  }).filter(r=>r.totExtra>0 || r.importo>0);

  // Ordina
  const sorted = [...rows].sort((a,b)=>{
    const dir = sortDir==='asc'?1:-1;
    if(sortKey==='pctExtra') return (a.pctExtra-b.pctExtra)*dir;
    if(sortKey==='totExtra') return (a.totExtra-b.totExtra)*dir;
    if(sortKey==='codice')   return a.c.codice.localeCompare(b.c.codice)*dir;
    if(sortKey==='cliente')  return (a.c.cliente||'').localeCompare(b.c.cliente||'')*dir;
    return 0;
  });

  // Totali aggregati
  const totExtraGlobal = rows.reduce((a,r)=>a+r.totExtra,0);
  const totSALGlobal = rows.reduce((a,r)=>a+r.totSAL,0);
  const totContrattoGlobal = rows.reduce((a,r)=>a+r.importo,0);
  const pctExtraGlobal = totContrattoGlobal>0 ? (totExtraGlobal/totContrattoGlobal*100) : 0;
  const commesseConExtra = rows.filter(r=>r.totExtra>0).length;

  const ThSort = ({k,label,right})=>{
    const active=sortKey===k;
    return (
      <th onClick={()=>{ if(active) setSortDir(sortDir==='asc'?'desc':'asc'); else { setSortKey(k); setSortDir('desc'); } }}
        style={{padding:'8px 12px',cursor:'pointer',userSelect:'none',textAlign:right?'right':'left',color:active?T.blue:T.textL,fontWeight:active?700:600,fontSize:11,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`}}>
        {label}{active?(sortDir==='asc'?' ▲':' ▼'):''}
      </th>
    );
  };

  return (
    <div style={{padding:24}}>
      {/* Box info */}
      <div style={{background:T.purpleL,border:`1px solid #c4b5fd`,borderRadius:8,padding:14,marginBottom:18,fontSize:13,color:T.purple}}>
        💡 Questa vista mostra <b>quanto stai fatturando in extra</b> oltre al contratto base, per ciascuna commessa. Più alta è la % Extra, più i lavori effettivi divergono dall'ambito iniziale (utile per analisi redditività e revisioni di prezzo future).
      </div>

      {/* KPI aggregate */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:18}}>
        <KPICard label="Totale Extra fatturati" value={fmt(totExtraGlobal)} sub={`${commesseConExtra} commesse con extra`} color={T.purple} />
        <KPICard label="% Extra media globale" value={pctExtraGlobal.toFixed(1)+'%'} sub={`Su ${fmt(totContrattoGlobal)} di contratti`} color={T.purple} />
        <KPICard label="Totale SAL fatturati" value={fmt(totSALGlobal)} sub="Contratto base" color={T.green} />
        <KPICard label="Commesse analizzate" value={rows.length} sub="Solo tipo Commessa" color={T.blue} />
      </div>

      {/* Tabella classifica */}
      <Card style={{padding:0}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:14,background:'#f8fafc',borderRadius:'8px 8px 0 0'}}>
          📊 Classifica Commesse per Extra ({sorted.length})
          <span style={{fontWeight:400,color:T.textL,marginLeft:8,fontSize:11}}>click su colonna per ordinare</span>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{background:'#f8fafc'}}>
                <ThSort k="codice" label="Commessa"/>
                <ThSort k="cliente" label="Cliente"/>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.textL,fontSize:11,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`}}>Contratto</th>
                <th style={{padding:'8px 12px',textAlign:'right',color:T.textL,fontSize:11,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`}}>SAL fatturato</th>
                <ThSort k="totExtra" label="Extra fatturato" right/>
                <ThSort k="pctExtra" label="% Extra" right/>
                <th style={{padding:'8px 12px',textAlign:'left',color:T.textL,fontSize:11,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`}}>Bar</th>
                <th style={{padding:'8px 12px',textAlign:'center',color:T.textL,fontSize:11,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`}}>Apri</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(r=>{
                const danger = r.pctExtra>30;
                const warn = r.pctExtra>15 && r.pctExtra<=30;
                return (
                  <tr key={r.c.id} style={{borderTop:`1px solid ${T.border}`,background:danger?'rgba(168,85,247,0.06)':'transparent'}}>
                    <td style={{padding:'8px 12px'}}>
                      <div style={{fontWeight:700,color:T.blue,cursor:'pointer'}} onClick={()=>onNav('dettaglioCommessa',r.c)}>{r.c.codice}</div>
                      <div style={{fontSize:10,color:T.textL,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.c.nome}</div>
                    </td>
                    <td style={{padding:'8px 12px',color:T.textL,fontSize:11,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.c.cliente}</td>
                    <td style={{padding:'8px 12px',textAlign:'right',fontWeight:600}}>{r.importo>0?fmt(r.importo):<span style={{color:T.textL,fontStyle:'italic'}}>n/d</span>}</td>
                    <td style={{padding:'8px 12px',textAlign:'right',color:T.green,fontWeight:600}}>{fmt(r.totSAL)}</td>
                    <td style={{padding:'8px 12px',textAlign:'right',color:T.purple,fontWeight:700}}>{fmt(r.totExtra)}</td>
                    <td style={{padding:'8px 12px',textAlign:'right',fontWeight:800,fontSize:14,color:danger?T.red:warn?'#92400e':T.purple}}>
                      {r.importo>0?r.pctExtra.toFixed(1)+'%':'—'}
                    </td>
                    <td style={{padding:'8px 12px',minWidth:120}}>
                      {r.importo>0 && (
                        <div style={{height:8,background:'#e2e8f0',borderRadius:4,overflow:'hidden',position:'relative'}}>
                          <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${Math.min(100,r.pctSAL)}%`,background:T.green}}/>
                          <div style={{position:'absolute',left:`${Math.min(100,r.pctSAL)}%`,top:0,height:'100%',width:`${Math.min(100-r.pctSAL,r.pctExtra)}%`,background:T.purple}}/>
                        </div>
                      )}
                    </td>
                    <td style={{padding:'8px 12px',textAlign:'center'}}>
                      <Btn variant='ghost' size='sm' onClick={()=>onNav('dettaglioCommessa',r.c)}>→</Btn>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>

      <div style={{marginTop:14,fontSize:11,color:T.textL,display:'flex',gap:14}}>
        <span><span style={{display:'inline-block',width:10,height:10,background:T.green,borderRadius:2,marginRight:4,verticalAlign:'middle'}}/>SAL contratto base</span>
        <span><span style={{display:'inline-block',width:10,height:10,background:T.purple,borderRadius:2,marginRight:4,verticalAlign:'middle'}}/>Extra fatturati</span>
        <span style={{marginLeft:'auto'}}>Soglia attenzione: % Extra &gt; 15% (ambra), &gt; 30% (rosso)</span>
      </div>
    </div>
  );
};
