/* ─── FIC LINK ENGINE ───────────────────────────────────────
   Parser dinamico: legge l'oggetto fattura (campo libero che
   il cliente/subappaltatore scrive) e cerca codici del tipo:
     [C167/SAL3]     → commessa C167, SAL n.3
     [C167/ACC]      → commessa C167, acconto
     [C167/E12-3]    → commessa C167, extra E12 SAL3
     [C167/E12-3/SAL2] → commessa+extra+sal
     [C167/COLL]     → commessa C167, collaudo
     [C167/DL]       → commessa C167, direzione lavori
   Case-insensitive. Se l'oggetto contiene più codici prende il primo.
*/
/* Pattern #0 (priorità alta): bracket notation per commesse create manualmente.
   Es: [C167/SAL2], [C167/ACC], [C167/E12-3/SAL2], [C167/COLL], [C167/DL] */
const RE_BRACKET = /\[\s*([A-Z]\d+)\s*\/\s*(SAL\d+|ACC|COLL|DL|E\d+(?:-\d+)?(?:\/SAL\d+)?)\s*\]/i;

/* Pattern #1 — TISG / The Italian Sea Group
   Casi gestiti:
     "COMM 617 - ORDINE N. ORCA/2025/00511"      (numerico puro)
     "COMM 600/606 - ORDINE N. ORFO/2025/01733"  (commessa multi)
     "COMM 604 - ORDINE ORFO/2025/03331"         (senza "N.")
     "COMM 602 - ORDINE N.ORFO/2025/00949"       (no spazio dopo N.)
     "COMM C. 598 - ORDINE N ORFO/..."           (prefisso ruolo C.)
     "COMM G-602 - ORDINE ..."                   (prefisso ruolo G-)
     "COMM GAR 602 - ORDINE ..."                 (prefisso ruolo GAR)
     "COMM MARAYAH - ORDINE ..."                 (commessa con nome)
     "COMM MY13705 - ORDINE ..."                 (alfanumerico)
     "COMM R21C2303 - ORDINE ..."                (alfanumerico)  */
const RE_TISG_OUTER = /\bCOMM\.?\s+(.+?)(?:\s*[-—]\s*ORDINE|$)/i;
const RE_TISG_PREFIX = /^(?:C|G|GAR|R)[.\-\s]+/i;
const RE_TISG_TOKEN = /^([A-Z0-9][A-Z0-9\-/.]*)/i;
const RE_TISG_ORDINE = /ORDINE\s+N?\.?\s*([A-Z]+)[\s/]+(\d{4})[\s/]+(\d+)/i;

/* Pattern #2 — Azimut-Benetti
   Es: "BXL002 ORDINE MYOA25004795/APP"
       "BMP501 ORDINE MYOA24015011/APP"
       "BX107 BAP ORDINE MYOA25024650"
       "BX103 AFS" / "BX105 EXTRA" / "BL000 ORDINE MYOA25006923/INV" */
const RE_AZIMUT = /\b(B[A-Z]{1,3}\d{3}[A-Z]?)\b(?:\s+(?:BAP\s+)?(?:ORDINE\s+N?\.?\s*([A-Z0-9/]+))?)?/i;

/* Pattern #3 — Sanlorenzo (formato lettere: SLA/SLM/XSP + codice/numero)
   Es: "SLA044/169 ORDINE N 24OA08386"
       "SLM052N/172 ORDINE N 23OA35223"
       "XSP045/208 ORDINE 25OA37197"
       "SLA44/163 - ORDINE N 22OA39743"  (senza zero iniziale) */
const RE_SL_LETTER = /\b((?:SLA|SLM|XSP)\d{2,4}N?\s*\/\s*\d+)\b(?:[^A-Z0-9]*ORDINE\s+N?\.?\s*([A-Z0-9]+))?/i;

/* Pattern #4 — Sanlorenzo (formato numerico puro: 5 cifre, eventualmente con N)
   Es: "14952 ORDINE N 25OA14921"
       "17252N ORDINE N 24OA37183"
       "16144 - ORDINE N 22OA36272"
       "COMM 16144 - ORDINE N 22OA42961"
       "MY ABSOLUTELY 16144 - ORDINE N 25OA26183" */
const RE_SL_NUM = /\b(\d{5}N?)\b(?:[^A-Z0-9]*ORDINE\s+N?\.?\s*([A-Z0-9]+))?/i;

/* Normalizza il codice commessa: uppercase, rimuove spazi interni per /. */
const normCodice = (s)=> String(s||'').toUpperCase().replace(/\s+/g,'');

/* Pre-normalizzazione oggetto: tollera spazi nei codici noti.
   Es: "BMP 501" → "BMP501", "bmp  501" → "BMP501",
       "SLA 044 / 169" → "SLA044/169",
       "B  X  107" → "BX107" */
const preNormOggetto = (s)=>{
  if(!s) return '';
  return String(s)
    .replace(/\b(B)\s*([A-Z]{1,3})\s*(\d{3,4}[A-Z]?)\b/gi, '$1$2$3')
    .replace(/\b(SLA|SLM|XSP)\s*(\d{2,4}N?)\s*\/\s*(\d+)/gi, '$1$2/$3')
    .replace(/\b(\d{5}N?)\s*\/\s*(\d+)\b/gi, '$1/$2');
};

const parseCodiceCommessa = (oggetto)=>{
  if(!oggetto) return null;
  const s = preNormOggetto(oggetto);

  // #0 bracket — retro-compatibile con commesse generate manualmente
  const mB = s.match(RE_BRACKET);
  if(mB) {
    const codice = mB[1].toUpperCase();
    const rif = mB[2].toUpperCase();
    let tipo='SAL', salNum=null, extraId=null;
    if(rif.startsWith('SAL')) { tipo='SAL'; salNum=parseInt(rif.slice(3))||null; }
    else if(rif==='ACC') tipo='Acconto';
    else if(rif==='COLL') tipo='Collaudo';
    else if(rif==='DL') tipo='DL';
    else if(rif.startsWith('E')) {
      tipo='Extra';
      const parts = rif.split('/');
      extraId = parts[0];
      if(parts[1]&&parts[1].startsWith('SAL')) salNum=parseInt(parts[1].slice(3))||null;
    }
    return { codice, tipo, salNum, extraId, raw: mB[0], ordine: null, cliente: 'BRACKET' };
  }

  // #1 TISG — estrae la parte fra "COMM " e "- ORDINE", poi rimuove i
  // prefissi ruolo (C./G./GAR/R.) e prende il primo token come codice.
  const mT = s.match(RE_TISG_OUTER);
  if(mT) {
    let codPart = mT[1].toUpperCase().trim().replace(RE_TISG_PREFIX,'');
    const tok = codPart.match(RE_TISG_TOKEN);
    if(tok) {
      const codMulti = tok[1].replace(/\s+/g,'');
      const codice = codMulti.split('/')[0];
      const mOrd = s.match(RE_TISG_ORDINE);
      const ordine = mOrd ? `${mOrd[1].toUpperCase()}/${mOrd[2]}/${mOrd[3]}` : null;
      return { codice, tipo:'SAL', salNum:null, extraId:null, raw: mT[0],
               ordine, cliente:'TISG', codiceMulti: codMulti.indexOf('/')>=0 ? codMulti : null };
    }
  }

  // #2 Azimut — priorità su #3/#4 per evitare falsi positivi con "BXL001"
  const mA = s.match(RE_AZIMUT);
  if(mA) {
    const codice = normCodice(mA[1]);
    const ordine = mA[2] ? normCodice(mA[2]) : null;
    return { codice, tipo:'SAL', salNum:null, extraId:null, raw: mA[0], ordine, cliente:'AZIMUT' };
  }

  // #3 Sanlorenzo lettere
  const mSl = s.match(RE_SL_LETTER);
  if(mSl) {
    const codice = normCodice(mSl[1]);
    const ordine = mSl[2] ? normCodice(mSl[2]) : null;
    return { codice, tipo:'SAL', salNum:null, extraId:null, raw: mSl[0], ordine, cliente:'SANLORENZO' };
  }

  // #4 Sanlorenzo numerico (fallback)
  const mSn = s.match(RE_SL_NUM);
  if(mSn) {
    const codice = normCodice(mSn[1]);
    const ordine = mSn[2] ? normCodice(mSn[2]) : null;
    return { codice, tipo:'SAL', salNum:null, extraId:null, raw: mSn[0], ordine, cliente:'SANLORENZO' };
  }

  return null;
};

/* Calcola garanzia dinamicamente dalla config commessa */
const calcolaGaranzia = (fattura, commessa)=>{
  if(!commessa) return 0;
  if(fattura.tipoRif==='Acconto') return 0; // acconti mai garanzia
  // Se la commessa ha REGOLE DI PAGAMENTO con saldo/garanzia come milestone separate
  // (es. Benetti 10/84/3/3), allora NON trattenere garanzia su ogni fattura SAL:
  // il 3% saldo e il 3% garanzia verranno fatturati come rate separate alla fine.
  const ms = commessa.regolePagamento?.milestone || [];
  if(ms.length > 0) {
    const hasMsSeparate = ms.some(m => m.tipo==='garanzia' || m.tipo==='saldo');
    if(hasMsSeparate) return 0;
  }
  if(!commessa.garanzia) return 0;
  const g = commessa.garanzia;
  if(g.tipo==='Percentuale') {
    const perc = parseFloat(g.val)||0;
    return Math.round((fattura.lordo||0) * perc / 100);
  }
  if(g.tipo==='Importo fisso') {
    const tot = parseFloat(g.val)||0;
    const impContr = commessa.importoContrattuale||0;
    if(impContr<=0) return 0;
    return Math.round(tot * (fattura.lordo||0) / impContr);
  }
  return 0;
};

/* Link dinamico: applica parser su ogni fattura e aggancia a commessa se esiste.
   La corrispondenza è sul campo commesse.codice (case-insensitive, normalizzato).  */
const linkFatture = ()=>{
  const byCode = new Map();
  const byOrdine = new Map(); // numero ordine cliente → commessa (univoco)
  D.commesse.forEach(c=>{
    if(c.codice) byCode.set(normCodice(c.codice), c);
    if(c.nrOrdine) byOrdine.set(normCodice(c.nrOrdine), c);
  });

  /* Match per numero ordine: cerca nell'oggetto se c'è il nrOrdine di una commessa */
  const matchByOrdine = (oggetto)=>{
    if(!oggetto || byOrdine.size===0) return null;
    const og = normCodice(oggetto);
    for(const [nrOrd, comm] of byOrdine.entries()) {
      if(nrOrd && og.includes(nrOrd)) return comm;
    }
    return null;
  };

  /* Fuzzy match: se il codice esatto non c'è, prova match parziale.
     Ritorna {commessa, fuzzy:true} solo se UNICA candidata, altrimenti null. */
  const fuzzyMatch = (codice)=>{
    if(!codice) return null;
    const n = normCodice(codice);
    // 1. endsWith (es. "501" → "BMP501" se unico)
    let cand = [...byCode.entries()].filter(([k])=>k.endsWith(n));
    if(cand.length===1) return cand[0][1];
    // 2. contains
    cand = [...byCode.entries()].filter(([k])=>k.includes(n));
    if(cand.length===1) return cand[0][1];
    return null;
  };

  /* Scan oggetto per cluster di cifre (3-5) e prova fuzzy su ognuno */
  const fuzzyFromOggetto = (oggetto)=>{
    if(!oggetto) return null;
    const matches = String(oggetto).match(/\d{3,5}/g) || [];
    for(const m of matches) {
      const c = fuzzyMatch(m);
      if(c) return c;
    }
    return null;
  };

  const applyOn = (arr)=>{
    arr.forEach(f=>{
      // Priorità #0: match per numero ordine (univoco, manuale)
      const cByOrd = matchByOrdine(f.oggetto);
      if(cByOrd) {
        f.commessa = cByOrd.id;
        f.commessaCodice = cByOrd.codice;
        f.statoLink = 'AssegnataOrdine';
        f.linkFuzzy = false;
        f.matchedBy = 'nrOrdine';
        f.tipoRif = null; f.salNum = null; f.codiceMulti = null;
        f.garanzia = calcolaGaranzia(f, cByOrd);
        f.netto = Math.max(0, (f.lordo||0) - (f.garanzia||0) - (f.compGen||0) - (f.compSub||0));
        return;
      }
      const parsed = parseCodiceCommessa(f.oggetto);
      if(parsed) {
        let c = byCode.get(parsed.codice);
        let fuzzy = false;
        if(!c) {
          c = fuzzyMatch(parsed.codice);
          fuzzy = !!c;
        }
        f.codiceRaw = parsed.raw;
        // Override manuale (tipo_rif salvato in DB) ha priorità sul parser
        f.tipoRif = f.tipoRifOverride || parsed.tipo;
        f.salNum = parsed.salNum;
        f.extraId = parsed.extraId;
        f.ordine = parsed.ordine||null;
        f.codiceMulti = parsed.codiceMulti||null;
        f.linkFuzzy = fuzzy;
        if(c) {
          f.commessa = c.id;
          f.commessaCodice = c.codice;
          f.sal = parsed.salNum;
          f.statoLink = fuzzy ? 'AssegnataFuzzy' : 'Assegnata';
          // ricalcolo garanzia dinamica
          f.garanzia = calcolaGaranzia(f, c);
          f.netto = Math.max(0, (f.lordo||0) - (f.garanzia||0) - (f.compGen||0) - (f.compSub||0));
        } else {
          // codice presente ma commessa non ancora creata → orfana "in attesa"
          f.commessa = null;
          f.commessaCodice = parsed.codice;
          f.statoLink = 'InAttesa';
        }
      } else {
        // Parser non ha trovato pattern noto: tenta fuzzy puro su numeri nell'oggetto
        const c = fuzzyFromOggetto(f.oggetto);
        if(c) {
          f.commessa = c.id;
          f.commessaCodice = c.codice;
          f.statoLink = 'AssegnataFuzzy';
          f.linkFuzzy = true;
          f.tipoRif = null;
          f.salNum = null;
          f.ordine = null;
          f.codiceMulti = null;
          f.garanzia = calcolaGaranzia(f, c);
          f.netto = Math.max(0, (f.lordo||0) - (f.garanzia||0) - (f.compGen||0) - (f.compSub||0));
          return;
        }
        f.commessa = f.commessa||null;
        // Lookup inverso: se la fattura ha già un UUID commessa salvato in DB, recupera il codice
        if(f.commessa) {
          const existing = D.commesse.find(c => c.id === f.commessa);
          f.commessaCodice = existing ? existing.codice : null;
          f.statoLink = existing ? 'Assegnata' : 'NonAssegnata';
        } else {
          f.commessaCodice = null;
          f.statoLink = 'NonAssegnata';
        }
        f.tipoRif = null;
        f.salNum = null;
        f.ordine = null;
        f.codiceMulti = null;
      }
    });
  };
  applyOn(D.fattureAttive);
  applyOn(D.fatturePassive);
};

/* Ricalcola KPI (chiamato dopo ogni link/sync) */
const ricalcolaKPI = ()=>{
  KPI.daIncassareNetto = D.fattureAttive.reduce((a,f)=>a+(f.netto||0),0);
  KPI.daIncassareNettoAperte = D.fattureAttive.filter(f=>f.stato!=='Incassata').reduce((a,f)=>a+(f.netto||0),0);
  KPI.daPagareNetto = D.fatturePassive.reduce((a,f)=>a+(f.netto||0),0);
  const anno = new Date().getFullYear();
  KPI.fatturatoMarzo = D.fattureAttive.filter(f=>f.data&&f.data.startsWith(anno+'-03')).reduce((a,f)=>a+(f.lordo||0),0);
  KPI.fatturatoFeb   = D.fattureAttive.filter(f=>f.data&&f.data.startsWith(anno+'-02')).reduce((a,f)=>a+(f.lordo||0),0);
  KPI.fatturatoGen   = D.fattureAttive.filter(f=>f.data&&f.data.startsWith(anno+'-01')).reduce((a,f)=>a+(f.lordo||0),0);
  KPI.commesseAttive = D.commesse.filter(c=>c.stato==='Attiva').length;
  KPI.ordiniAttivi = D.commesse.filter(c=>c.tipoLavoro==='Ordine'&&c.stato==='Attiva').length;
  KPI.fattureOrfane = [...D.fattureAttive,...D.fatturePassive].filter(f=>f.statoLink==='NonAssegnata').length;
  KPI.fattureInAttesa = [...D.fattureAttive,...D.fatturePassive].filter(f=>f.statoLink==='InAttesa').length;
};

async function loadFromSupabase() {
  // Fetch con tolleranza 404 (tabella commesse potrebbe non esistere ancora)
  const safeFetch = async (url)=>{ try { const r = await fetch(url,{headers:SB_H}); return r.ok?await r.json():[]; } catch { return []; } };
  const [attive, passive, ana, commesse, modPag, tplReg] = await Promise.all([
    safeFetch(`${SB_URL}/rest/v1/fatture_attive?select=*&order=data.desc`),
    safeFetch(`${SB_URL}/rest/v1/fatture_passive?select=*&order=data.desc`),
    safeFetch(`${SB_URL}/rest/v1/anagrafica?select=*&order=nome.asc`),
    safeFetch(`${SB_URL}/rest/v1/commesse?select=*&order=codice.asc`),
    safeFetch(`${SB_URL}/rest/v1/modalita_pagamento?select=*&order=nome.asc`),
    safeFetch(`${SB_URL}/rest/v1/template_regole_pagamento?select=*&order=nome.asc`),
  ]);
  if(!D.modalitaPagamento) D.modalitaPagamento = [];
  D.modalitaPagamento.splice(0);
  modPag.forEach(m=>D.modalitaPagamento.push({
    id:m.id, nome:m.nome, strumento:m.strumento, giorni:m.giorni,
    riferimento:m.riferimento, giorniExtra:m.giorni_extra, note:m.note||'',
  }));

// ── GlobalSearch: overlay di ricerca globale (Ctrl+K) ─────────
const GlobalSearch = ({onNav,onClose})=>{
  const [q,setQ]=useState('');
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[onClose]);

  const results=useMemo(()=>{
    if(!q.trim()||q.length<2) return [];
    const ql=q.toLowerCase(); const res=[];
    D.commesse.filter(c=>(c.codice+c.nome+c.cliente).toLowerCase().includes(ql))
      .slice(0,4).forEach(c=>res.push({type:'Commessa',label:`${c.codice} – ${c.nome}`,sub:c.cliente,
        action:()=>onNav('dettaglioCommessa',c)}));
    D.fattureAttive.filter(f=>(f.num+f.cliente+(f.commessa||'')).toLowerCase().includes(ql))
      .slice(0,3).forEach(f=>res.push({type:'Fattura Attiva',label:f.num,sub:`${f.cliente} · ${fmt(f.lordo)}`,
        action:()=>onNav('fattureAttive')}));
    D.fatturePassive.filter(f=>(f.num+f.fornitore+(f.commessa||'')).toLowerCase().includes(ql))
      .slice(0,3).forEach(f=>res.push({type:'Fattura Passiva',label:f.num,sub:`${f.fornitore} · ${fmt(f.lordo)}`,
        action:()=>onNav('fatturePassive')}));
    D.fornitoriGenerici.filter(f=>f.nome.toLowerCase().includes(ql))
      .slice(0,3).forEach(f=>res.push({type:f.cat==='Utenze'?'Utenza':'Fornitore',label:f.nome,sub:f.cat,
        action:()=>onNav(f.cat==='Utenze'?'utenze':'fornitori')}));
    D.anagrafica.filter(a=>a.nome.toLowerCase().includes(ql))
      .slice(0,3).forEach(a=>res.push({type:'Anagrafica',label:a.nome,sub:a.tipo,
        action:()=>onNav('anagrafica')}));
    return res;
  },[q]);

  const TC={'Commessa':'#2563eb','Fattura Attiva':'#16a34a','Fattura Passiva':'#dc2626','Utenza':'#d97706','Fornitore':'#7c3aed','Anagrafica':'#64748b'};

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:2000,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:72}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 25px 60px rgba(0,0,0,.25)',width:'100%',maxWidth:560,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:`1px solid #e2e8f0`}}>
          <span style={{fontSize:15,color:'#64748b'}}>🔍</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="Cerca commesse, fatture, fornitori, utenze..."
            style={{flex:1,border:'none',outline:'none',fontSize:14,color:'#1e293b',background:'transparent'}}/>
          <kbd onClick={onClose} style={{fontSize:10,color:'#64748b',border:`1px solid #e2e8f0`,borderRadius:4,padding:'2px 6px',cursor:'pointer',fontFamily:'monospace'}}>ESC</kbd>
        </div>
        {results.length>0?(
          <div style={{maxHeight:380,overflowY:'auto'}}>
            {results.map((r,i)=>(
              <div key={i} onClick={()=>{r.action();onClose();}}
                style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',cursor:'pointer',borderBottom:`1px solid #f8fafc`,transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <span style={{background:TC[r.type]||'#64748b',color:'#fff',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700,flexShrink:0,minWidth:80,textAlign:'center'}}>{r.type}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.label}</div>
                  {r.sub&&<div style={{fontSize:11,color:'#64748b'}}>{r.sub}</div>}
                </div>
                <span style={{color:'#2563eb',fontSize:12}}>→</span>
              </div>
            ))}
          </div>
        ):q.length>=2?(
          <div style={{padding:'24px 16px',textAlign:'center',color:'#64748b',fontSize:13}}>Nessun risultato per "<b>{q}</b>"</div>
        ):(
          <div style={{padding:'16px'}}>
            <div style={{fontSize:11,color:'#64748b',fontWeight:600,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Suggerimenti rapidi</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['commessa','fattura','sanlorenzo','bianchi','enel','utenze'].map(h=>(
                <span key={h} onClick={()=>setQ(h)} style={{background:'#f1f5f9',padding:'5px 12px',borderRadius:20,cursor:'pointer',fontSize:12,color:'#1e293b'}}>{h}</span>
              ))}
            </div>
            <div style={{marginTop:12,fontSize:11,color:'#94a3b8'}}>Cerca in commesse, fatture, fornitori, anagrafica</div>
          </div>
        )}
      </div>
    </div>
  );
};

      <div style={{padding:'0 10px 10px'}}>
        <button type="button" onClick={onSearch}
          style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'rgba(255,255,255,.07)',border:`1px solid rgba(255,255,255,.1)`,borderRadius:7,padding:'7px 10px',cursor:'pointer',color:'#8ba3c1',fontSize:12}}>
          <span style={{fontSize:13}}>🔍</span>
          <span style={{flex:1,textAlign:'left'}}>Cerca...</span>
          <kbd style={{fontSize:9,background:'rgba(255,255,255,.1)',border:'none',borderRadius:3,padding:'1px 5px',color:'#8ba3c1',fontFamily:'monospace'}}>⌘K</kbd>
        </button>
      </div>
      <div style={{flex:1,paddingBottom:16}}>
        {NAV.map((n,i)=>{
          if(n.section){
            // Salta sezione AVANZATO se tutte le sue voci sono nascoste dalla lista principale
            return <div key={i} style={{padding:'12px 16px 4px',fontSize:10,fontWeight:700,color:'#4a6080',letterSpacing:1,textTransform:'uppercase'}}>{n.section}</div>;
          }
          const isActive=page===n.id;
          const isMain=mainPages.includes(n.id);
          return (
            <div key={n.id} onClick={()=>onNav(n.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'7px 16px',cursor:'pointer',
                color:isActive?T.sidebarTxtAct:isMain?T.sidebarTxt:'#4a6080',
                background:isActive?T.sidebarAct:'transparent',
                margin:'1px 0',transition:'background .1s',
                opacity:isMain?1:.85,
                fontSize:isMain?12:11.5}}
              onMouseEnter={e=>!isActive&&(e.currentTarget.style.background=T.sidebarHov)}
              onMouseLeave={e=>!isActive&&(e.currentTarget.style.background='transparent')}>
              <span style={{fontSize:isMain?13:12,width:16,textAlign:'center'}}>{n.icon}</span>
              <span style={{fontWeight:isActive?600:isMain?400:300}}>{n.label}</span>
            </div>
          );
        })}
      </div>
      <div style={{padding:12,borderTop:'1px solid #1a2744'}}>
        <div style={{fontSize:11,color:'#4a6080'}}>Demo · Mar 2024</div>
      </div>
    </div>
  );
};

/* ─── PAGE: DASHBOARD ────────────────────────────────────── */
const PageDashboard = ({onNav,openModal})=>{
  const [meseKpi,setMeseKpi]=useState(new Date().toISOString().slice(0,7));
  const [detailPanel,setDetailPanel]=useState(null); // 'utenze30' | 'fornMat30' | null
  // Filtri fatture in dashboard
  const [attStato,setAttStato]=useState('');
  const [attComm,setAttComm]=useState('');
  const [attCli,setAttCli]=useState('');
  const [attSort,setAttSort]=useState('scadenza');
  const [pasStato,setPasStato]=useState('');
  const [pasComm,setPasComm]=useState('');
  const [pasForn,setPasForn]=useState('');
  const [pasSort,setPasSort]=useState('scadenza');

  const AlertItem = ({text,color,commessa})=>(
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:`1px solid ${T.border}`}}>
      <span style={{width:8,height:8,borderRadius:'50%',background:color,flexShrink:0}}/>
      <span style={{flex:1,fontSize:13}}>{text}</span>
      {commessa&&<span style={{fontSize:11,color:T.blue,cursor:'pointer'}} onClick={()=>onNav('watchlist')}>→</span>}
    </div>
  );

  // Fatturato del mese con filtro
  const mesiDisp=[{val:'2026-01',label:'Gen 2026'},{val:'2026-02',label:'Feb 2026'},{val:'2026-03',label:'Mar 2026'},{val:'2026-04',label:'Apr 2026'}];
  const fattMeseFatture = D.fattureAttive.filter(f=>f.data&&f.data.startsWith(meseKpi));
  const fattMeseTot = fattMeseFatture.reduce((a,f)=>a+f.lordo,0);

  // ─── KPI 30gg: usa solo movimenti aperti con scadenza entro 30 giorni ───
  const oggi30 = new Date(today.getTime() + 30*86400000);
  const righe30gg = (lista) => lista.flatMap(f=>
    (f.movimenti||[])
      .filter(m=>m.stato==='Aperta'&&m.scadenza&&new Date(m.scadenza)<=oggi30)
      .map(m=>({fornitore:f.nome,cat:f.cat,num:m.num,scadenza:m.scadenza,importo:m.importo,stato:m.stato,note:f.note||''}))
  ).sort((a,b)=>a.scadenza.localeCompare(b.scadenza));

  const utenze30Rows   = righe30gg(D.fornitoriGenerici.filter(f=>f.cat==='Utenze'));
  const fornMat30Rows  = righe30gg(D.fornitoriGenerici.filter(f=>f.cat!=='Utenze'));
  const totUtenze30    = utenze30Rows.reduce((a,r)=>a+r.importo,0);
  const totFornMat30   = fornMat30Rows.reduce((a,r)=>a+r.importo,0);

  const toggleDetail = (tipo)=> setDetailPanel(prev=>prev===tipo?null:tipo);

  // Helper tabella dettaglio 30gg
  const TabellaDettaglio30 = ({rows})=>{
    if(!rows.length) return <div style={{padding:16,color:T.textL,textAlign:'center',fontSize:13}}>Nessuna scadenza nei prossimi 30 giorni.</div>;
    return (
      <Table headers={[{label:'Fornitore'},{label:'Categoria'},{label:'Documento'},{label:'Scadenza'},{label:'Importo',right:true},{label:'Stato'},{label:'Note'}]}>
        {rows.map((r,i)=>{
          const scadMs=new Date(r.scadenza).getTime();
          const diff=Math.round((scadMs-today.getTime())/86400000);
          const urgent=diff<=7;
          return (
            <tr key={i} style={{background:urgent?'rgba(220,38,38,.04)':'transparent'}}>
              <Td bold>{r.fornitore}</Td>
              <Td><Badge text={r.cat}/></Td>
              <Td><span style={{fontFamily:'monospace',fontSize:11}}>{r.num}</span></Td>
              <Td nowrap><span style={{color:urgent?T.red:T.text,fontWeight:urgent?700:400}}>{fmtDate(r.scadenza)}{urgent?` (${diff}gg)`:''}</span></Td>
              <Td right bold color={T.red}>{fmt(r.importo)}</Td>
              <Td><Badge text={r.stato}/></Td>
              <Td color={T.textL}>{r.note||'—'}</Td>
            </tr>
          );
        })}
      </Table>
    );
  };

  return (
    <div style={{padding:24}}>
      {/* KPI Row 1 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:14}}>
        <div style={{background:T.white,borderRadius:10,boxShadow:T.sh,padding:16,borderLeft:`4px solid ${T.green}`,cursor:'pointer'}} onClick={()=>openModal('fattMese',{mese:meseKpi,fatture:fattMeseFatture})}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
            <span style={{fontSize:10,fontWeight:700,color:T.textL,textTransform:'uppercase',letterSpacing:.5}}>FATTURATO DEL MESE</span>
            <select value={meseKpi} onChange={e=>{e.stopPropagation();setMeseKpi(e.target.value)}}
              style={{border:`1px solid ${T.border}`,borderRadius:4,padding:'1px 4px',fontSize:10,cursor:'pointer',background:'#f8fafc'}}
              onClick={e=>e.stopPropagation()}>
              {mesiDisp.map(m=><option key={m.val} value={m.val}>{m.label}</option>)}
            </select>
          </div>
          <div style={{fontSize:24,fontWeight:800,color:T.green,marginBottom:2}}>{fmt(fattMeseTot)}</div>
          <div style={{fontSize:11,color:T.textL}}>{fattMeseFatture.length} fatture · {mesiDisp.find(m=>m.val===meseKpi)?.label}</div>
          <div style={{fontSize:11,color:T.blue,marginTop:4}}>→ Vedi dettaglio</div>
        </div>
        <KPICard label="Da incassare netto" value={fmt(KPI.daIncassareNettoAperte)} sub={`−${fmt(KPI.ncAttiveTot)} note credito`} color={T.green} icon="↗"
          onClick={()=>openModal('daIncassare')} />
        <KPICard label="Da pagare netto" value={fmt(KPI.daPagareNetto)} sub={`−${fmt(KPI.ncPassiveTot)} note credito`} color={T.red} icon="↙"
          onClick={()=>openModal('daPagare')} />
        <KPICard label="Acconti residui" value={fmt(KPI.accontiResiduo)} sub="Da recuperare su SAL futuri" color={T.purple} icon="↩"
          onClick={()=>openModal('acconti')} />
        <KPICard label="Garanzia maturata" value={fmt(KPI.garanzieMaturate)} sub="Trattenuta pagamenti, non ancora incassata" color={T.amber} icon="🔒"
          onClick={()=>openModal('garanzie')} />
      </div>

      {/* KPI Row 2 – rimuovere "Garanzie attive totale", aggiungere Utenze 30gg + Fornitori 30gg */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:14,marginBottom:24}}>
        {/* ⚡ Utenze prossimi 30gg – clicca per dettaglio */}
        <div onClick={()=>toggleDetail('utenze30')}
          style={{outline:detailPanel==='utenze30'?`2.5px solid ${T.amber}`:'none',borderRadius:10,cursor:'pointer'}}>
          <KPICard label="⚡ Utenze 30gg" value={fmt(totUtenze30)}
            sub={`${utenze30Rows.length} scadenze imminenti · clicca`} color={T.amber} icon="📅" />
        </div>
        {/* 🏗 Fornitori mat/servizi prossimi 30gg */}
        <div onClick={()=>toggleDetail('fornMat30')}
          style={{outline:detailPanel==='fornMat30'?`2.5px solid ${T.red}`:'none',borderRadius:10,cursor:'pointer'}}>
          <KPICard label="🏗 Fornitori 30gg" value={fmt(totFornMat30)}
            sub={`${fornMat30Rows.length} scadenze imminenti · clicca`} color={T.red} icon="📅" />
        </div>
        <KPICard label="Attive verso sub" value={fmt(KPI.attiveSubDisp)} sub="Disponibili per compensazione" color={T.blue} icon="⇅"
          onClick={()=>onNav('attiveSub')} />
        <KPICard label="Commesse + Ordini attivi" value={`${KPI.commesseAttive}`} sub={`${KPI.ordiniAttivi} ordini · ${D.commesse.filter(c=>c.stato==='Completata').length} completate`} color="#0ea5e9"
          onClick={()=>onNav('watchlist')} />
        <KPICard label="Criticità attive" value={KPI.criticita} sub="Su tutte le commesse" color={KPI.criticita>0?T.red:'#22c55e'} icon="⚠" alert={KPI.criticita>0}
          onClick={()=>openModal('criticita')} />
        <KPICard label="Movimenti non riconciliati" value={KPI.nonRiconciliati} sub={fmt(KPI.nonRiconciliatiImporto)} color={KPI.nonRiconciliati>0?T.red:'#22c55e'} icon="🏦" alert={KPI.nonRiconciliati>0}
          onClick={()=>onNav('banca')} />
      </div>

      {/* Banner Fatture non collegate (da FIC) */}
      {(KPI.fattureOrfane>0||KPI.fattureInAttesa>0)&&(
        <div style={{background:T.amberL,border:`1px solid ${T.amber}`,borderRadius:10,padding:'12px 16px',marginBottom:18,display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:22}}>🔗</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:T.amber}}>Fatture da collegare a commessa</div>
            <div style={{fontSize:12,color:T.textL,marginTop:2}}>
              {KPI.fattureOrfane>0&&<span><b>{KPI.fattureOrfane}</b> senza codice commessa nell'oggetto</span>}
              {KPI.fattureOrfane>0&&KPI.fattureInAttesa>0&&<span> · </span>}
              {KPI.fattureInAttesa>0&&<span><b>{KPI.fattureInAttesa}</b> con codice ma commessa non ancora creata</span>}
            </div>
          </div>
          <Btn variant='outline' size='sm' onClick={()=>onNav('fattureAttive')}>Rivedi fatture</Btn>
        </div>
      )}

      {/* Pannello dettaglio KPI 30gg (inline, sopra le barre) */}
      {detailPanel&&(
        <Card style={{marginBottom:18,padding:0}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',
            background:detailPanel==='utenze30'?'#fffbeb':'#fef2f2',borderRadius:'8px 8px 0 0'}}>
            <span style={{fontWeight:700,fontSize:14}}>
              {detailPanel==='utenze30'?'⚡ Scadenze Utenze – prossimi 30 giorni':'🏗 Scadenze Fornitori Materiali/Servizi – prossimi 30 giorni'}
            </span>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:12,color:T.textL}}>Totale: <b style={{color:detailPanel==='utenze30'?T.amber:T.red}}>{fmt(detailPanel==='utenze30'?totUtenze30:totFornMat30)}</b></span>
              <Btn variant='ghost' size='sm' onClick={()=>setDetailPanel(null)}>✕ Chiudi</Btn>
            </div>
          </div>
          <TabellaDettaglio30 rows={detailPanel==='utenze30'?utenze30Rows:fornMat30Rows}/>
        </Card>
      )}

      {/* Barre avanzamento SAL + Fatturato */}
      <div style={{marginBottom:18}}>
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <h3 style={{fontSize:14,fontWeight:700,color:T.text}}>Avanzamento Commesse – SAL produttivo & Fatturato</h3>
            <div style={{display:'flex',gap:14,fontSize:11}}>
              <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#2563eb',borderRadius:2,display:'inline-block'}}/><b>SAL produttivo</b></span>
              <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#16a34a',borderRadius:2,display:'inline-block'}}/> Fatt. produttivo (= SAL)</span>
              <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,background:'#f59e0b',borderRadius:2,display:'inline-block'}}/> Acconto residuo</span>
            </div>
          </div>
          <div style={{fontSize:11,color:T.textL,marginBottom:16}}>
            Scala = contratto. <b>Barra 1</b>: avanzamento reale lavori. <b>Barra 2</b>: fatturato produttivo (verde) + acconto residuo da riassorbire (ambra). Garanzia non inclusa nelle barre.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {D.commesse.filter(c=>c.stato==='Attiva').map((c,i)=>{
              const {salPct,fattProdPct,accResPct,fattTotPct,salAbs,accResAbs,fattTotAbs} = calcBarreCommessa(c);
              return (
                <div key={c.id} style={{padding:'12px 0',borderBottom:`1px solid ${i<D.commesse.filter(x=>x.stato==='Attiva').length-1?T.border:'transparent'}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <span style={{width:120,fontWeight:700,fontSize:12,color:T.blue,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.codice}</span>
                    <span style={{fontSize:12,color:T.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>{c.nome}</span>
                    <span style={{fontSize:11,color:T.textL,flexShrink:0}}>{c.cliente}</span>
                    <span style={{fontWeight:700,fontSize:12,color:T.textL,flexShrink:0}}>{fmt(c.importoContrattuale)}</span>
                  </div>
                  <div style={{paddingLeft:42}}>
                    {/* Barra 1: SAL produttivo */}
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                      <span style={{width:100,fontSize:10,fontWeight:600,color:'#475569',flexShrink:0}}>SAL produttivo</span>
                      <div style={{flex:1,height:10,background:'#e2e8f0',borderRadius:5,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${salPct}%`,background:'#2563eb',borderRadius:5,transition:'width .4s'}}
                          title={`SAL produttivo: ${fmt(salAbs)} · ${Math.round(salPct)}%`}/>
                      </div>
                      <span style={{width:36,textAlign:'right',fontWeight:800,color:'#2563eb',fontSize:11,flexShrink:0}}>{Math.round(salPct)}%</span>
                      <span style={{width:80,textAlign:'right',fontSize:10,color:T.textL,flexShrink:0}}>{fmt(salAbs)}</span>
                    </div>
                    {/* Barra 2: Fatturato = SAL produttivo (verde) + acconto residuo (ambra) */}
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{width:100,fontSize:10,fontWeight:600,color:'#475569',flexShrink:0}}>Fatturato tot.</span>
                      <div style={{flex:1,height:10,background:'#e2e8f0',borderRadius:5,overflow:'hidden',position:'relative'}}>
                        <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${fattProdPct}%`,background:'#16a34a',transition:'width .4s'}}
                          title={`Fatt. produttivo (SAL): ${fmt(salAbs)} · ${Math.round(fattProdPct)}%`}/>
                        {accResPct>0.5&&<div style={{position:'absolute',left:`${fattProdPct}%`,top:0,height:'100%',width:`${accResPct}%`,background:'#f59e0b',transition:'all .4s'}}
                          title={`Acconto residuo: ${fmt(accResAbs)} · ${Math.round(accResPct)}%`}/>}
                      </div>
                      <span style={{width:36,textAlign:'right',fontWeight:800,color:'#16a34a',fontSize:11,flexShrink:0}}>{Math.round(fattTotPct)}%</span>
                      <span style={{width:80,textAlign:'right',fontSize:10,color:T.textL,flexShrink:0}}>
                        {accResPct>0.5?<span style={{color:'#f59e0b',fontWeight:600}}>+{fmt(accResAbs)}</span>:<span>{fmt(fattTotAbs)}</span>}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* ─── Fatture Attive & Passive con filtri ──────────────── */}
      {(()=>{
        const sortFn = (key) => (a,b)=>{
          if(key==='scadenza') return (a.scadenza||'').localeCompare(b.scadenza||'');
          if(key==='data')     return (b.data||'').localeCompare(a.data||'');
          if(key==='lordo')    return (b.lordo||0)-(a.lordo||0);
          if(key==='netto')    return (b.netto||0)-(a.netto||0);
          if(key==='commessa') return (a.commessaCodice||'').localeCompare(b.commessaCodice||'');
          return 0;
        };
        // Liste filtrate
        const fAttFil = D.fattureAttive.filter(f=>{
          if(attStato && f.stato!==attStato) return false;
          if(attComm  && (f.commessaCodice||'')!==attComm) return false;
          if(attCli   && f.cliente!==attCli) return false;
          return true;
        }).sort(sortFn(attSort));
        const fPasFil = D.fatturePassive.filter(f=>{
          if(pasStato && f.stato!==pasStato) return false;
          if(pasComm  && (f.commessaCodice||'')!==pasComm) return false;
          if(pasForn  && f.fornitore!==pasForn) return false;
          return true;
        }).sort(sortFn(pasSort));
        // Opzioni dropdown
        const attStatiOpt = [...new Set(D.fattureAttive.map(f=>f.stato))].filter(Boolean).sort();
        const attCommOpt  = [...new Set(D.fattureAttive.map(f=>f.commessaCodice))].filter(Boolean).sort();
        const attCliOpt   = [...new Set(D.fattureAttive.map(f=>f.cliente))].filter(Boolean).sort();
        const pasStatiOpt = [...new Set(D.fatturePassive.map(f=>f.stato))].filter(Boolean).sort();
        const pasCommOpt  = [...new Set(D.fatturePassive.map(f=>f.commessaCodice))].filter(Boolean).sort();
        const pasFornOpt  = [...new Set(D.fatturePassive.map(f=>f.fornitore))].filter(Boolean).sort();

        const Sel=({val,onChange,opts,placeholder})=>(
          <select value={val} onChange={e=>onChange(e.target.value)}
            style={{border:`1px solid ${T.border}`,borderRadius:5,padding:'4px 6px',fontSize:11,background:'#fff',maxWidth:140}}>
            <option value="">{placeholder}</option>
            {opts.map(o=><option key={o} value={o}>{o.length>20?o.slice(0,18)+'…':o}</option>)}
          </select>
        );

        const TableFatt = ({lista, isAtt})=>(
          <div style={{maxHeight:260,overflowY:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead style={{position:'sticky',top:0,background:'#f8fafc',zIndex:1}}>
                <tr style={{textAlign:'left',color:T.textL,fontSize:10}}>
                  <th style={{padding:'6px 4px'}}>Num</th>
                  <th style={{padding:'6px 4px'}}>{isAtt?'Cliente':'Fornitore'}</th>
                  <th style={{padding:'6px 4px'}}>Comm.</th>
                  <th style={{padding:'6px 4px'}}>Scad.</th>
                  <th style={{padding:'6px 4px',textAlign:'right'}}>Netto</th>
                  <th style={{padding:'6px 4px'}}>Stato</th>
                </tr>
              </thead>
              <tbody>
                {lista.length===0 ? (

                <span style={{fontWeight:700,color:T.red}}>{fmt(D.fornitoriGenerici.filter(f=>f.cat!=='Utenze').reduce((a,f)=>a+f.aperto,0))}</span>

          </Card>

          {/* Sezione UTENZE */}
          <Card style={{padding:0}}>

              {D.fornitoriGenerici.filter(f=>f.cat==='Utenze').map(f=>{
                const movAperti = (f.movimenti||[]).filter(m=>m.stato==='Aperta');
                const totAperto = movAperti.reduce((a,m)=>a+m.importo,0);
                const nextSc = movAperti.map(m=>m.scadenza).filter(Boolean).sort()[0];
                const scaduta = nextSc && new Date(nextSc)<today;
                const imminente = nextSc && new Date(nextSc)<=oggi30 && !scaduta;
                return (
                  <div key={f.id} onClick={()=>onNav('utenze')}
                    style={{padding:'9px 14px',borderBottom:`1px solid ${T.border}`,cursor:'pointer'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>

                <span style={{fontWeight:700,color:T.amber}}>{fmt(D.fornitoriGenerici.filter(f=>f.cat==='Utenze').reduce((a,f)=>a+f.aperto,0))}</span>

        {/* Alert e scadenze */}

            <AlertItem key={i} {...a} />

/* ─── PAGE: WATCHLIST COMMESSE ───────────────────────────── */
const PageWatchlist = ({onNav,openModal})=>{
  const [filter,setFilter]    = useState('');
  const [filtroTipo,setFiltroTipo]   = useState('');   // '' | 'Commessa' | 'Ordine' | 'Extra'
  const [filtroStato,setFiltroStato] = useState('Attiva');   // default Attiva (lavori in corso)
  const [filtroCliente,setFiltroCliente] = useState('');
  const [ordine,setOrdine] = useState('recenti');  // 'recenti' | 'codice' | 'importo' | 'cliente'

  // Lista clienti unici per il dropdown
  const clientiUnici = [...new Set(D.commesse.map(c=>c.cliente))].sort();

  // Filtro composito - cerca tollerante a spazi/case (es. "bx 107" = "BX107")
  const normSearch = (s)=> String(s||'').toLowerCase().replace(/\s+/g,'');
  let commesse = D.commesse.filter(c=>{
    const txt = normSearch(filter);
    if(txt) {
      const haystack = normSearch((c.codice||'') + (c.nome||'') + (c.cliente||'') + (c.nrOrdine||''));
      if(!haystack.includes(txt)) return false;
    }
    if(filtroTipo&&c.tipoLavoro!==filtroTipo) return false;
    if(filtroStato&&c.stato!==filtroStato) return false;
    if(filtroCliente&&c.cliente!==filtroCliente) return false;
    return true;
  });
  // Ordinamento
  commesse = [...commesse].sort((a,b)=>{
    if(ordine==='recenti')  return (b.updatedAt||b.dataInizio||'').localeCompare(a.updatedAt||a.dataInizio||'');
    if(ordine==='codice')   return (a.codice||'').localeCompare(b.codice||'');
    if(ordine==='importo')  return (b.importoContrattuale||0) - (a.importoContrattuale||0);
    if(ordine==='cliente')  return (a.cliente||'').localeCompare(b.cliente||'');
    return 0;
  });

  const saldoCommesse  = D.commesse.reduce((a,c)=>a+(c.incassato-c.pagato),0);
  const scaduteCount   = D.fattureAttive.filter(f=>f.stato==='Scaduta').length;

  // Totali sul set filtrato
  const totContrattuale = commesse.reduce((a,c)=>a+(c.importoContrattuale||0),0);
  const totSAL          = commesse.reduce((a,c)=>a+(c.salProdAttivoTot||0),0);
  const totFatturato    = commesse.reduce((a,c)=>a+(c.salProdAttivoTot||0)+(c.acconto?.residuo||0),0);
  const totIncassato    = commesse.reduce((a,c)=>a+(c.incassato||0),0);

  const selStyle = {border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 10px',fontSize:12,background:'#fff',cursor:'pointer'};
  const hasFiltri = filter||filtroTipo||filtroStato||filtroCliente;
  const resetFiltri = ()=>{setFilter('');setFiltroTipo('');setFiltroStato('');setFiltroCliente('');};

  return (
    <div style={{padding:24}}>
      {/* KPI Row 1 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:14}}>
        <KPICard label="Totale contrattuale" value={fmt(D.commesse.reduce((a,c)=>a+(c.importoContrattuale||0),0))}
          sub={`${D.commesse.filter(c=>c.stato==='Attiva').length} attive`} color={T.blue} />
        <KPICard label="Da incassare netto" value={fmt(KPI.daIncassareNettoAperte)} color={T.green} onClick={()=>openModal('daIncassare')} />
        <KPICard label="Da pagare netto" value={fmt(KPI.daPagareNetto)} color={T.red} onClick={()=>openModal('daPagare')} />
        <KPICard label="Saldo commesse" value={fmt(saldoCommesse)} sub="Incassato – pagato" color={T.blue} onClick={()=>openModal('saldo')} />
        <KPICard label="Attive scadute" value={scaduteCount} sub="Fatture attive oltre scadenza" color={T.red} alert={scaduteCount>0} onClick={()=>openModal('scadute')} />
      </div>
      {/* KPI Row 2 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        <KPICard label="Garanzie aperte" value={fmt(KPI.garanzieTotale)} color={T.amber} onClick={()=>openModal('garanzie')} />
        <KPICard label="Acconti residui" value={fmt(KPI.accontiResiduo)} color={T.purple} onClick={()=>openModal('acconti')} />
        <KPICard label="Criticità attive" value={KPI.criticita} color={T.red} alert={KPI.criticita>0} onClick={()=>openModal('criticita')} />
      </div>

      <Card style={{padding:0}}>
        {/* Barra filtri */}
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,background:'#f8fafc',borderRadius:'8px 8px 0 0'}}>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontWeight:700,fontSize:14,marginRight:4}}>
              Commesse & Ordini
              <span style={{fontWeight:400,color:T.textL,fontSize:12,marginLeft:6}}>
                {commesse.length} di {D.commesse.length}
              </span>
            </span>
            <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="🔍 Cerca codice, nome, cliente…"
              style={{...selStyle,width:220,fontSize:13}} />
            <select value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)} style={selStyle}>
              <option value="">Tutti i tipi</option>
              <option value="Commessa">Commessa</option>
              <option value="Ordine">Ordine</option>
              <option value="Extra">Extra</option>
            </select>
            <select value={filtroStato} onChange={e=>setFiltroStato(e.target.value)} style={selStyle}>
              <option value="">Tutti gli stati</option>
              <option value="Attiva">Attiva</option>
              <option value="Completata">Completata</option>
              <option value="Sospesa">Sospesa</option>
            </select>
            <select value={filtroCliente} onChange={e=>setFiltroCliente(e.target.value)} style={selStyle}>
              <option value="">Tutti i clienti</option>
              {clientiUnici.map(cl=><option key={cl} value={cl}>{cl}</option>)}
            </select>
            <select value={ordine} onChange={e=>setOrdine(e.target.value)} style={{...selStyle,marginLeft:'auto'}} title="Ordinamento">
              <option value="recenti">↓ Più recenti / lavori in corso</option>
              <option value="codice">A-Z Codice</option>
              <option value="importo">↓ Importo</option>
              <option value="cliente">A-Z Cliente</option>
            </select>
            {hasFiltri&&<Btn variant='ghost' size='sm' onClick={resetFiltri}>✕ Azzera filtri</Btn>}
          </div>
        </div>

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#f8fafc'}}>
                {['Tipo','Commessa','Cliente','Contratto','Avanzamento SAL & Fatturato','Da incassare','Da pagare','Saldo','Pross. scad.','Stato','Crit.','Azioni'].map((h,i)=>(
                  <Th key={i} right={i>=5&&i<=7}>{h}</Th>
                ))}
              </tr>
            </thead>
            <tbody>
              {commesse.length===0&&(
                <tr><td colSpan={12} style={{padding:32,textAlign:'center',color:T.textL,fontSize:13}}>
                  Nessuna commessa corrisponde ai filtri selezionati.{' '}
                  <span style={{color:T.blue,cursor:'pointer'}} onClick={resetFiltri}>Azzera filtri</span>
                </td></tr>
              )}
              {commesse.map(c=>{
                const daInc = D.fattureAttive.filter(f=>f.commessa===c.id&&f.stato!=='Scaduta').reduce((a,f)=>a+f.netto,0);
                const daPag = D.fatturePassive.filter(f=>f.commessa===c.id).reduce((a,f)=>a+f.netto,0);
                const saldo = c.incassato - c.pagato;
                const nextSc = D.scadenziario.filter(s=>s.commessa===c.id&&new Date(s.data)>=today).sort((a,b)=>new Date(a.data)-new Date(b.data))[0];
                const scadute = D.fattureAttive.filter(f=>f.commessa===c.id&&f.stato==='Scaduta').length;
                const tipoColor = c.tipoLavoro==='Commessa'?{bg:T.blueL,color:T.blue}:c.tipoLavoro==='Ordine'?{bg:'#f0fdf4',color:T.green}:{bg:T.purpleL,color:T.purple};
                return (
                  <tr key={c.id} style={{borderBottom:`1px solid ${T.border}`}}
                    onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <Td><span style={{background:tipoColor.bg,color:tipoColor.color,padding:'2px 7px',borderRadius:10,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>{c.tipoLavoro}</span></Td>
                    <Td>
                      <div style={{fontWeight:700,color:T.blue,cursor:'pointer'}} onClick={()=>onNav('dettaglioCommessa',c)}>{c.codice}</div>
                      <div style={{fontSize:11,color:T.textL,maxWidth:150}}>{c.nome}</div>
                    </Td>
                    <Td>{c.cliente}</Td>
                    <Td right><span style={{fontWeight:700,color:T.text}}>{fmt(c.importoContrattuale)}</span></Td>
                    <Td>
                      {c.importoContrattuale>0?(
                        <div style={{minWidth:160}}>
                          <DualProgressBar c={c} showLabels={false} height={6}/>
                        </div>
                      ):<span style={{color:T.textL,fontSize:12}}>n/a</span>}
                    </Td>
                    <Td right bold color={daInc>0?T.green:T.textL}>{fmt(daInc)}</Td>
                    <Td right bold color={daPag>0?T.red:T.textL}>{fmt(daPag)}</Td>
                    <Td right bold color={saldo>=0?T.text:T.red}>{fmt(saldo)}</Td>
                    <Td nowrap>{nextSc?fmtDate(nextSc.data):'—'}</Td>
                    <Td><Badge text={c.stato}/>{scadute>0&&<span style={{marginLeft:4}}><Badge text="Scaduta"/></span>}</Td>
                    <Td>{(c.criticita||[]).length>0?<span style={{background:T.redL,color:T.red,padding:'2px 7px',borderRadius:10,fontSize:11,fontWeight:600}}>{(c.criticita||[]).length}</span>:<span style={{color:T.textL}}>—</span>}</Td>
                    <Td>
                      <div style={{display:'flex',gap:4}}>
                        <Btn onClick={()=>onNav('dettaglioCommessa',c)} variant='ghost' size='sm'>Dettaglio</Btn>
                        <Btn onClick={()=>openModal('commessaScadenze',c)} variant='outline' size='sm'>Scadenze</Btn>
                      </div>
                    </Td>
                  </tr>
                );
              })}
            </tbody>
            {/* Riga totali */}
            {commesse.length>0&&(
              <tfoot>
                <tr style={{background:'#f0f9ff',borderTop:`2px solid ${T.blue}`,fontWeight:700}}>
                  <td colSpan={3} style={{padding:'10px 12px',fontSize:12,color:T.blue}}>

              </tfoot>
            )}
          </table>
        </div>
      </Card>
    </div>

Analizza il PDF allegato e restituisci SOLO un JSON valido (niente markdown, niente backtick) con questa struttura:

                const model = localStorage.getItem('gemini_model') || 'gemini-2.5-flash';

              }} style={{marginTop:8,background:'linear-gradient(135deg,#0369a1,#7c3aed)',color:'#fff',border:'none',padding:'8px 14px',borderRadius:5,fontSize:12,cursor:'pointer',fontWeight:600,width:'100%'}}>

          {garActive&&<div style={{padding:10,background:T.amberL,borderRadius:6}}>

            <div style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:6,textTransform:'uppercase',letterSpacing:.3}}>① Trattenuta su fattura</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <label style={lab}>Tipo</label>
                <select value={garTipo} onChange={e=>setGarTipo(e.target.value)} style={inp}>

                </select>
              </div>
              <div>
                <label style={lab}>Valore ({garTipo==='Percentuale'?'% per fattura':'€ totali'})</label>
                <input type="number" step="0.1" value={garVal} onChange={e=>setGarVal(e.target.value)} style={inp} placeholder={garTipo==='Percentuale'?'es. 10':'es. 50000'}/>

            </div>

            {/* Sezione 2: svincolo trattenuta */}
            <div style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:6,textTransform:'uppercase',letterSpacing:.3}}>② Svincolo trattenuta</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:8}}>
              <div>
                <label style={lab}>Evento</label>
                <select value={garEvento} onChange={e=>setGarEvento(e.target.value)} style={inp}>
                  <option>Fine lavori</option><option>Collaudo</option><option>Consegna</option><option>Fine periodo garanzia</option>
                </select>
              </div>
              <div>
                <label style={lab}>Mesi attesa</label>
                <input type="number" value={garSvincoloMesi} onChange={e=>setGarSvincoloMesi(e.target.value)} style={inp}/>

            </div>
            <div style={{marginBottom:12}}>
              <label style={lab}>Data svincolo trattenuta</label>
              <input type="date" value={garScadenza} onChange={e=>setGarScadenza(e.target.value)} style={inp}/>
            </div>

            {/* Sezione 3: obbligo contrattuale (vizi/buon funzionamento) */}
            <div style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:6,textTransform:'uppercase',letterSpacing:.3}}>③ Obbligo contrattuale</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label style={lab}>Durata (mesi dalla consegna)</label>
                <input type="number" value={garDurataMesi} onChange={e=>setGarDurataMesi(e.target.value)} style={inp} placeholder="24"/>
              </div>
              <div>
                <label style={lab}>Scadenza contrattuale</label>
                <input type="date" value={garScadContrattuale} onChange={e=>setGarScadContrattuale(e.target.value)} style={inp} placeholder={dataFine && garDurataMesi ? `auto: ${new Date(new Date(dataFine).getTime()+parseInt(garDurataMesi)*30*86400000).toISOString().slice(0,10)}` : ''}/>
              </div>
            </div>
            <div style={{fontSize:10,color:'#92400e',marginTop:6,fontStyle:'italic'}}>
              Se vuoto, viene calcolata automaticamente da Data fine + Durata mesi.
            </div>
          </div>}
        </div>
      </div>

      {/* ─── REGOLE DI PAGAMENTO (milestone) ─── */}
      <div style={{marginTop:18,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
          <div style={{fontWeight:700,fontSize:13,color:T.text}}>📋 Regole di pagamento ({milestone.length} milestone)</div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:12,fontWeight:600,padding:'3px 10px',borderRadius:12,background:totPerc===100?'#f0fdf4':totPerc>100?T.redL:'#fffbeb',color:totPerc===100?T.green:totPerc>100?T.red:'#92400e'}}>
              Totale: {totPerc}% {totPerc===100?'✓':totPerc>100?'⚠ supera':'⚠ incompleto'}
            </span>
            <Btn onClick={addMilestone} variant='outline' size='sm'>➕ Aggiungi rata</Btn>
          </div>
        </div>
        {/* TEMPLATE - carica da libreria o salva la regola corrente */}
        <div style={{display:'flex',gap:8,marginBottom:10,padding:'8px 12px',background:'#eff6ff',border:`1px solid #bfdbfe`,borderRadius:6,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:11,fontWeight:700,color:T.blue,textTransform:'uppercase'}}>📚 Template:</span>
          <select value="" onChange={e=>{
            const tplId = e.target.value;
            if(!tplId) return;
            const tpl = (D.templateRegole||[]).find(t=>t.id===tplId);
            if(!tpl) return;
            if(milestone.length>0 && !window.confirm(`Sostituire le ${milestone.length} milestone attuali con il template "${tpl.nome}"?`)) return;
            // Genera nuovi id univoci per ogni milestone caricata
            const newMs = (tpl.regolePagamento?.milestone||[]).map(m=>({...m, id:`ms-${Date.now()}-${Math.random().toString(36).slice(2,7)}`}));
            setMilestone(newMs);
            e.target.value = '';
          }} style={{border:`1px solid ${T.border}`,borderRadius:5,padding:'4px 8px',fontSize:12,background:'#fff'}}>
            <option value="">Carica template...</option>
            {(D.templateRegole||[]).map(t=><option key={t.id} value={t.id} title={t.descrizione}>{t.nome} {t.clienteDefault?`(${t.clienteDefault.slice(0,20)})`:''}</option>)}
          </select>
          <Btn variant='ghost' size='sm' onClick={()=>{
            if(milestone.length===0) return alert('Nessuna milestone da salvare. Aggiungi prima le rate.');
            const nome = window.prompt('Nome del template (es. "Benetti Commesse", "Sanlorenzo Standard"):');
            if(!nome || !nome.trim()) return;
            const tpl = {
              nome: nome.trim(),
              clienteDefault: cliente||null,
              descrizione: `${milestone.length} milestone (${totPerc}%) — salvato da commessa ${c.codice}`,
              regolePagamento: { milestone, totalePerc: totPerc },
            };
            addTemplate(tpl);
            alert(`Template "${nome.trim()}" salvato. Lo trovi nel dropdown "Carica template" su ogni commessa.`);
          }}>💾 Salva come template</Btn>
          {(D.templateRegole||[]).length>0 && (
            <span style={{fontSize:11,color:T.textL,marginLeft:'auto'}}>
              {(D.templateRegole||[]).length} template disponibili
            </span>
          )}
        </div>
        {milestone.length===0&&<div style={{padding:14,background:'#f8fafc',borderRadius:6,fontSize:12,color:T.textL,textAlign:'center'}}>
          Nessuna milestone configurata. Click su "Aggiungi rata" per costruire le regole di pagamento (es. 10% acconto / 84% SAL / 3% saldo / 3% garanzia 12 mesi).
        </div>}
        {milestone.map((ms,idx)=>(
          <div key={ms.id} style={{border:`1px solid ${T.border}`,borderRadius:8,padding:12,marginBottom:10,background:'#fafbfc'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:12,color:T.blue}}>Rata #{idx+1}</div>
              <button onClick={()=>removeMilestone(ms.id)} style={{background:'none',border:'none',color:T.red,cursor:'pointer',fontSize:13}} title="Rimuovi">🗑️ Rimuovi</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 80px',gap:8,marginBottom:8}}>
              <div>
                <label style={lab}>Titolo</label>
                <input value={ms.titolo} onChange={e=>updateMilestone(ms.id,{titolo:e.target.value})} style={inp} placeholder='es. Acconto inizio lavori'/>
              </div>
              <div>
                <label style={lab}>Tipo</label>
                <select value={ms.tipo} onChange={e=>updateMilestone(ms.id,{tipo:e.target.value})} style={inp}>
                  {TIPI_MS.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
                </select>
              </div>
              <div>
                <label style={lab}>%</label>
                <input type="number" step="0.1" value={ms.perc} onChange={e=>updateMilestone(ms.id,{perc:e.target.value})} style={inp} placeholder='10'/>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={lab}>Trigger / Quando scatta</label>
                <select value={ms.trigger} onChange={e=>updateMilestone(ms.id,{trigger:e.target.value})} style={inp}>
                  {TRIGGER.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
                </select>
              </div>
              <div>
                <label style={lab}>Modalità pagamento</label>
                <select value={ms.modalitaPagamentoId} onChange={e=>updateMilestone(ms.id,{modalitaPagamentoId:e.target.value})} style={inp}>
                  <option value="">— scegli dalla libreria —</option>
                  {(D.modalitaPagamento||[]).map(mp=><option key={mp.id} value={mp.id}>{mp.nome}</option>)}
                </select>
              </div>
            </div>
            {(ms.trigger==='x_mesi_dopo_fine'||ms.trigger==='avanzamento_perc')&&
              <div style={{marginBottom:8}}>
                <label style={lab}>{ms.trigger==='x_mesi_dopo_fine'?'Mesi dopo fine':'% avanzamento'}</label>
                <input type="number" value={ms.triggerExtra} onChange={e=>updateMilestone(ms.id,{triggerExtra:e.target.value})} style={inp} placeholder={ms.trigger==='x_mesi_dopo_fine'?'12':'50'}/>
              </div>
            }
            <div style={{marginBottom:8}}>
              <label style={lab}>Condizioni / Note libere</label>
              <input value={ms.condizioni} onChange={e=>updateMilestone(ms.id,{condizioni:e.target.value})} style={inp} placeholder='es. con docs tecnici firmati, previa accettazione, senza remarks ODP...'/>
            </div>
            {/* Fideiussione alternativa */}
            <div style={{padding:8,background:'#fef9c3',borderRadius:6,fontSize:11}}>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontWeight:600,color:'#92400e'}}>
                <input type="checkbox" checked={ms.fideiussioneAlt?.attiva||false} onChange={e=>updateMilestone(ms.id,{fideiussioneAlt:{...ms.fideiussioneAlt,attiva:e.target.checked,perc:ms.fideiussioneAlt?.perc||5,mesi:ms.fideiussioneAlt?.mesi||12}})}/>
                📜 Fideiussione bancaria alternativa (incassa subito)
              </label>
              {ms.fideiussioneAlt?.attiva&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:6}}>
                <div>
                  <label style={{fontSize:10,fontWeight:600,color:'#92400e',display:'block'}}>% fideiussione</label>
                  <input type="number" value={ms.fideiussioneAlt.perc} onChange={e=>updateMilestone(ms.id,{fideiussioneAlt:{...ms.fideiussioneAlt,perc:parseFloat(e.target.value)||0}})} style={{...inp,padding:'4px 8px'}}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:600,color:'#92400e',display:'block'}}>Durata mesi</label>
                  <input type="number" value={ms.fideiussioneAlt.mesi} onChange={e=>updateMilestone(ms.id,{fideiussioneAlt:{...ms.fideiussioneAlt,mesi:parseInt(e.target.value)||0}})} style={{...inp,padding:'4px 8px'}}/>
                </div>
              </div>}
            </div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:18,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
        <Btn onClick={onClose} variant='outline'>Annulla</Btn>
        <Btn onClick={handleSave} variant='primary'>💾 Salva modifiche</Btn>
      </div>
    </Modal>
  );
};

const PageDettaglioCommessa = ({commessa,onNav,openModal,updateCommessa,addTemplate,deleteTemplate})=>{
  const [tab,setTab]=useState('pagamenti');
  const [editOpen,setEditOpen]=useState(false);
  const [expanded,setExpanded]=useState(null); // 'sal' | 'extra' | null
  if(!commessa) return <div style={{padding:24}}><Card><div style={{color:T.textL,textAlign:'center',padding:40}}>Nessuna commessa selezionata. <span style={{color:T.blue,cursor:'pointer'}} onClick={()=>onNav('watchlist')}>Vai alla watchlist →</span></div></Card></div>;
  const c=commessa;
  const daInc=D.fattureAttive.filter(f=>f.commessa===c.id&&f.stato!=='Scaduta').reduce((a,f)=>a+f.netto,0);
  const daPag=D.fatturePassive.filter(f=>f.commessa===c.id).reduce((a,f)=>a+f.netto,0);
  const saldo=c.incassato-c.pagato;
  const scadute=D.fattureAttive.filter(f=>f.commessa===c.id&&f.stato==='Scaduta');
  const extraC=D.extra.filter(e=>e.commessa===c.id);
  const salC=D.sal.filter(s=>s.commessa===c.id);
  // SAL produttivo dinamico: acconto + SAL fatturati (esclude extra/saldo/garanzia/altri ordini)
  const _impOf = (f)=> (f.imponibile && f.imponibile>0) ? f.imponibile : (f.lordo||0);
  const _isExtra = (f)=> /\bextra\b|\bbap\b/i.test(f.oggetto||'');
  const _isSaldo = (f)=> f.tipoRifOverride==='Saldo' || /saldo|fine\s*lavori/i.test(f.oggetto||'');
  const _isGaranzia = (f)=> f.tipoRifOverride==='Garanzia' || /garanzia|svincolo/i.test(f.oggetto||'');
  // Estrae nr ordine dall'oggetto fattura
  const _estraiOrdine = (s)=>{
    if(!s) return '';
    const m = String(s).match(/(?:MYOA\d+(?:\/[A-Z]+)?|OR(?:CA|FO)\/\d{4}\/\d+|OLAV\/\d{4}\/\d+|\d{2}OA\d+|2\d{4}[A-Z]+\d+)/i);
    return m ? m[0].toUpperCase().replace(/\s+/g,'') : '';
  };
  // Verifica se la fattura appartiene all'ordine principale della commessa
  // - Se la commessa ha nrOrdine: la fattura DEVE avere quel nrOrdine (ordini diversi = NO SAL)
  // - Se la commessa non ha nrOrdine: passa qualunque fattura con codice match
  // Confronto flessibile sulla radice del numero ordine (ignora suffissi /APP, /AFS, /INV ecc.)
  const _ordRoot = (s)=> String(s||'').toUpperCase().replace(/\s+/g,'').split('/')[0];
  const _ordPrincipale = _ordRoot(c.nrOrdine||'');
  const _isMainOrder = (f) => {
    if(!_ordPrincipale) return true;
    const ordF = _ordRoot(_estraiOrdine(f.oggetto));
    if(!ordF) return true; // fatture senza nr ordine identificabile passano
    return ordF === _ordPrincipale;
  };
  const salProdAttivoTotDyn = c.salProdAttivoTot && c.salProdAttivoTot>0
    ? c.salProdAttivoTot
    : D.fattureAttive.filter(f=>f.commessa===c.id && !_isExtra(f) && !_isSaldo(f) && !_isGaranzia(f) && _isMainOrder(f)).reduce((a,f)=>a+_impOf(f),0);
  const salProdPct=c.importoContrattuale>0?Math.round((salProdAttivoTotDyn/c.importoContrattuale)*100):0;
  // Extra (fuori contratto base) = fatture EXTRA/BAP O ordini diversi dal principale
  const fattureExtraDyn = D.fattureAttive.filter(f=>f.commessa===c.id && (_isExtra(f) || !_isMainOrder(f)));
  const totExtraDyn = fattureExtraDyn.reduce((a,f)=>a+_impOf(f),0);
  // Fatture SAL del contratto base (per la tendina avanzamento)
  const fattureSALDyn = D.fattureAttive.filter(f=>f.commessa===c.id && !_isExtra(f) && !_isSaldo(f) && !_isGaranzia(f) && _isMainOrder(f))
    .sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  // Raggruppamento extra per nrOrdine
  const extraByOrdine = (() => {
    const m = new Map();
    fattureExtraDyn.forEach(f=>{
      const ord = _estraiOrdine(f.oggetto) || '(senza nr ordine)';
      if(!m.has(ord)) m.set(ord, {ordine:ord, fatture:[], totale:0});
      const r = m.get(ord); r.fatture.push(f); r.totale += _impOf(f);
    });
    return Array.from(m.values()).sort((a,b)=>b.totale-a.totale);
  })();
  const tabs=['pagamenti','sal','fatture','extra','compensazioni','regole'];

  return (
    <div style={{padding:24}}>
      {/* Back */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <Btn onClick={()=>onNav('watchlist')} variant='outline' size='sm'>← Watchlist</Btn>
        <span style={{background:c.tipoLavoro==='Commessa'?T.blueL:c.tipoLavoro==='Ordine'?'#f0fdf4':T.purpleL,color:c.tipoLavoro==='Commessa'?T.blue:c.tipoLavoro==='Ordine'?T.green:T.purple,padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700}}>{c.tipoLavoro}</span>
        <span style={{fontSize:13,color:T.textL}}>{c.nome}</span>
        <Btn onClick={()=>setEditOpen(true)} variant='outline' size='sm' style={{marginLeft:'auto'}}>✏️ Modifica</Btn>
      </div>
      {editOpen&&<EditCommessaModal commessa={c} onClose={()=>setEditOpen(false)} updateCommessa={updateCommessa} addTemplate={addTemplate} deleteTemplate={deleteTemplate}/>}

      {/* ─── 4 KPI riepilogo finanziario - SEMPRE IN CIMA, subito visibili ─── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:18}}>
        <div style={{background:'#fff',borderRadius:8,padding:12,boxShadow:T.sh,borderLeft:`4px solid ${T.blue}`}}>
          <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase'}}>Importo commessa</div>
          <div style={{fontSize:20,fontWeight:800,color:T.text}}>{fmt(c.importoContrattuale||0)}</div>
          <div style={{fontSize:10,color:T.textL}}>contratto base</div>
        </div>
        <div style={{background:'#fff',borderRadius:8,padding:12,boxShadow:T.sh,borderLeft:`4px solid ${T.green}`}}>
          <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase'}}>Fatturato Commessa (SAL)</div>
          <div style={{fontSize:20,fontWeight:800,color:T.green}}>{fmt(salProdAttivoTotDyn)}</div>
          <div style={{fontSize:10,color:T.textL}}>{c.importoContrattuale>0?(salProdAttivoTotDyn/c.importoContrattuale*100).toFixed(1):0}% del contratto · {fattureSALDyn.length} fatt.</div>
        </div>
        <div onClick={()=>setExpanded(expanded==='extra'?null:'extra')} style={{background:'#fff',borderRadius:8,padding:12,boxShadow:T.sh,borderLeft:`4px solid ${T.purple}`,cursor:'pointer',transition:'box-shadow .2s'}}
          onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'}
          onMouseLeave={e=>e.currentTarget.style.boxShadow=T.sh}>
          <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase',display:'flex',justifyContent:'space-between'}}>
            <span>Fatturato Extra{c.importoContrattuale>0?` · ${(totExtraDyn/c.importoContrattuale*100).toFixed(1)}%`:''}</span>
            <span style={{color:T.purple}}>{expanded==='extra'?'▼':'▶'}</span>
          </div>
          <div style={{fontSize:20,fontWeight:800,color:T.purple}}>{fmt(totExtraDyn)}</div>
          <div style={{fontSize:10,color:T.textL}}>fuori contratto · {fattureExtraDyn.length} fatt. · clic dettaglio</div>
        </div>
        <div style={{background:'#fff',borderRadius:8,padding:12,boxShadow:T.sh,borderLeft:`4px solid ${T.red}`}}>
          <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase'}}>Da fatturare</div>
          <div style={{fontSize:20,fontWeight:800,color:T.red}}>{fmt(Math.max(0,(c.importoContrattuale||0)-salProdAttivoTotDyn))}</div>
          <div style={{fontSize:10,color:T.textL}}>residuo contratto base</div>
        </div>
      </div>

      {/* Header KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:14,marginBottom:14}}>
        {/* SAL % + Fatturato KPI card – cliccabile per espandere */}
        <div onClick={()=>setExpanded(expanded==='sal'?null:'sal')} style={{background:T.white,borderRadius:10,boxShadow:T.sh,padding:16,borderLeft:`4px solid #2563eb`,gridColumn:'span 2',cursor:'pointer',transition:'box-shadow .2s'}}
          onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.1)'}
          onMouseLeave={e=>e.currentTarget.style.boxShadow=T.sh}>
          <div style={{fontSize:10,fontWeight:700,color:T.textL,textTransform:'uppercase',letterSpacing:.5,marginBottom:8,display:'flex',justifyContent:'space-between'}}>
            <span>AVANZAMENTO: SAL PRODUTTIVO & FATTURATO</span>
            <span style={{color:T.blue}}>{expanded==='sal'?'▼':'▶'} clic per dettagli</span>
          </div>
          <div style={{display:'flex',gap:24,alignItems:'center',marginBottom:8}}>
            <div><span style={{fontSize:28,fontWeight:800,color:'#2563eb'}}>{salProdPct}%</span><span style={{fontSize:11,color:T.textL,marginLeft:4}}>SAL produttivo · {fmt(salProdAttivoTotDyn)}</span></div>
            {totExtraDyn>0&&<div style={{fontSize:11,fontWeight:600,color:T.purple,background:T.purpleL,padding:'3px 10px',borderRadius:20}}>+ Extra: {fmt(totExtraDyn)}</div>}
            {c.acconto?.residuo>0&&<div style={{fontSize:11,fontWeight:600,color:'#f59e0b',background:'#fffbeb',padding:'3px 10px',borderRadius:20}}>Acc. residuo: {fmt(c.acconto.residuo)}</div>}
          </div>
          <DualProgressBar c={c} showLabels={false} height={10}/>
        </div>
        <KPICard label="Da incassare netto" value={fmt(daInc)} color={T.green} onClick={()=>openModal('daIncassare')} />
        <KPICard label="Da pagare netto" value={fmt(daPag)} color={T.red} onClick={()=>openModal('daPagare')} />
        <KPICard label="Saldo commessa" value={fmt(saldo)} sub="Incassato – pagato" color={saldo>=0?T.blue:T.red} />
        <KPICard label="Garanzia maturata" value={c.garanzia?fmt(c.garanzia.nonIncassata||c.garanzia.residuo):'Nessuna'} sub={c.garanzia?`Svincolo: ${fmtDate(c.garanzia.svincolo)}`:''}  color={T.amber} onClick={()=>openModal('garanzie')} />
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:8}}>
        <KPICard label="Acconto residuo" value={c.acconto?fmt(c.acconto.residuo):'—'} sub={c.acconto?`Recuperato: ${fmt(c.acconto.recuperato)} · ${c.acconto.nota||''}`:c.tipoLavoro==='Ordine'?'Ordine – nessun acconto':'Nessun acconto'} color={T.purple} />
        <KPICard label="Fatture scadute" value={scadute.length} color={scadute.length>0?T.red:T.green} alert={scadute.length>0} onClick={()=>openModal('scadute')} />
        <KPICard label="Criticità" value={(c.criticita||[]).length} color={(c.criticita||[]).length>0?T.red:T.green} alert={(c.criticita||[]).length>0} onClick={()=>openModal('criticita',c)} />
      </div>
      {/* Totale fatturato in fondo, discreto - è un numero da leggere con cautela perché somma SAL contrattuali e Extra fuori contratto */}
      <div style={{textAlign:'right',fontSize:11,color:T.textL,marginBottom:18,fontStyle:'italic'}}>
        Totale fatturato (SAL + Extra): <b style={{color:T.text}}>{fmt(salProdAttivoTotDyn+totExtraDyn)}</b>
      </div>

      {/* TENDINA AVANZAMENTO – timeline SAL mensili */}
      {expanded==='sal' && (
        <Card style={{marginBottom:18,padding:0,borderTop:`3px solid ${T.blue}`}}>
          <div style={{padding:'12px 16px',background:T.blueL,borderBottom:`1px solid ${T.border}`,borderRadius:'8px 8px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:700,fontSize:13,color:T.blue}}>📊 Timeline SAL e Acconto – {fattureSALDyn.length} fatture · totale {fmt(salProdAttivoTotDyn)} ({salProdPct}%)</div>
            <button onClick={()=>setExpanded(null)} style={{background:'none',border:'none',color:T.textL,cursor:'pointer',fontSize:14}}>✕</button>
          </div>
          {fattureSALDyn.length===0 ? (
            <div style={{padding:24,textAlign:'center',color:T.textL}}>Nessuna fattura SAL trovata.</div>
