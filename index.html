const PageModalitaPagamento = ({addMP, updateMP, deleteMP})=>{
  const [editingId,setEditingId]=useState(null);
  const [form,setForm]=useState({nome:'',strumento:'Bonifico',giorni:30,riferimento:'DFFM',giorniExtra:0,note:''});
  const reset = ()=>{ setForm({nome:'',strumento:'Bonifico',giorni:30,riferimento:'DFFM',giorniExtra:0,note:''}); setEditingId(null); };
  const startEdit = (m)=>{ setEditingId(m.id); setForm({nome:m.nome,strumento:m.strumento,giorni:m.giorni,riferimento:m.riferimento,giorniExtra:m.giorniExtra,note:m.note||''}); };
  const handleSave = ()=>{
    if(!form.nome.trim()) return alert('Inserisci il nome (es. "60gg DFFM+10gg RI.BA.")');
    const payload = {...form, giorni:parseInt(form.giorni)||0, giorniExtra:parseInt(form.giorniExtra)||0};
    if(editingId) updateMP(editingId, payload); else addMP(payload);
    reset();
  };
  const inp = {border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',fontSize:13,width:'100%',boxSizing:'border-box'};
  const lab = {fontSize:11,fontWeight:600,color:T.textL,textTransform:'uppercase',letterSpacing:.3,marginBottom:4,display:'block'};
  return (
    <div style={{padding:24,maxWidth:1100}}>
      <div style={{background:T.blueL,border:`1px solid #bfdbfe`,borderRadius:8,padding:14,marginBottom:18,fontSize:13,color:T.blue}}>
        💡 Definisci qui le modalità di pagamento che riutilizzi su più commesse (es. <b>"60gg DFFM +10gg RI.BA."</b>). Le trovi poi nei dropdown del modulo "Regole pagamento" della commessa.
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:18}}>
        {/* Form sx */}
        <Card>
          <SectionTitle children={editingId?'✏️ Modifica modalità':'➕ Nuova modalità'}/>
          <div style={{marginBottom:10}}>
            <label style={lab}>Nome (etichetta)</label>
            <input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} style={inp} placeholder='es. 60gg DFFM +10gg RI.BA.'/>
          </div>
          <div style={{marginBottom:10}}>
            <label style={lab}>Strumento</label>
            <select value={form.strumento} onChange={e=>setForm({...form,strumento:e.target.value})} style={inp}>
              <option>Bonifico</option><option>RI.BA.</option><option>Assegno</option><option>Lettera credito</option><option>Contanti</option><option>Altro</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
            <div>
              <label style={lab}>Giorni</label>
              <input type="number" value={form.giorni} onChange={e=>setForm({...form,giorni:e.target.value})} style={inp}/>
            </div>
            <div>
              <label style={lab}>Riferimento</label>
              <select value={form.riferimento} onChange={e=>setForm({...form,riferimento:e.target.value})} style={inp}>
                <option value="DFFM">DFFM (data fattura fine mese)</option>
                <option value="DF">DF (data fattura)</option>
                <option value="DR">DR (data ricezione)</option>
              </select>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={lab}>Giorni extra (es. +10gg)</label>
            <input type="number" value={form.giorniExtra} onChange={e=>setForm({...form,giorniExtra:e.target.value})} style={inp}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={lab}>Note (opzionale)</label>
            <input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} style={inp} placeholder='es. Standard Sanlorenzo'/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={handleSave} variant='primary' style={{flex:1}}>{editingId?'💾 Aggiorna':'➕ Aggiungi'}</Btn>
            {editingId&&<Btn onClick={reset} variant='outline'>Annulla</Btn>}
          </div>
        </Card>

        {/* Lista dx */}
        <Card style={{padding:0}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:14,background:'#f8fafc',borderRadius:'8px 8px 0 0'}}>
            Libreria modalità ({(D.modalitaPagamento||[]).length})
          </div>
          {(!D.modalitaPagamento||D.modalitaPagamento.length===0) ? (
            <div style={{padding:32,textAlign:'center',color:T.textL,fontSize:13}}>Nessuna modalità ancora. Aggiungine una a sinistra.</div>
          ) : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:'#f8fafc',color:T.textL,fontSize:11,textTransform:'uppercase'}}>
                  <th style={{padding:'8px 10px',textAlign:'left'}}>Nome</th>
                  <th style={{padding:'8px 10px',textAlign:'left'}}>Strumento</th>
                  <th style={{padding:'8px 10px',textAlign:'right'}}>Giorni</th>
                  <th style={{padding:'8px 10px',textAlign:'left'}}>Rif.</th>
                  <th style={{padding:'8px 10px',textAlign:'right'}}>Extra</th>
                  <th style={{padding:'8px 10px',textAlign:'left'}}>Note</th>
                  <th style={{padding:'8px 10px',textAlign:'center'}}>Azioni</th>
                </tr>
              </thead>
              <tbody>
                {D.modalitaPagamento.map(m=>(
                  <tr key={m.id} style={{borderTop:`1px solid ${T.border}`,background:editingId===m.id?T.blueL:'transparent'}}>
                    <td style={{padding:'8px 10px',fontWeight:600}}>{m.nome}</td>
                    <td style={{padding:'8px 10px'}}><Badge text={m.strumento}/></td>
                    <td style={{padding:'8px 10px',textAlign:'right'}}>{m.giorni}</td>
                    <td style={{padding:'8px 10px',color:T.textL,fontSize:11}}>{m.riferimento}</td>
                    <td style={{padding:'8px 10px',textAlign:'right'}}>{m.giorniExtra>0?`+${m.giorniExtra}gg`:'—'}</td>
                    <td style={{padding:'8px 10px',color:T.textL,fontSize:11}}>{m.note||'—'}</td>
                    <td style={{padding:'8px 10px',textAlign:'center',whiteSpace:'nowrap'}}>
                      <button onClick={()=>startEdit(m)} style={{background:'none',border:'none',color:T.blue,cursor:'pointer',marginRight:6,fontSize:14}} title="Modifica">✏️</button>
                      <button onClick={()=>{ if(confirm(`Eliminare "${m.nome}"?`)) deleteMP(m.id); }} style={{background:'none',border:'none',color:T.red,cursor:'pointer',fontSize:14}} title="Elimina">🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Card>
      </div>
    </div>
  );
};

                </div>
                {impN>0&&garVal&&(
                  <div style={{marginTop:10,padding:10,background:'#fffbeb',borderRadius:8,border:'1px solid #fde68a',display:'flex',gap:24}}>
                    <div><div style={{fontSize:10,color:T.textL}}>Importo garanzia su contratto</div><div style={{fontWeight:700,color:T.amber}}>{fmt(garImportoEsempio)}</div></div>
                    <div><div style={{fontSize:10,color:T.textL}}>Evento svincolo</div><div style={{fontWeight:600,color:T.text}}>{garEvento}</div></div>
                    <div><div style={{fontSize:10,color:T.textL}}>Durata</div><div style={{fontWeight:600,color:T.text}}>{garSvincolo==='custom'?'Personalizzata':garSvincolo+' mesi'}</div></div>
                    <div><div style={{fontSize:10,color:T.textL}}>Data svincolo</div><div style={{fontWeight:600,color:T.textL}}>Calcolata al {garEvento}</div></div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Blocco COMPENSAZIONI */}
          <div style={{border:`1px solid ${compEnabled?T.blue:T.border}`,borderRadius:10,marginBottom:14,overflow:'hidden'}}>
            <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',background:compEnabled?T.blueL:'#fafafa',cursor:'pointer'}} onClick={()=>setCompEnabled(a=>!a)}>
              <input type="checkbox" checked={compEnabled} readOnly style={{accentColor:T.blue,width:16,height:16,cursor:'pointer'}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:13,color:compEnabled?T.blue:T.text}}>Compensazioni abilitate</div>
                <div style={{fontSize:11,color:T.textL}}>Permette di compensare fatture passive con attive sub, in tutte le direzioni (noi→sub, cliente→noi, ecc.)</div>
              </div>
            </div>
          </div>

          <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
            <Btn onClick={()=>setStep(1)} variant='outline'>← Indietro</Btn>
            <Btn onClick={()=>setStep(3)}>Riepilogo →</Btn>
          </div>
        </Card>
      )}

      {/* ── STEP 3: Riepilogo ── */}
      {step===3&&(
        <Card>
          <SectionTitle children="Riepilogo configurazione"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div>
              <div style={{fontWeight:700,marginBottom:10,fontSize:13,color:T.textL,textTransform:'uppercase',letterSpacing:.5}}>Dati base</div>
              <InfoRow label="Tipo" value={tipo}/>
              <InfoRow label="Codice" value={codice||'—'}/>
              <InfoRow label="Nome" value={nome||'—'}/>
              <InfoRow label="Cliente" value={cliente||'—'}/>
              <InfoRow label="Importo contrattuale" value={fmt(impN)}/>
              <InfoRow label="Fatturazione" value={fattMode}/>
              <InfoRow label="Pagamento" value={pagMode}/>
            </div>
            <div>
              <div style={{fontWeight:700,marginBottom:10,fontSize:13,color:T.textL,textTransform:'uppercase',letterSpacing:.5}}>Regole economiche</div>
              {accActive?(
                <>
                  <InfoRow label="Acconto" value={accTipo==='Percentuale'?`${accVal}% = ${fmt(accImporto)}`:fmt(accImporto)} color={T.purple}/>
                  <InfoRow label="⚠ Garanzia su acconto" value="NON applicata" color={T.amber}/>
                  <InfoRow label="Recupero" value={{su_ogni_sal:'Su ogni SAL stessa %',unica:'In unica soluzione',ultimo_sal:'Ultimo SAL/fine commessa',personalizzata:'Personalizzata'}[accRegola]}/>
                </>
              ):<InfoRow label="Acconto" value="Non configurato" color={T.textL}/>}
              {garActive?(
                <>
                  <InfoRow label="Garanzia" value={garTipo==='Percentuale'?`${garVal}% = ${fmt(garImportoEsempio)}`:fmt(garImportoEsempio)} color={T.amber}/>
                  <InfoRow label="Evento svincolo" value={garEvento}/>
                  <InfoRow label="Durata svincolo" value={garSvincolo==='custom'?'Personalizzata':garSvincolo+' mesi'}/>
                  <InfoRow label="Data svincolo" value="Calcolata automaticamente"/>
                </>
              ):<InfoRow label="Garanzia" value="Non configurata" color={T.textL}/>}
              <InfoRow label="Compensazioni" value={compEnabled?'Abilitate':'Disabilitate'}/>
            </div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <Btn onClick={()=>setStep(2)} variant='outline'>← Modifica regole</Btn>
            <Btn onClick={()=>{
              const nuova = {
                id: `C${Date.now()}`,
                codice, nrOrdine, nome, cliente,
                tipoLavoro: tipo,
                importoContrattuale: impN,
                stato: 'Attiva',
                dataInizio, dataFine,
                fattMode, pagMode,
                salProdAttivoTot: 0,
                fatturato: 0,
                incassato: 0,
                madreId: tipo==='Extra'?madreId:null,
                autonomo: tipo==='Extra'?autonomo:null,
                acconto: accActive ? {tipo:accTipo,val:accVal,regola:accRegola,importo:accImporto} : null,
                garanzia: garActive ? {tipo:garTipo,val:garVal,evento:garEvento,svincolo:garSvincolo} : null,
                compEnabled,
                contratto: contrattoFile||null,
                criticita: [],
                pagato: 0,
                _nuova: true,
              };
              // Il push è fatto da addCommessa (in App) — non pushiamo qui
              if(addCommessa) addCommessa(nuova);
              setNuovaCreata(nuova);
              setStep(4);
            }}>✓ Conferma creazione</Btn>
          </div>
        </Card>
      )}

      {/* ── STEP 4: Conferma ── */}
      {step===4&&(
        <Card>
          <div style={{textAlign:'center',padding:40}}>
            <div style={{fontSize:48,marginBottom:16}}>✅</div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Creazione confermata!</div>
            <div style={{color:T.textL,marginBottom:8}}>La {tipo} <b>{nuovaCreata?.codice||codice} – {nuovaCreata?.nome||nome}</b> è stata registrata.</div>
            <div style={{color:T.textL,fontSize:13,marginBottom:8}}>Il record è ora visibile in Watchlist, SAL e filtri.</div>
            <div style={{color:T.textL,fontSize:13,marginBottom:24}}>I SAL andranno inseriti manualmente nella sezione <b>Gestione SAL</b>.</div>
            <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:12,marginBottom:20,fontSize:12,color:T.green,textAlign:'left',maxWidth:360,margin:'0 auto 20px'}}>
              <b>Riepilogo creato:</b><br/>
              {nuovaCreata?.codice} · {nuovaCreata?.nome} · {fmt(nuovaCreata?.importoContrattuale||0)}<br/>
              Cliente: {nuovaCreata?.cliente} · Tipo: {nuovaCreata?.tipoLavoro}
            </div>
            <div style={{display:'flex',gap:12,justifyContent:'center'}}>
              <Btn onClick={()=>{
                setStep(1);setCodice('');setNome('');setCliente('');setImporto('');
                setAccActive(false);setGarActive(false);setNuovaCreata(null);
              }} variant='outline'>+ Crea altro</Btn>
              <Btn onClick={()=>onNav&&onNav('sal')}>→ Vai alla Gestione SAL</Btn>
              <Btn onClick={()=>onNav&&onNav('watchlist')} variant='outline'>Vai a Watchlist</Btn>
            </div>
          </div>
        </Card>
      )}
    </div>
  );
};

/* ─── PAGE: GARANZIE & ACCONTI ───────────────────────────── */
const PageGaranzieAcconti = ({openModal})=>{
  const [tab,setTab]=useState('trattenuteAtt');
  const [filtComm,setFiltComm]=useState('');
  const [filtCli,setFiltCli]=useState('');
  const [filtStatoAtt,setFiltStatoAtt]=useState('');
  const [expandedPassSub,setExpandedPassSub]=useState(null);

  // ── Trattenute per fattura attiva ──────────────────────────
  const garPerFattAtt = D.fattureAttive.filter(f=>(f.garanzia||0)>0).map(f=>{
    const gRef=D.garanzie.find(g=>g.ref===f.commessa&&g.tipo==='Attiva');
    return {
      ...f,
      garResiduo: f.stato==='Incassata' ? 0 : (f.garanzia||0),
      svincolo: gRef?.svincolo||null,
      cond: gRef?.cond||'—',
    };
  });

  // ── Trattenute per fattura passiva ─────────────────────────
  const garPerFattPass = D.fatturePassive.filter(f=>(f.garanzia||0)>0).map(f=>({
    ...f,
    garResiduo: (f.stato==='Pagata'||f.stato==='Chiusa') ? 0 : (f.garanzia||0),
  }));

  // ── KPI globali ────────────────────────────────────────────
  const totGarAtt  = garPerFattAtt.reduce((a,f)=>a+f.garResiduo,0);
  const totGarPass = garPerFattPass.reduce((a,f)=>a+f.garResiduo,0);
  // Incasso atteso netto = lordo aperte - garanzia ancora trattenuta
  const fattAperteNetto = D.fattureAttive.filter(f=>f.stato!=='Incassata').reduce((a,f)=>a+(f.netto||0),0);

  // ── Filtri per trattenute attive ──────────────────────────
  const commUni=[...new Set(garPerFattAtt.map(f=>f.commessaCodice||f.commessa).filter(Boolean))].sort();
  const cliUni =[...new Set(garPerFattAtt.map(f=>f.cliente))].sort();
  const filtAtt=garPerFattAtt.filter(f=>{
    if(filtComm && (f.commessaCodice||f.commessa)!==filtComm) return false;
    if(filtCli  && f.cliente!==filtCli)   return false;
    if(filtStatoAtt && f.stato!==filtStatoAtt) return false;
    return true;
  });
  const hasFilter=filtComm||filtCli||filtStatoAtt;

  const TABS=[
    {id:'trattenuteAtt',label:'🔐 Trattenute Attive'},
    {id:'trattenutePass',label:'🔏 Trattenute Passive'},
    {id:'svincoli',label:'📅 Svincoli per commessa'},
    {id:'acconti',label:'💰 Acconti'},
  ];

  const TabBar=()=>(
    <div style={{display:'flex',gap:0,borderBottom:`1px solid ${T.border}`,marginBottom:18}}>
      {TABS.map(t=>(
        <div key={t.id} onClick={()=>setTab(t.id)}
          style={{padding:'8px 20px',cursor:'pointer',borderBottom:tab===t.id?`2px solid ${T.blue}`:'2px solid transparent',color:tab===t.id?T.blue:T.textL,fontWeight:tab===t.id?600:400,marginBottom:-1,fontSize:13,whiteSpace:'nowrap'}}>
          {t.label}
        </div>
      ))}
    </div>
  );

  return (
    <div style={{padding:24}}>
      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        <KPICard label="Garanzia trattenuta attiva" value={fmt(totGarAtt)}
          sub="Da clienti – non ancora svincolata" color={T.amber} icon="🔐"/>
        <KPICard label="Garanzia trattenuta passiva" value={fmt(totGarPass)}
          sub="Verso fornitori / sub" color={T.blue} icon="🔏"/>
        <KPICard label="Incasso atteso netto" value={fmt(fattAperteNetto)}
          sub="Fatture aperte netto garanzia" color={T.green} icon="↗"/>
        <KPICard label="Acconti residui" value={fmt(D.acconti.reduce((a,a2)=>a+a2.residuo,0))}
          sub="Da recuperare su SAL" color={T.purple} icon="💰"/>
      </div>

      <TabBar/>

      {/* ── Tab: Trattenute Attive ── */}
      {tab==='trattenuteAtt'&&(
        <div>
          <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
            <select value={filtComm} onChange={e=>setFiltComm(e.target.value)} style={{border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',fontSize:12}}>
              <option value="">Tutte le commesse</option>
              {commUni.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select value={filtCli} onChange={e=>setFiltCli(e.target.value)} style={{border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',fontSize:12}}>
              <option value="">Tutti i clienti</option>
              {cliUni.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select value={filtStatoAtt} onChange={e=>setFiltStatoAtt(e.target.value)} style={{border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',fontSize:12}}>
              <option value="">Tutti gli stati</option>
              {['Aperta','Scaduta','In scadenza','Incassata'].map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            {hasFilter&&<Btn variant='outline' size='sm' onClick={()=>{setFiltComm('');setFiltCli('');setFiltStatoAtt('');}}>✕ Azzera</Btn>}
            <span style={{marginLeft:'auto',fontSize:11,color:T.textL}}>{filtAtt.length} fatture</span>
          </div>
          <Card style={{padding:0}}>
            <Table headers={[
              {label:'Documento'},{label:'Commessa'},{label:'Cliente'},{label:'Tipo'},
              {label:'Data'},{label:'Lordo',right:true},
              {label:'Trattenuta',right:true},{label:'Residuo attivo',right:true},
              {label:'Svincolo'},{label:'Condizione'},{label:'Stato'}
            ]}>
              {filtAtt.map(f=>(
                <tr key={f.id} style={{background:f.stato==='Incassata'?T.greenL:'transparent'}}>
                  <Td><span style={{fontFamily:'monospace',fontSize:11}}>{f.num}</span></Td>
                  <Td bold>{f.commessaCodice||f.commessa||''}</Td>
                  <Td>{f.cliente}</Td>
                  <Td><Badge text={f.tipo}/></Td>
                  <Td nowrap>{fmtDate(f.data)}</Td>
                  <Td right>{fmt(f.lordo)}</Td>
                  <Td right color={T.amber}>{fmt(f.garanzia)}</Td>
                  <Td right bold color={f.garResiduo>0?T.amber:T.green}>
                    {f.garResiduo>0?fmt(f.garResiduo):'Svincolata'}
                  </Td>
                  <Td nowrap color={T.textL}>{fmtDate(f.svincolo)}</Td>
                  <Td color={T.textL} style={{fontSize:11,maxWidth:200}}>{f.cond}</Td>
                  <Td><Badge text={f.stato}/></Td>
                </tr>
              ))}
            </Table>
            <div style={{padding:12,background:'#f8fafc',borderTop:`1px solid ${T.border}`,display:'flex',gap:24}}>
              <span style={{fontSize:12}}>Trattenuta applicata: <b style={{color:T.text}}>{fmt(filtAtt.reduce((a,f)=>a+f.garanzia,0))}</b></span>
              <span style={{fontSize:12}}>Ancora trattenuta: <b style={{color:T.amber}}>{fmt(filtAtt.reduce((a,f)=>a+f.garResiduo,0))}</b></span>
              <span style={{fontSize:12}}>Svincolata: <b style={{color:T.green}}>{fmt(filtAtt.reduce((a,f)=>a+(f.garanzia-f.garResiduo),0))}</b></span>
            </div>
          </Card>
        </div>
      )}

      {/* ── Tab: Trattenute Passive ── */}
      {tab==='trattenutePass'&&(
        <div>
          {/* Riepilogo globale */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:16}}>
            <KPICard label="Trattenuta totale" value={fmt(garPerFattPass.reduce((a,f)=>a+f.garanzia,0))} color={T.blue} icon="🔏"/>
            <KPICard label="Residuo da svincolare" value={fmt(totGarPass)} color={T.amber} icon="⏳"/>
            <KPICard label="Già liberata" value={fmt(garPerFattPass.reduce((a,f)=>a+(f.garanzia-f.garResiduo),0))} color={T.green} icon="✓"/>
          </div>

          {/* Raggruppamento per subappaltatore */}
          {(()=>{
            // Costruisci mappa sub → commesse → fatture
            const bySub={};
            garPerFattPass.forEach(f=>{
              if(!bySub[f.fornitore]) bySub[f.fornitore]={fornitore:f.fornitore,fatture:[],totGar:0,totRes:0,totSvinc:0};
              bySub[f.fornitore].fatture.push(f);
              bySub[f.fornitore].totGar+=f.garanzia||0;
              bySub[f.fornitore].totRes+=f.garResiduo;
              bySub[f.fornitore].totSvinc+=(f.garanzia||0)-f.garResiduo;
            });
            const subList=Object.values(bySub).sort((a,b)=>b.totRes-a.totRes);
            return subList.map(sub=>{
              const isOpen=expandedPassSub===sub.fornitore;
              // Raggruppa per commessa
              const byComm={};
              sub.fatture.forEach(f=>{
                const ck=f.commessaCodice||f.commessa||'—';
                if(!byComm[ck]) byComm[ck]={commessa:ck,fatture:[],totGar:0,totRes:0,totSvinc:0};
                byComm[ck].fatture.push(f);
                byComm[ck].totGar+=f.garanzia||0;
                byComm[ck].totRes+=f.garResiduo;
                byComm[ck].totSvinc+=(f.garanzia||0)-f.garResiduo;
              });
              const commList=Object.values(byComm).sort((a,b)=>b.totRes-a.totRes);
              return (
                <Card key={sub.fornitore} style={{marginBottom:12,padding:0}}>
                  {/* Header sub */}
                  <div onClick={()=>setExpandedPassSub(isOpen?null:sub.fornitore)}
                    style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',cursor:'pointer',background:isOpen?'#f8fafc':'#fff',borderRadius:isOpen?'8px 8px 0 0':8}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <span style={{fontSize:18}}>🔏</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:14}}>{sub.fornitore}</div>
                        <div style={{fontSize:11,color:T.textL}}>{sub.fatture.length} fatture · {commList.length} commesse</div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:24,alignItems:'center'}}>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase',marginBottom:1}}>Totale trattenuto</div>
                        <div style={{fontWeight:700,color:T.blue,fontSize:15}}>{fmt(sub.totGar)}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase',marginBottom:1}}>Residuo</div>
                        <div style={{fontWeight:700,color:sub.totRes>0?T.amber:T.green,fontSize:15}}>{fmt(sub.totRes)}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:10,color:T.textL,fontWeight:600,textTransform:'uppercase',marginBottom:1}}>Liberato</div>
                        <div style={{fontWeight:700,color:T.green,fontSize:15}}>{fmt(sub.totSvinc)}</div>
                      </div>
                      <span style={{color:T.textL,fontSize:16}}>{isOpen?'▲':'▼'}</span>
                    </div>
                  </div>

                  {/* Dettaglio per commessa */}
                  {isOpen&&(
                    <div style={{padding:'0 16px 16px'}}>
                      {commList.map(c=>(
                        <div key={c.commessa} style={{marginTop:14}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                            <span style={{fontWeight:600,fontSize:12,background:'#f1f5f9',padding:'2px 8px',borderRadius:4,fontFamily:'monospace'}}>{c.commessa}</span>
                            <div style={{display:'flex',gap:16,fontSize:12}}>
                              <span style={{color:T.blue}}>Totale: <b>{fmt(c.totGar)}</b></span>
                              <span style={{color:c.totRes>0?T.amber:T.green}}>Residuo: <b>{fmt(c.totRes)}</b></span>
                              <span style={{color:T.green}}>Liberato: <b>{fmt(c.totSvinc)}</b></span>
                            </div>
                          </div>
                          <div style={{background:'#f8fafc',borderRadius:6,overflow:'hidden',border:`1px solid ${T.border}`}}>
                            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                              <thead>
                                <tr style={{background:'#f1f5f9'}}>
                                  <th style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:T.textL,fontSize:11}}>Documento</th>
                                  <th style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:T.textL,fontSize:11}}>Data</th>
                                  <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.textL,fontSize:11}}>Lordo</th>
                                  <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.blue,fontSize:11}}>Garanzia</th>
                                  <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.amber,fontSize:11}}>Residuo</th>
                                  <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.green,fontSize:11}}>Liberato</th>
                                  <th style={{padding:'6px 10px',textAlign:'center',fontWeight:600,color:T.textL,fontSize:11}}>Stato</th>
                                </tr>
                              </thead>
                              <tbody>
                                {c.fatture.map(f=>(
                                  <tr key={f.id} style={{borderTop:`1px solid ${T.border}`}}>
                                    <td style={{padding:'7px 10px',fontFamily:'monospace',fontSize:11}}>{f.num}</td>
                                    <td style={{padding:'7px 10px'}}>{fmtDate(f.data)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'right'}}>{fmt(f.lordo)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:T.blue}}>{fmt(f.garanzia||0)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:f.garResiduo>0?T.amber:T.green}}>{fmt(f.garResiduo)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'right',color:T.green}}>{fmt((f.garanzia||0)-f.garResiduo)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'center'}}><Badge text={f.stato.toLowerCase()}/></td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </Card>
              );
            });
          })()}
        </div>
      )}

      {/* ── Tab: Svincoli per commessa ── */}
      {tab==='svincoli'&&(
        <Card style={{padding:0}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:600}}>
            Programma svincoli ({D.garanzie.length})
          </div>
          <Table headers={[
            {label:'Origine'},{label:'Riferimento'},{label:'Tipo'},
            {label:'Imp. originale',right:true},{label:'Residuo',right:true},{label:'%'},
            {label:'Svincolo'},{label:'Condizione'},{label:'Stato'}
          ]}>
            {D.garanzie.map(g=>(
              <tr key={g.id} style={{background:g.stato==='In scadenza'?T.amberL:'transparent'}}>
                <Td><Badge text={g.origine}/></Td>
                <Td>{g.nome}</Td>
                <Td><span style={{color:g.tipo==='Attiva'?T.green:T.blue,fontWeight:600}}>{g.tipo}</span></Td>
                <Td right>{fmt(g.origImporto)}</Td>
                <Td right bold color={T.amber}>{fmt(g.residuo)}</Td>
                <Td>{g.perc}%</Td>

/* ─── PAGE: UTENZE & FORNITORI (componente condiviso) ─────── */
const PageFornitoriBase = ({catFilter,pageTitle,icon})=>{
  const [soloAperte,setSoloAperte]=useState(true);
  const [filtNome,setFiltNome]=useState('');
  const [filtDaData,setFiltDaData]=useState('');
  const [filtAData,setFiltAData]=useState('');
  const [filtImpMin,setFiltImpMin]=useState('');
  const [filtImpMax,setFiltImpMax]=useState('');
  const [filtStato,setFiltStato]=useState('');

  const fornitori=D.fornitoriGenerici.filter(f=>catFilter==='utenze'?f.cat==='Utenze':f.cat!=='Utenze');

  const allMov=fornitori.flatMap(f=>
    (f.movimenti||[]).map(m=>({...m,nome:f.nome,cat:f.cat,noteFornitore:f.note||''}))
  ).sort((a,b)=>b.data.localeCompare(a.data));

  const base=soloAperte?allMov.filter(m=>m.stato==='Aperta'):allMov;
  const filtrati=base.filter(m=>{
    if(filtNome&&!m.nome.toLowerCase().includes(filtNome.toLowerCase())) return false;
    if(filtDaData&&m.data<filtDaData) return false;
    if(filtAData&&m.data>filtAData) return false;
    if(filtImpMin&&m.importo<parseFloat(filtImpMin)) return false;
    if(filtImpMax&&m.importo>parseFloat(filtImpMax)) return false;
    if(filtStato&&m.stato!==filtStato) return false;
    return true;
  });

  const oggi30=new Date(today.getTime()+30*86400000);
  const totAperto=fornitori.reduce((a,f)=>a+(f.aperto||0),0);
  const totPagato=fornitori.reduce((a,f)=>a+(f.pagato||0),0);
  const tot30gg=allMov.filter(m=>m.stato==='Aperta'&&m.scadenza&&new Date(m.scadenza)<=oggi30).reduce((a,m)=>a+m.importo,0);

  // Storico mensile
  const perMese={};
  allMov.forEach(m=>{
    const k=m.data.slice(0,7);
    if(!perMese[k]) perMese[k]={mese:k,tot:0,aperto:0,pagato:0,n:0};
    perMese[k].tot+=m.importo; perMese[k].n++;
    if(m.stato==='Pagata') perMese[k].pagato+=m.importo;
    else perMese[k].aperto+=m.importo;
  });
  const rigaMesi=Object.values(perMese).sort((a,b)=>b.mese.localeCompare(a.mese));

  // Totale per fornitore
  const perFornitore={};
  allMov.forEach(m=>{
    if(!perFornitore[m.nome]) perFornitore[m.nome]={nome:m.nome,cat:m.cat,tot:0,aperto:0,pagato:0,n:0};
    perFornitore[m.nome].tot+=m.importo; perFornitore[m.nome].n++;
    if(m.stato==='Pagata') perFornitore[m.nome].pagato+=m.importo;
    else perFornitore[m.nome].aperto+=m.importo;
  });
  const rigaForn=Object.values(perFornitore).sort((a,b)=>b.tot-a.tot);

  const statiUnici=[...new Set(allMov.map(m=>m.stato))].sort();
  const nomiUnici=[...new Set(fornitori.map(f=>f.nome))].sort();
  const hasFilter=filtNome||filtDaData||filtAData||filtImpMin||filtImpMax||filtStato;

  return (
    <div style={{padding:24}}>
      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        <KPICard label="Totale aperto" value={fmt(totAperto)} color={T.amber} icon={icon}/>
        <KPICard label="Totale pagato" value={fmt(totPagato)} color={T.green} icon="✓"/>
        <KPICard label="Prossimi 30 giorni" value={fmt(tot30gg)} color={T.red} icon="📅"/>
        <KPICard label={catFilter==='utenze'?'Fornitori utenze':'Fornitori mat./servizi'} value={fornitori.length} color={T.blue} icon="📋"/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:18,alignItems:'start'}}>
        {/* Colonna sinistra: filtri + tabella movimenti */}
        <div>
          <Card style={{marginBottom:14,padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontWeight:600,fontSize:13}}>
                {filtrati.length} movimenti{soloAperte?' aperti':' totali'}
                {soloAperte&&<span style={{fontSize:11,color:T.textL,fontWeight:400,marginLeft:8}}>· {allMov.filter(m=>m.stato!=='Aperta').length} storico nascosto</span>}
              </span>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                {hasFilter&&<Btn variant='outline' size='sm' onClick={()=>{setFiltNome('');setFiltDaData('');setFiltAData('');setFiltImpMin('');setFiltImpMax('');setFiltStato('');}}>✕ Azzera</Btn>}
                <ViewToggle solo={soloAperte} onChange={setSoloAperte}/>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',gap:10}}>
              <FilterField label="Fornitore">
                <select value={filtNome} onChange={e=>setFiltNome(e.target.value)} style={inputSt}>
                  <option value="">Tutti</option>
                  {nomiUnici.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              </FilterField>
              <FilterField label="Data da">
                <input type="date" value={filtDaData} onChange={e=>setFiltDaData(e.target.value)} style={inputSt}/>
              </FilterField>
              <FilterField label="Data a">
                <input type="date" value={filtAData} onChange={e=>setFiltAData(e.target.value)} style={inputSt}/>
              </FilterField>
              <FilterField label="Importo min (€)">
                <input type="number" value={filtImpMin} onChange={e=>setFiltImpMin(e.target.value)} placeholder="0" style={inputSt}/>
              </FilterField>
              <FilterField label="Importo max (€)">
                <input type="number" value={filtImpMax} onChange={e=>setFiltImpMax(e.target.value)} placeholder="∞" style={inputSt}/>
              </FilterField>
              <FilterField label="Stato">
                <select value={filtStato} onChange={e=>setFiltStato(e.target.value)} style={inputSt}>
                  <option value="">Tutti</option>
                  {statiUnici.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </FilterField>
            </div>
          </Card>

          <Card style={{padding:0}}>
            <Table headers={[
              {label:'Fornitore'},{label:'Categoria'},{label:'Documento'},{label:'Data'},
              {label:'Scadenza'},{label:'Importo',right:true},{label:'Stato'},{label:'Note'}
            ]}>
              {filtrati.map((m,i)=>{
                const scadMs=m.scadenza?new Date(m.scadenza).getTime():null;
                const diff=scadMs?Math.round((scadMs-today.getTime())/86400000):null;
                const urgente=diff!==null&&diff<=7&&m.stato==='Aperta';
                return (
                  <tr key={i} style={{background:urgente?'rgba(220,38,38,.04)':'transparent'}}>
                    <Td bold>{m.nome}</Td>
                    <Td><Badge text={m.cat}/></Td>
                    <Td><span style={{fontFamily:'monospace',fontSize:11}}>{m.num}</span></Td>
                    <Td nowrap>{fmtDate(m.data)}</Td>
                    <Td nowrap>
                      <span style={{color:urgente?T.red:T.text,fontWeight:urgente?700:400}}>
                        {fmtDate(m.scadenza)}{urgente?` (${diff}gg)`:''}
                      </span>
                    </Td>
                    <Td right bold>{fmt(m.importo)}</Td>
                    <Td><Badge text={m.stato}/></Td>
                    <Td color={T.textL}>{m.noteFornitore||'—'}</Td>
                  </tr>
                );
              })}
            </Table>
            <TotalsBar items={[
              {label:`${filtrati.length} movimenti`,value:'',color:T.textL},
              {label:'Totale',value:fmt(filtrati.reduce((a,m)=>a+m.importo,0))},
              {label:'Aperto',value:fmt(filtrati.filter(m=>m.stato!=='Pagata').reduce((a,m)=>a+m.importo,0)),color:T.amber},
              {label:'Pagato',value:fmt(filtrati.filter(m=>m.stato==='Pagata').reduce((a,m)=>a+m.importo,0)),color:T.green},
            ]}/>
          </Card>
        </div>

        {/* Colonna destra: storico mensile + riepilogo per fornitore */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <Card>
            <SectionTitle children="Storico mensile"/>
            {rigaMesi.length===0&&<div style={{color:T.textL,fontSize:12,textAlign:'center',padding:16}}>Nessun dato</div>}
            {rigaMesi.map(r=>(
              <div key={r.mese} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:`1px solid ${T.border}`}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{r.mese}</div>
                  <div style={{fontSize:11,color:T.textL}}>{r.n} movimenti</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,color:T.text,fontSize:13}}>{fmt(r.tot)}</div>
                  <div style={{fontSize:11,color:r.aperto>0?T.amber:T.green}}>
                    {r.aperto>0?`Aperto: ${fmt(r.aperto)}`:'Tutto pagato'}
                  </div>
                </div>
              </div>
            ))}
          </Card>

          <Card>
            <SectionTitle children="Per fornitore"/>
            {rigaForn.map(r=>(
              <div key={r.nome} style={{padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontWeight:600,fontSize:12}}>{r.nome}</span>
                  <span style={{fontWeight:700,fontSize:12}}>{fmt(r.tot)}</span>
                </div>
                <div style={{display:'flex',gap:10}}>
                  {r.aperto>0&&<span style={{fontSize:11,color:T.amber}}>Aperto: {fmt(r.aperto)}</span>}
                  {r.pagato>0&&<span style={{fontSize:11,color:T.green}}>Pagato: {fmt(r.pagato)}</span>}
                </div>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
};

const PageSubappaltatori = ({onNav})=>{
  const [tab,setTab]=useState('fatture');

  const [filtDa,setFiltDa]=useState('');
  const [filtA,setFiltA]=useState('');
  const [filtImpMin,setFiltImpMin]=useState('');
  const [filtImpMax,setFiltImpMax]=useState('');
  const [filtStato,setFiltStato]=useState('');
  const [expandedFP,setExpandedFP]=useState(null);
  // --- Garanzie tab state ---
  const [expandedSub,setExpandedSub]=useState(null);
  // --- Compensazioni tab state ---
  const [filtCompNome,setFiltCompNome]=useState('');
  const [filtCompComm,setFiltCompComm]=useState('');

  // ── Dati base ──────────────────────────────────────────────
  const fpSub = D.fatturePassive.filter(f=>f.tipo==='Subappaltatore');
  const compSub = D.compensazioni.filter(c=>c.direzione==='noi→sub');

  const nomiUnici   = [...new Set(fpSub.map(f=>f.fornitore))].sort();
  const commUnici   = [...new Set(fpSub.map(f=>f.commessaCodice||f.commessa).filter(Boolean))].sort();
  const statiUnici  = [...new Set(fpSub.map(f=>f.stato))].sort();

  // ── Tab Fatture Passive ────────────────────────────────────
  const baseFP = soloAperte
    ? fpSub.filter(f=>f.stato!=='Pagata'&&f.stato!=='Chiusa')
    : fpSub;

  const filtratiFP = baseFP.filter(f=>{
    if(filtNome&&!f.fornitore.toLowerCase().includes(filtNome.toLowerCase())) return false;
    if(filtCommessa&&(f.commessaCodice||f.commessa)!==filtCommessa) return false;
    if(filtDa&&f.data<filtDa) return false;
    if(filtA&&f.data>filtA) return false;
    if(filtImpMin&&f.lordo<parseFloat(filtImpMin)) return false;
    if(filtImpMax&&f.lordo>parseFloat(filtImpMax)) return false;
    if(filtStato&&f.stato!==filtStato) return false;
    return true;
  });

  const totLordo  = filtratiFP.reduce((a,f)=>a+f.lordo,0);
  const totGarFP  = filtratiFP.reduce((a,f)=>a+(f.garanzia||0),0);
  const totNetto  = filtratiFP.reduce((a,f)=>a+f.netto,0);
  const todayMs   = today.getTime();
  const oggi30    = new Date(todayMs+30*86400000);

  const clearFiltFP=()=>{setFiltNome('');setFiltCommessa('');setFiltDa('');setFiltA('');setFiltImpMin('');setFiltImpMax('');setFiltStato('');};
  const hasFiltFP=filtNome||filtCommessa||filtDa||filtA||filtImpMin||filtImpMax||filtStato;

  // ── Tab Garanzie ───────────────────────────────────────────
  // Per-sub: raggruppa fpSub per fornitore, poi per commessa
  const garBySub = {};
  fpSub.forEach(f=>{
    const isChiusa = f.stato==='Pagata'||f.stato==='Chiusa';
    const residuo = isChiusa ? 0 : (f.garanzia||0);
    const svincolata = (f.garanzia||0) - residuo;
    const nettoAp = isChiusa ? 0 : f.netto;
    if(!garBySub[f.fornitore]) garBySub[f.fornitore]={
      fornitore:f.fornitore,fatture:[],
      totGar:0,totResiduo:0,totSvinc:0,
      nettoAperto:0,totLordo:0,nFatture:0,nAperte:0
    };
    garBySub[f.fornitore].fatture.push({...f,garResiduo:residuo,garSvincolata:svincolata});
    garBySub[f.fornitore].totGar+=f.garanzia||0;
    garBySub[f.fornitore].totResiduo+=residuo;
    garBySub[f.fornitore].totSvinc+=svincolata;
    garBySub[f.fornitore].nettoAperto+=nettoAp;
    garBySub[f.fornitore].totLordo+=f.lordo;
    garBySub[f.fornitore].nFatture++;
    if(!isChiusa) garBySub[f.fornitore].nAperte++;
  });
  const garSubList = Object.values(garBySub).sort((a,b)=>b.totResiduo-a.totResiduo);

  const kpiGarResiduo = fpSub.reduce((a,f)=>a+((f.stato==='Pagata'||f.stato==='Chiusa')?0:(f.garanzia||0)),0);
  const kpiGarSvinc   = kpiGarTot - kpiGarResiduo;

    if(filtCompNome&&!c.fornitore.toLowerCase().includes(filtCompNome.toLowerCase())) return false;

    return true;
  });

  const totBonificoRes = filtratiComp.reduce((a,c)=>a+c.bonificoRes,0);

    background:'transparent',border:'none',borderBottom:`2px solid ${tab===id?T.blue:'transparent'}`,

        <KPICard label="Netto da pagare" value={fmt(kpiDaPagare)} color={T.amber} icon="💸"/>
        <KPICard label="Garanzia trattenuta residua" value={fmt(kpiGarResiduo)} color={T.purple} icon="🔒"/>
        <KPICard label="Fatture scadute aperte" value={kpiScadute.length} color={T.red} icon="⚠"/>
      </div>

        <button style={tabSt('garanzie')} onClick={()=>setTab('garanzie')}>🔒 Garanzie Trattenute</button>
        <button style={tabSt('compensazioni')} onClick={()=>setTab('compensazioni')}>⇌ Compensazioni</button>
      </div>

      {tab==='fatture'&&(
        <div>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontWeight:600,fontSize:13}}>
                {filtratiFP.length} fatture{soloAperte?' aperte':' totali'}
                {soloAperte&&<span style={{fontSize:11,color:T.textL,fontWeight:400,marginLeft:8}}>· {fpSub.filter(f=>f.stato==='Pagata'||f.stato==='Chiusa').length} storico nascosto</span>}
              </span>

              </div>
            </div>

                const scadMs=f.scadenza?new Date(f.scadenza).getTime():null;

                const scaduta=diff!==null&&diff<0&&f.stato!=='Pagata'&&f.stato!=='Chiusa';
                const urgente=diff!==null&&diff>=0&&diff<=7&&f.stato!=='Pagata'&&f.stato!=='Chiusa';
                const isExp=expandedFP===f.id;
                return (<React.Fragment key={f.id}>
                  <tr onClick={()=>setExpandedFP(isExp?null:f.id)}
                    style={{cursor:'pointer',background:scaduta?'rgba(220,38,38,.04)':urgente?'rgba(217,119,6,.04)':isExp?'#f8fafc':'transparent'}}>
                    <Td>{i+1}</Td>
                    <Td bold>{f.fornitore}</Td>
                    <Td><span style={{fontFamily:'monospace',fontSize:11,background:'#f1f5f9',padding:'1px 6px',borderRadius:4}}>{f.commessaCodice||f.commessa||''}</span></Td>

                    <Td nowrap>{fmtDate(f.data)}</Td>

                      <span style={{color:scaduta?T.red:urgente?T.amber:T.text,fontWeight:(scaduta||urgente)?700:400}}>

                    <Td right bold>{fmt(f.lordo)}</Td>
                    <Td right><span style={{color:T.purple,fontWeight:600}}>{fmt(f.garanzia||0)}</span></Td>
                    <Td right><span style={{color:T.blue}}>{fmt(f.compSub||0)}</span></Td>
                    <Td right bold>{fmt(f.netto)}</Td>
                    <Td><Badge text={f.stato.toLowerCase()}/></Td>
                  </tr>
                  {isExp&&(
                    <tr>
                      <td colSpan={11} style={{background:'#f8fafc',padding:'10px 16px',borderBottom:`1px solid ${T.border}`}}>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,fontSize:12}}>
                          <div><div style={{color:T.textL,fontSize:10,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Garanzia</div><div style={{fontWeight:700,color:T.purple}}>{fmt(f.garanzia||0)}</div><div style={{fontSize:10,color:T.textL}}>{(f.garanzia/(f.lordo||1)*100).toFixed(1)}% del lordo</div></div>
                          <div><div style={{color:T.textL,fontSize:10,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Compensazione sub</div><div style={{fontWeight:700,color:T.blue}}>{fmt(f.compSub||0)}</div></div>
                          <div><div style={{color:T.textL,fontSize:10,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Compensazione gen.</div><div style={{fontWeight:700,color:T.textL}}>{fmt(f.compGen||0)}</div></div>
                          <div><div style={{color:T.textL,fontSize:10,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Netto da pagare</div><div style={{fontWeight:700,color:T.amber}}>{fmt(f.netto)}</div></div>
                          <div><div style={{color:T.textL,fontSize:10,fontWeight:700,textTransform:'uppercase',marginBottom:3}}>Note</div><div style={{color:T.textL}}>{f.note||'—'}</div></div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>);
              })}
            </Table>
            <TotalsBar items={[
              {label:`${filtratiFP.length} fatture`,value:'',color:T.textL},
              {label:'Totale lordo',value:fmt(totLordo)},
              {label:'Garanzia trattenuta',value:fmt(totGarFP),color:T.purple},
              {label:'Netto da pagare',value:fmt(totNetto),color:T.amber},

          </Card>
        </div>
      )}

      {/* ── TAB: GARANZIE ── */}
      {tab==='garanzie'&&(
        <div>
          {/* KPI garanzie */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
            <KPICard label="Garanzia totale trattenuta" value={fmt(kpiGarTot)} color={T.purple} icon="🔒"/>
            <KPICard label="Residuo da svincolare" value={fmt(kpiGarResiduo)} color={T.amber} icon="⏳"/>

          </div>

          {garSubList.map(sub=>{
            const isOpen=expandedSub===sub.fornitore;
            // Raggruppa fatture per commessa — include nettoAperto per commessa
            const byComm={};
            sub.fatture.forEach(f=>{
              const isChiusaF=f.stato==='Pagata'||f.stato==='Chiusa';
              const ck=f.commessaCodice||f.commessa||'—';
              if(!byComm[ck]) byComm[ck]={commessa:ck,fatture:[],totGar:0,totRes:0,totSvinc:0,nettoAp:0};
              byComm[ck].fatture.push(f);
              byComm[ck].totGar+=f.garanzia||0;
              byComm[ck].totRes+=f.garResiduo;
              byComm[ck].totSvinc+=f.garSvincolata;
              byComm[ck].nettoAp+=isChiusaF?0:f.netto;

                      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10}}>
                        {/* Q1: Quanto dobbiamo pagare? */}
                        <div style={{...kpiSt,borderColor:'#fde68a'}}>

                          <div style={{fontSize:10,color:T.textL,marginTop:3}}>Totale ritenuta maturata</div>
                        </div>
                        {/* Q3: Residuo garanzie */}

                        {/* Q4: Già svincolato */}

                    </div>

                    <div style={{fontWeight:700,fontSize:11,color:T.textL,textTransform:'uppercase',letterSpacing:.5,marginBottom:12}}>Dettaglio per commessa</div>

                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>

                              <tr style={{background:'#f1f5f9'}}>
                                <th style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:T.textL,fontSize:11}}>Documento</th>

                                <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.textL,fontSize:11}}>Lordo</th>
                                <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.blue,fontSize:11}}>Comp.</th>

                                <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.purple,fontSize:11}}>Garanzia</th>
                                <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.amber,fontSize:11}}>Gar. residua</th>
                                <th style={{padding:'6px 10px',textAlign:'right',fontWeight:600,color:T.green,fontSize:11}}>Svincolata</th>

                              </tr>
                            </thead>
                            <tbody>
                              {c.fatture.map(f=>{
                                const scadMs=f.scadenza?new Date(f.scadenza).getTime():null;

                                const scaduta=diff!==null&&diff<0&&f.stato!=='Pagata'&&f.stato!=='Chiusa';

                                return (
                                  <tr key={f.id} style={{borderTop:`1px solid ${T.border}`,background:scaduta?'#fff5f5':urg?'#fffbeb':'transparent'}}>

                                    <td style={{padding:'7px 10px',textAlign:'right',fontWeight:700,color:f.garResiduo>0?T.amber:T.green}}>{fmt(f.garResiduo)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'right',color:T.green}}>{fmt(f.garSvincolata)}</td>
                                    <td style={{padding:'7px 10px',textAlign:'center'}}>
                                      <Badge text={f.stato.toLowerCase()}/>
                                      {scaduta&&<div style={{fontSize:9,color:T.red,fontWeight:700}}>SC {Math.abs(diff)}gg</div>}
                                      {urg&&!scaduta&&<div style={{fontSize:9,color:T.amber,fontWeight:700}}>tra {diff}gg</div>}
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                            <tfoot>
                              <tr style={{background:'#f8fafc',borderTop:`2px solid ${T.border}`,fontWeight:700}}>

                                <td style={{padding:'7px 10px',textAlign:'right',color:T.amber}}>{fmt(c.nettoAp)}</td>
                                <td style={{padding:'7px 10px',textAlign:'right',color:T.purple}}>{fmt(c.totGar)}</td>
                                <td style={{padding:'7px 10px',textAlign:'right',color:T.amber}}>{fmt(c.totRes)}</td>
                                <td style={{padding:'7px 10px',textAlign:'right',color:T.green}}>{fmt(c.totSvinc)}</td>
                                <td/>
                              </tr>
                            </tfoot>
                          </table>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      {/* ── TAB: COMPENSAZIONI ── */}
      {tab==='compensazioni'&&(
        <div>
          <Card style={{marginBottom:14,padding:'14px 16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontWeight:600,fontSize:13}}>{filtratiComp.length} compensazioni verso subappaltatori</span>
              {(filtCompNome||filtCompComm)&&<Btn variant='outline' size='sm' onClick={()=>{setFiltCompNome('');setFiltCompComm('');}}>✕ Azzera</Btn>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12}}>
              <FilterField label="Subappaltatore">
                <select value={filtCompNome} onChange={e=>setFiltCompNome(e.target.value)} style={inputSt}>
                  <option value="">Tutti</option>
                  {compNomiUnici.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
              </FilterField>
              <FilterField label="Commessa">
                <select value={filtCompComm} onChange={e=>setFiltCompComm(e.target.value)} style={inputSt}>
                  <option value="">Tutte</option>
                  {compCommUnici.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </FilterField>
            </div>
          </Card>

          <Card style={{padding:0}}>
            <Table headers={[
              {label:'Data'},{label:'Subappaltatore'},{label:'Commessa'},{label:'Fattura passiva'},
              {label:'Descrizione'},{label:'Debito tot.',right:true},{label:'Compensato',right:true},
              {label:'Bonifico residuo',right:true},{label:'Stato banca'},{label:'Origine'}
            ]}>
              {filtratiComp.map(c=>{
                return (
                  <tr key={c.id}>
                    <Td nowrap>{fmtDate(c.data)}</Td>
                    <Td bold>{c.fornitore}</Td>
                    <Td><span style={{fontFamily:'monospace',fontSize:11,background:'#f1f5f9',padding:'1px 6px',borderRadius:4}}>{c.commessa}</span></Td>
                    <Td><span style={{fontFamily:'monospace',fontSize:11}}>{c.passiva||'—'}</span></Td>
                    <Td color={T.textL}>{c.desc}</Td>
                    <Td right bold>{fmt(c.debitoTot)}</Td>
                    <Td right><span style={{color:T.blue,fontWeight:600}}>{fmt(c.compensato)}</span></Td>
                    <Td right><span style={{color:c.bonificoRes>0?T.amber:T.green,fontWeight:700}}>{fmt(c.bonificoRes)}</span></Td>
                    <Td><Badge text={c.statoBanc==='Confermato'?'confermato':c.statoBanc==='Da bonificare'?'aperta':'default'}/></Td>

                  </tr>
                );
              })}
            </Table>
            <TotalsBar items={[
              {label:`${filtratiComp.length} comp.`,value:'',color:T.textL},
              {label:'Totale compensato',value:fmt(totCompensato),color:T.blue},
              {label:'Bonifico residuo',value:fmt(totBonificoRes),color:T.amber},
            ]}/>
          </Card>
        </div>
      )}
    </div>
  );
};

/* ─── PAGE: ANAGRAFICA ───────────────────────────────────── */
const AnagraficaDetail = ({sel, onEdit, onDelete, onClose})=>{
  const isCliente=sel.tipo==='Cliente';
  const isFornitore=sel.tipo==='Fornitore'||sel.tipo==='Subappaltatore'||sel.tipo==='Fornitore generico';
  const fattureList=isCliente
    ?D.fattureAttive.filter(f=>f.cliente===sel.nome).sort((a,b)=>(b.data||'').localeCompare(a.data||''))
    :isFornitore
    ?D.fatturePassive.filter(f=>f.fornitore===sel.nome).sort((a,b)=>(b.data||'').localeCompare(a.data||''))
    :[];
  const totStorico=fattureList.reduce((a,f)=>a+f.netto,0);
  const totAperto=fattureList.filter(f=>f.stato!=='Incassata'&&f.stato!=='Pagata').reduce((a,f)=>a+f.netto,0);
  return (
    <Card style={{overflowY:'auto',maxHeight:'calc(100vh - 260px)'}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <h2 style={{fontWeight:700,fontSize:17,margin:0}}>{sel.nome}</h2>
          <Badge text={sel.tipo}/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>onEdit(sel)} size='sm' variant='outline'>✏ Modifica</Btn>
          <Btn onClick={()=>{if(window.confirm('Eliminare questa anagrafica?')) onDelete(sel.id);}} size='sm' variant='outline'>🗑</Btn>
          <Btn onClick={onClose} variant='outline' size='sm'>✕</Btn>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>

          <InfoRow label="Indirizzo" value={sel.ind||'—'}/>

              <InfoRow label="Totale storico netto" value={fmt(totStorico)}/>

            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead><tr style={{background:T.bg}}>
                {['Num','Data','Lordo','Netto','Stato'].map(h=><th key={h} style={{padding:'6px 10px',textAlign:'left',fontWeight:600,color:T.textL,borderBottom:`1px solid ${T.border}`}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {fattureList.slice(0,20).map((f,i)=>(
                  <tr key={f.id||i} style={{borderBottom:`1px solid ${T.border}`,background:i%2?T.bg:'#fff'}}>
                    <td style={{padding:'5px 10px',fontWeight:600}}>{f.num}</td>
                    <td style={{padding:'5px 10px',color:T.textL}}>{f.data}</td>
                    <td style={{padding:'5px 10px'}}>{fmt(f.lordo)}</td>
                    <td style={{padding:'5px 10px',fontWeight:600}}>{fmt(f.netto)}</td>
                    <td style={{padding:'5px 10px'}}><Badge text={f.stato}/></td>
                  </tr>
                ))}
                {fattureList.length>20&&<tr><td colSpan={5} style={{padding:'6px 10px',color:T.textL,fontSize:11,fontStyle:'italic'}}>... e altre {fattureList.length-20} fatture</td></tr>}
              </tbody>
            </table>
          </div>
        </>
      )}
    </Card>
  );
};

const PageAnagrafica = ({onDataChange})=>{
  const [tipoFilter,setTipoFilter]=useState('Tutti');
  const [sel,setSel]=useState(null);
  const [filter,setFilter]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  // form fields
  const [fNome,setFNome]=useState('');
  const [fTipo,setFTipo]=useState('Cliente');
  const [fPiva,setFPiva]=useState('');
  const [fEmail,setFEmail]=useState('');
  const [fEmailAcq,setFEmailAcq]=useState('');
  const [fEmailCont,setFEmailCont]=useState('');
  const [fEmailPian,setFEmailPian]=useState('');
  const [fPec,setFPec]=useState('');
  const [fSdi,setFSdi]=useState('');
  const [fTel,setFTel]=useState('');
  const [fTelAlt,setFTelAlt]=useState('');
  const [fInd,setFInd]=useState('');
  const [fNote,setFNote]=useState('');

  const _resetForm=()=>{setFNome('');setFTipo('Cliente');setFPiva('');setFEmail('');setFEmailAcq('');setFEmailCont('');setFEmailPian('');setFPec('');setFSdi('');setFTel('');setFTelAlt('');setFInd('');setFNote('');};
  const openNew=()=>{_resetForm();setEditing(null);setShowForm(true);};
  const openEdit=(a)=>{setFNome(a.nome);setFTipo(a.tipo);setFPiva(a.piva||'');setFEmail(a.email||'');setFEmailAcq(a.emailAcq||'');setFEmailCont(a.emailCont||'');setFEmailPian(a.emailPian||'');setFPec(a.pec||'');setFSdi(a.sdi||'');setFTel(a.tel||'');setFTelAlt(a.telAlt||'');setFInd(a.ind||'');setFNote(a.note||'');setEditing(a);setShowForm(true);};
  const salva=()=>{
    if(!fNome.trim()) return;
    const record={nome:fNome,tipo:fTipo,piva:fPiva,email:fEmail,emailAcq:fEmailAcq,emailCont:fEmailCont,emailPian:fEmailPian,pec:fPec,sdi:fSdi,tel:fTel,telAlt:fTelAlt,ind:fInd,note:fNote};
    if(editing){
      const idx=D.anagrafica.findIndex(a=>a.id===editing.id);
      if(idx>=0){D.anagrafica[idx]={...D.anagrafica[idx],...record};}
      setSel({...D.anagrafica.find(a=>a.id===editing.id)});
    } else {
      D.anagrafica.push({id:`ANA-${Date.now()}`,...record,commesse:[],pagato:0});
    }
    setShowForm(false);
    setEditing(null);
    if(onDataChange) onDataChange();
  };
  const elimina=(id)=>{
    const idx=D.anagrafica.findIndex(a=>a.id===id);
    if(idx>=0) D.anagrafica.splice(idx,1);
    setSel(null);
  };

  const rows=D.anagrafica.filter(a=>!filter||(a.nome+a.tipo).toLowerCase().includes(filter.toLowerCase()));
  
  const getTotaliCliente=(nome)=>{
    const fatt=D.fattureAttive.filter(f=>f.cliente===nome);
    const aperte=fatt.filter(f=>f.stato!=='Incassata').reduce((a,f)=>a+f.netto,0);
    const storico=fatt.reduce((a,f)=>a+f.netto,0);
    return {aperte,storico,count:fatt.length};
  };
  const getTotaliFornitore=(nome)=>{
    const fatt=D.fatturePassive.filter(f=>f.fornitore===nome);
    const aperte=fatt.filter(f=>f.stato!=='Pagata'&&f.stato!=='Incassata').reduce((a,f)=>a+f.netto,0);
    const storico=fatt.reduce((a,f)=>a+f.netto,0);
    return {aperte,storico,count:fatt.length};
  };

  return (
    <div style={{padding:24}}>
      {/* Form creazione/modifica */}
      {showForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{background:'#fff',borderRadius:14,padding:28,width:680,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
              <h3 style={{fontWeight:700,fontSize:16,margin:0}}>{editing?'Modifica anagrafica':'Nuova anagrafica'}</h3>
              <button onClick={()=>setShowForm(false)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:T.textL}}>✕</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <LabeledField label="Tipo *">
                <select value={fTipo} onChange={e=>setFTipo(e.target.value)} style={SI}>
                  <option>Cliente</option><option>Fornitore</option><option>Subappaltatore</option><option>Fornitore generico</option><option>Utenza</option>
                </select>
              </LabeledField>
              <LabeledField label="P. IVA / CF">
                <input value={fPiva} onChange={e=>setFPiva(e.target.value)} placeholder="01234567890" style={SI}/>
              </LabeledField>
            </div>
            <LabeledField label="Nome / Ragione sociale *">
              <input value={fNome} onChange={e=>setFNome(e.target.value)} placeholder="Nome fornitore/cliente" style={SI}/>
            </LabeledField>
            <LabeledField label="Indirizzo / Sede legale">
              <input value={fInd} onChange={e=>setFInd(e.target.value)} placeholder="Via Roma 1, 19034 Luni SP" style={SI}/>
            </LabeledField>
            <div style={{background:'#f8fafc',borderRadius:8,padding:12,margin:'8px 0 4px'}}>
              <div style={{fontSize:11,fontWeight:700,color:T.textL,textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>📧 Contatti email</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <LabeledField label="Email principale">
                  <input value={fEmail} onChange={e=>setFEmail(e.target.value)} placeholder="info@azienda.it" style={SI}/>
                </LabeledField>
                <LabeledField label="Email acquisti">
                  <input value={fEmailAcq} onChange={e=>setFEmailAcq(e.target.value)} placeholder="acquisti@azienda.it" style={SI}/>
                </LabeledField>
                <LabeledField label="Email contabilità">
                  <input value={fEmailCont} onChange={e=>setFEmailCont(e.target.value)} placeholder="contabilita@azienda.it" style={SI}/>
                </LabeledField>
                <LabeledField label="Email pianificazione">
                  <input value={fEmailPian} onChange={e=>setFEmailPian(e.target.value)} placeholder="pianificazione@azienda.it" style={SI}/>
                </LabeledField>
                <LabeledField label="PEC">
                  <input value={fPec} onChange={e=>setFPec(e.target.value)} placeholder="azienda@pec.it" style={SI}/>
                </LabeledField>
                <LabeledField label="Codice SDI / FatturaPA">
                  <input value={fSdi} onChange={e=>setFSdi(e.target.value)} placeholder="es. SUBM70N / 0000000" style={SI}/>
                </LabeledField>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:4}}>
              <LabeledField label="Telefono principale">
                <input value={fTel} onChange={e=>setFTel(e.target.value)} placeholder="+39 0187 000000" style={SI}/>
              </LabeledField>
              <LabeledField label="Telefono alternativo / Cellulare">
                <input value={fTelAlt} onChange={e=>setFTelAlt(e.target.value)} placeholder="+39 340 0000000" style={SI}/>
              </LabeledField>
            </div>
            <LabeledField label="Note interne">
              <input value={fNote} onChange={e=>setFNote(e.target.value)} placeholder="Note, referente, condizioni speciali..." style={SI}/>
            </LabeledField>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
              <Btn onClick={()=>setShowForm(false)} variant='outline'>Annulla</Btn>
              <Btn onClick={salva} disabled={!fNome.trim()}>💾 Salva</Btn>
            </div>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:sel?'300px 1fr':'1fr',gap:18}}>
      <Card style={{padding:0,height:'fit-content'}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontWeight:700}}>Anagrafiche ({rows.length})</span>
            <Btn onClick={openNew} size='sm'>+ Nuovo</Btn>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {[{t:'Cliente',c:T.blue},{t:'Fornitore',c:T.green},{t:'Subappaltatore',c:T.purple},{t:'Fornitore generico',c:T.amber},{t:'Utenza',c:T.textL}].map(({t,c})=>(
              <button key={t} type="button" onClick={()=>{setFNome('');setFTipo(t);setFPiva('');setFEmail('');setFTel('');setFInd('');setEditing(null);setShowForm(true);}}
                style={{padding:'3px 10px',borderRadius:20,border:`1px solid ${c}`,background:'#fff',color:c,fontSize:11,cursor:'pointer',fontWeight:600,whiteSpace:'nowrap'}}>
                + {t}
              </button>
            ))}
          </div>
        </div>
        <div style={{padding:'8px 12px',borderBottom:`1px solid ${T.border}`}}>
          <input value={filter} onChange={e=>setFilter(e.target.value)} placeholder="Cerca..." style={{width:'100%',border:`1px solid ${T.border}`,borderRadius:6,padding:'6px 10px',fontSize:13}}/>
        </div>
        {rows.map(a=>(
          <div key={a.id} onClick={()=>setSel(a)} style={{padding:'10px 16px',cursor:'pointer',background:sel?.id===a.id?T.blueL:'transparent',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}
            onMouseEnter={e=>sel?.id!==a.id&&(e.currentTarget.style.background='#f8fafc')}
            onMouseLeave={e=>sel?.id!==a.id&&(e.currentTarget.style.background='transparent')}>
            <div>
              <div style={{fontWeight:600,fontSize:13}}>{a.nome}</div>
              <div style={{fontSize:11,color:T.textL}}>{a.tipo}</div>
            </div>
            <Badge text={a.tipo}/>
          </div>
        ))}
      </Card>
      {sel&&<Card>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <h2 style={{fontWeight:700,fontSize:17}}>{sel.nome}</h2>
            <Badge text={sel.tipo}/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn onClick={()=>openEdit(sel)} size='sm' variant='outline'>✏ Modifica</Btn>
            <Btn onClick={()=>{if(window.confirm('Eliminare questa anagrafica?')) elimina(sel.id);}} size='sm' variant='outline'>🗑 Elimina</Btn>
            <Btn onClick={()=>setSel(null)} variant='outline' size='sm'>✕</Btn>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div>
            <SectionTitle children="Dati aziendali"/>
            <InfoRow label="P. IVA" value={sel.piva||'—'}/>
            <InfoRow label="Email" value={sel.email||'—'}/>
            <InfoRow label="Telefono" value={sel.tel||'—'}/>
            <InfoRow label="Indirizzo" value={sel.ind||'—'}/>
          </div>
          <div>
            <SectionTitle children="Posizione finanziaria"/>
            {sel.attivo!==undefined&&<InfoRow label="Totale attivo aperto" value={fmt(sel.attivo)} color={T.green}/>}
            {sel.passivo!==undefined&&<InfoRow label="Totale passivo aperto" value={fmt(sel.passivo)} color={T.red}/>}
            <InfoRow label="Totale storico pagato" value={fmt(sel.pagato||0)}/>
            {sel.commesse&&sel.commesse.length>0&&<div style={{marginTop:12}}>
              <div style={{fontSize:12,fontWeight:600,color:T.textL,marginBottom:6}}>Commesse collegate</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {sel.commesse.map(c=><Badge key={c} text={c}/>)}
              </div>
            </div>}
          </div>
        </div>
      </Card>}
      </div>
    </div>
  );
};

/* ─── PAGE: FORNITORI GENERICI ───────────────────────────── */
const PageFornitoriGen = ()=>{
  const [sel,setSel]=useState(null);         // fornitore selezionato per dettaglio
  const [kpiFilter,setKpiFilter]=useState(null); // 'utenze' | 'fornMat' | null

  const utenze = D.fornitoriGenerici.filter(f=>f.cat==='Utenze');
  const fornMat = D.fornitoriGenerici.filter(f=>f.cat!=='Utenze');

  const totApertoUtenze = utenze.reduce((a,f)=>a+f.aperto,0);
  const totApertoFornMat = fornMat.reduce((a,f)=>a+f.aperto,0);

  // Righe "piani" per il pannello dettaglio KPI: espande i movimenti aperti per categoria
  const righeDettaglioKPI = (lista)=>{
    const rows=[];
    lista.forEach(f=>{
      (f.movimenti||[]).filter(m=>m.stato==='Aperta').forEach(m=>{
        rows.push({fornitore:f.nome, cat:f.cat, num:m.num, scadenza:m.scadenza, importo:m.importo, stato:m.stato, note:f.note});
      });
    });
    return rows.sort((a,b)=>a.scadenza?.localeCompare(b.scadenza));
  };

  const handleKpiClick = (tipo)=>{
    setKpiFilter(prev=>prev===tipo?null:tipo);
    setSel(null);
  };

  const kpiActiveStyle = (tipo)=>({
    outline: kpiFilter===tipo ? `2.5px solid ${T.blue}` : 'none',
    cursor:'pointer',
    transition:'outline .15s',
  });

  const filteredFornitoriList = kpiFilter==='utenze' ? utenze : kpiFilter==='fornMat' ? fornMat : D.fornitoriGenerici;

  return (
    <div style={{padding:24}}>
      {/* ── KPI cards: 3 mondi separati ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:20}}>
        {/* KPI 1: Utenze */}
        <div onClick={()=>handleKpiClick('utenze')} style={kpiActiveStyle('utenze')}>
          <KPICard
            label="⚡ Utenze da pagare"
            value={fmt(totApertoUtenze)}
            color='#d97706'
            sub={`${utenze.length} fornitori utenze · clicca per dettaglio`}
          />
        </div>
        {/* KPI 2: Fornitori materiali/servizi */}
        <div onClick={()=>handleKpiClick('fornMat')} style={kpiActiveStyle('fornMat')}>
          <KPICard
            label="🏗 Fornitori mat./servizi"
            value={fmt(totApertoFornMat)}
            color={T.red}
            sub={`${fornMat.length} fornitori attivi · clicca per dettaglio`}
          />
        </div>
        {/* KPI 3: Totale complessivo */}
        <KPICard
          label="Totale aperto"
          value={fmt(totApertoUtenze+totApertoFornMat)}
          color={T.blue}
          sub="Utenze + fornitori materiali/servizi"
        />
      </div>

      {/* ── Pannello dettaglio KPI (fatture aperte della categoria selezionata) ── */}
      {kpiFilter&&(()=>{
        const lista = kpiFilter==='utenze' ? utenze : fornMat;
        const label = kpiFilter==='utenze' ? '⚡ Prossime Utenze da Pagare' : '🏗 Prossimi Fornitori Materiali/Servizi da Pagare';
        const rows = righeDettaglioKPI(lista);
        return (
          <Card style={{marginBottom:18,padding:0}}>
            <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:kpiFilter==='utenze'?'#fffbeb':'#fef2f2',borderRadius:'8px 8px 0 0'}}>
              <span style={{fontWeight:700,fontSize:14}}>{label}</span>
              <Btn variant='ghost' size='sm' onClick={()=>setKpiFilter(null)}>✕ Chiudi</Btn>
            </div>
            {rows.length===0
              ? <div style={{padding:20,color:T.textL,textAlign:'center'}}>Nessuna fattura aperta per questa categoria.</div>
              : <Table headers={[{label:'Fornitore'},{label:'Categoria'},{label:'Documento'},{label:'Scadenza'},{label:'Importo',right:true},{label:'Stato'},{label:'Note'}]}>
                  {rows.map((r,i)=>{
                    const scadMs=r.scadenza?new Date(r.scadenza).getTime():null;
                    const oggi=Date.now();
                    const inScadenza=scadMs&&scadMs-oggi<7*86400000&&scadMs>oggi;
                    const scaduta=scadMs&&scadMs<oggi;
                    return (
                      <tr key={i} style={{background:scaduta?'rgba(220,38,38,.04)':inScadenza?'rgba(245,158,11,.04)':'transparent'}}>
                        <Td bold>{r.fornitore}</Td>
                        <Td><Badge text={r.cat}/></Td>
                        <Td><span style={{fontFamily:'monospace',fontSize:11}}>{r.num}</span></Td>
                        <Td nowrap>
                          <span style={{color:scaduta?T.red:inScadenza?'#d97706':T.text,fontWeight:scaduta||inScadenza?700:400}}>
                            {fmtDate(r.scadenza)}{scaduta?' ⚠':''}
                          </span>
                        </Td>
                        <Td right bold color={T.red}>{fmt(r.importo)}</Td>
                        <Td><Badge text={r.stato}/></Td>
                        <Td color={T.textL}>{r.note||'—'}</Td>
                      </tr>
                    );
                  })}
                </Table>
            }
          </Card>
        );
      })()}

      {/* ── Layout principale: lista + dettaglio ── */}
      <div style={{display:'grid',gridTemplateColumns:sel?'280px 1fr':'1fr',gap:18}}>
        <Card style={{padding:0,height:'fit-content'}}>
          {/* Intestazione con indicatore filtro attivo */}
          <div style={{padding:'10px 14px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:'#f8fafc',borderRadius:'8px 8px 0 0'}}>
            <span style={{fontWeight:700,fontSize:13}}>
              {kpiFilter==='utenze'?'⚡ Utenze':kpiFilter==='fornMat'?'🏗 Mat./Servizi':'Tutti i fornitori'}
              <span style={{fontWeight:400,color:T.textL,marginLeft:6}}>({filteredFornitoriList.length})</span>
            </span>
            {kpiFilter&&<Btn variant='ghost' size='sm' onClick={()=>{setKpiFilter(null);setSel(null);}}>Mostra tutti</Btn>}
          </div>
          {filteredFornitoriList.map(f=>(
            <div key={f.id} onClick={()=>setSel(sel?.id===f.id?null:f)}
              style={{padding:'12px 16px',cursor:'pointer',borderBottom:`1px solid ${T.border}`,background:sel?.id===f.id?T.blueL:'transparent'}}
              onMouseEnter={e=>sel?.id!==f.id&&(e.currentTarget.style.background='#f8fafc')}
              onMouseLeave={e=>sel?.id!==f.id&&(e.currentTarget.style.background='transparent')}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{f.nome}</div>
                  <div style={{fontSize:11,color:T.textL}}>{f.cat} · scad. {fmtDate(f.nextSc)}</div>
                </div>
                <div style={{fontWeight:700,color:f.aperto>0?T.red:T.textL,fontSize:13}}>{fmt(f.aperto)}</div>
              </div>
            </div>
          ))}
        </Card>

        {sel&&<Card>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
            <h3 style={{fontWeight:700}}>{sel.nome} <Badge text={sel.cat}/></h3>
            <Btn onClick={()=>setSel(null)} variant='outline' size='sm'>✕</Btn>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
            <div style={{background:'#f8fafc',borderRadius:8,padding:12,textAlign:'center'}}>
              <div style={{fontSize:11,color:T.textL}}>Fatturato totale</div>
              <div style={{fontWeight:700,fontSize:18}}>{fmt(sel.fatturato)}</div>
            </div>
            <div style={{background:'#f8fafc',borderRadius:8,padding:12,textAlign:'center'}}>
              <div style={{fontSize:11,color:T.textL}}>Pagato</div>
              <div style={{fontWeight:700,fontSize:18,color:T.green}}>{fmt(sel.pagato)}</div>
            </div>
            <div style={{background:T.redL,borderRadius:8,padding:12,textAlign:'center'}}>
              <div style={{fontSize:11,color:T.textL}}>Aperto</div>
              <div style={{fontWeight:700,fontSize:18,color:T.red}}>{fmt(sel.aperto)}</div>
            </div>
            <div style={{background:'#f8fafc',borderRadius:8,padding:12,textAlign:'center'}}>
              <div style={{fontSize:11,color:T.textL}}>Note</div>
              <div style={{fontWeight:600,fontSize:12}}>{sel.note}</div>
            </div>
          </div>
