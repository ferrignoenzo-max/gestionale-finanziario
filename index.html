/* ─── MODALS SYSTEM ──────────────────────────────────────── */
const ModalContent = ({type,data,onClose})=>{
  if(!type) return null;

  // Helper header ordinabile
  const ThSort = ({label,k,sortK,setSortK,dir,setDir,right})=>{
    const active = sortK===k;
    return (
      <th onClick={()=>{ if(active) setDir(dir==='asc'?'desc':'asc'); else { setSortK(k); setDir('asc'); } }}
        style={{padding:'8px 10px',cursor:'pointer',userSelect:'none',textAlign:right?'right':'left',color:active?T.blue:T.textL,fontWeight:active?700:600,fontSize:11,letterSpacing:.3,textTransform:'uppercase',borderBottom:`1px solid ${T.border}`,whiteSpace:'nowrap'}}>
        {label}{active?(dir==='asc'?' ▲':' ▼'):''}
      </th>
    );
  };
  const sortFatt = (lista,k,dir)=>{
    const m = dir==='asc'?1:-1;
    const cmp = (a,b)=>{
      let va,vb;
      if(k==='num'||k==='cliente'||k==='fornitore'||k==='stato') { va=String(a[k]||'').toLowerCase(); vb=String(b[k]||'').toLowerCase(); return va<vb?-m:va>vb?m:0; }
      if(k==='commessa') { va=(a.commessaCodice||'').toLowerCase(); vb=(b.commessaCodice||'').toLowerCase(); return va<vb?-m:va>vb?m:0; }
      if(k==='scadenza'||k==='data') { va=a[k]||''; vb=b[k]||''; return va<vb?-m:va>vb?m:0; }
      // numerici
      va=a[k]||0; vb=b[k]||0; return (va-vb)*m;
    };
    return [...lista].sort(cmp);
  };

  const ModalDA = ()=>{
    const [fCli,setFCli]=useState('');
    const [fComm,setFComm]=useState('');
    const [fStato,setFStato]=useState('');
    const [sortK,setSortK]=useState('scadenza');

    const statoOpt=[...new Set(D.fattureAttive.map(f=>f.stato))].filter(Boolean).sort();

    const lista = sortFatt(D.fattureAttive.filter(f=>{
      if(fCli  && f.cliente!==fCli) return false;
      if(fComm && (f.commessaCodice||'')!==fComm) return false;
      if(fStato&& f.stato!==fStato) return false;
      return true;
    }), sortK, dir);

    const totFiltLordo = lista.reduce((a,f)=>a+(f.lordo||0),0);
    const totFiltNetto = lista.reduce((a,f)=>a+(f.netto||0),0);

  return map[type]||null;

/* ─── AI ASSISTANT ───────────────────────────────────────── */
const AIPanel = ({onClose})=>{
  const [apiKey,setApiKey]=useState(typeof localStorage!=='undefined'?localStorage.getItem('gemini_key')||'':'');
  const [model,setModel]=useState(typeof localStorage!=='undefined'?localStorage.getItem('gemini_model')||'gemini-2.5-flash':'gemini-2.5-flash');
  const [showSettings,setShowSettings]=useState(!apiKey);
  const [tempKey,setTempKey]=useState(apiKey);
  const [msgs,setMsgs]=useState([
    {role:'ai',text: apiKey
      ? 'Ciao! Sono collegato a Gemini Flash e ho accesso ai tuoi dati reali (commesse, fatture, regole pagamento, scadenze). Chiedimi qualsiasi cosa.'
      : 'Per usarmi serve una API key Gemini gratuita. Click su ⚙ Impostazioni in alto.'}
  ]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const endRef=useRef(null);

  const saveKey = ()=>{
    const k = tempKey.trim();
    if(!k) return alert('Inserisci una API key valida');
    localStorage.setItem('gemini_key', k);
    setApiKey(k);
    setShowSettings(false);
    setMsgs(m=>[...m,{role:'ai',text:'✅ API key salvata. Ora chiedimi qualsiasi cosa sui tuoi dati!'}]);
  };

  // Costruisce contesto compatto da inviare a Gemini
  const buildContext = (q)=>{
    const ql = q.toLowerCase();
    // Estrai eventuale codice commessa dalla query
    const codiceMatch = q.match(/\b(BX\d{3}|BMP\d{3}|BXL\d{3}|BL\d{3}|SLA\d{3}\/\d+|SLM\d{3}N?\/\d+|XSP\d{3}\/\d+|\d{5}N?|\d{3}|MARYAH|REFIT\w*)\b/i);
    const codice = codiceMatch ? codiceMatch[1].toUpperCase() : null;

    const commesseSummary = D.commesse.map(c=>({
      codice: c.codice, nome: c.nome, cliente: c.cliente,
      tipo: c.tipoLavoro, stato: c.stato, importo: c.importoContrattuale,
      nrOrdine: c.nrOrdine,
    }));
    const ctx = {
      data_oggi: new Date().toISOString().slice(0,10),
      kpi: {
        commesseAttive: D.commesse.filter(c=>c.stato==='Attiva').length,
        totFatturatoYTD: D.fattureAttive.filter(f=>f.data&&f.data.startsWith(new Date().getFullYear().toString())).reduce((a,f)=>a+(f.lordo||0),0),
        daIncassareNetto: KPI.daIncassareNettoAperte,
        daPagareNetto: KPI.daPagareNetto,
      },
      commesse_riepilogo: commesseSummary.slice(0, 60),
    };
    // Se c'è un codice specifico, includi dettaglio commessa + fatture
    if(codice) {
      const c = D.commesse.find(c=>c.codice && c.codice.toUpperCase().replace(/\s+/g,'')===codice.replace(/\s+/g,''));
      if(c) {
        const fatt = D.fattureAttive.filter(f=>f.commessa===c.id);
        ctx.commessa_dettaglio = {
          ...c, contratto: c.contratto?{name:c.contratto.name}:null, // omit url/base64
        };
        ctx.fatture_commessa = fatt.map(f=>({
          num:f.num, data:f.data, scadenza:f.scadenza, oggetto:f.oggetto,
          imponibile:f.imponibile, lordo:f.lordo, garanzia:f.garanzia, netto:f.netto,
          stato:f.stato, tipoRif:f.tipoRif, commessaCodice:f.commessaCodice,
        }));
      }
    }
    return ctx;
  };

  const callGemini = async (q)=>{
    const ctx = buildContext(q);
    const sys = `Sei l'assistente finanziario del gestionale Effevi Srl (cantieri navali).
Rispondi in ITALIANO, conciso, professionale. Usa euro (€) e percentuali.
Hai accesso ai dati reali in CONTEXT. Se manca info, dillo onestamente.
Per importi grossi usa formato europeo (770.000 €).
Se la domanda è su una commessa specifica, hai i dettagli completi nel CONTEXT.

CONTEXT JSON:
${JSON.stringify(ctx, null, 1).slice(0, 30000)}`;

    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const body = { contents:[{ parts:[{text: sys + '\n\nDOMANDA UTENTE:\n' + q}] }] };
    try {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await r.json();
      if(!r.ok) {
        const msg = data?.error?.message || r.statusText;
        if(/quota|rate|limit/i.test(msg)) {
          return `❌ Quota esaurita per modello "${model}".\n\nProva:\n• Aspetta 60 secondi (rate limit per minuto)\n• Oppure cambia modello in ⚙ Impostazioni → "gemini-2.5-flash-lite" o "gemini-flash-latest" hanno quota più alta.\n\nDettaglio: ${msg.slice(0,200)}`;
        }
        return `❌ Errore Gemini: ${msg}`;
      }
      return data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Nessuna risposta.';
    } catch(err) { return `❌ Errore di rete: ${err.message}`; }
  };

  const send = async ()=>{
    if(!input.trim()) return;
    if(!apiKey) return setShowSettings(true);
    const q=input;
    setInput(''); setBusy(true);
    setMsgs(m=>[...m,{role:'user',text:q},{role:'ai',text:'⏳ Sto pensando con Gemini Flash...'}]);
    const answer = await callGemini(q);
    setMsgs(m=>[...m.slice(0,-1),{role:'ai',text:answer}]);
    setBusy(false);
    setTimeout(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),50);
  };

  const quick=['Quante commesse attive?','Riepilogo BX107','Quanto devo incassare?','Commessa con più extra?','Fatture scadute più vecchie','Avanzamento SAL BX107'];

  return (
    <div style={{position:'fixed',right:0,top:0,bottom:0,width:380,background:T.white,boxShadow:'-4px 0 20px rgba(0,0,0,.12)',display:'flex',flexDirection:'column',zIndex:500}}>
      <div style={{padding:'14px 16px',background:T.sidebar,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{color:'#fff',fontWeight:700,fontSize:14}}>🤖 AI Operativo · Gemini Flash</div><div style={{color:T.sidebarTxt,fontSize:11}}>{apiKey?'✓ Connesso · 1500 query/giorno gratis':'⚠ API key non impostata'}</div></div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setShowSettings(s=>!s)} title="Impostazioni" style={{background:'none',border:'none',color:T.sidebarTxt,fontSize:14,cursor:'pointer'}}>⚙</button>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.sidebarTxt,fontSize:18,cursor:'pointer'}}>✕</button>
        </div>
      </div>
      {showSettings && (
        <div style={{padding:14,background:'#fffbeb',borderBottom:`1px solid #fde68a`,fontSize:12,color:'#92400e'}}>
          <div style={{fontWeight:700,marginBottom:6}}>🔑 API Key Gemini (gratuita)</div>
          <div style={{fontSize:11,marginBottom:8}}>
            1. Vai su <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style={{color:T.blue,fontWeight:600}}>aistudio.google.com/apikey</a><br/>
            2. Login con account Google → <b>"Create API key"</b><br/>
            3. Copia e incolla qui sotto (salvata solo nel browser, mai sul server)
          </div>
          <input type="password" value={tempKey} onChange={e=>setTempKey(e.target.value)} placeholder="AIzaSy..."
            style={{width:'100%',border:`1px solid #fbbf24`,borderRadius:5,padding:'6px 8px',fontSize:12,fontFamily:'monospace',marginBottom:6,boxSizing:'border-box'}}/>
          <div style={{fontSize:11,fontWeight:700,marginTop:6,marginBottom:4}}>Modello (cambia se hai problemi quota):</div>
          <select value={model} onChange={e=>{setModel(e.target.value); localStorage.setItem('gemini_model',e.target.value);}}
            style={{width:'100%',border:`1px solid #fbbf24`,borderRadius:5,padding:'5px 8px',fontSize:11,marginBottom:8,boxSizing:'border-box',background:'#fff'}}>
            <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (free 250/giorno · veloce)</option>
            <option value="gemini-2.5-flash">gemini-2.5-flash (più potente, free 250/giorno)</option>
            <option value="gemini-flash-latest">gemini-flash-latest (auto)</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash (free ridotto)</option>
            <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp (sperimentale)</option>
          </select>
          <div style={{display:'flex',gap:6}}>
            <button onClick={saveKey} style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:5,padding:'6px',fontSize:11,cursor:'pointer',fontWeight:600}}>💾 Salva</button>
            {apiKey && <button onClick={()=>{localStorage.removeItem('gemini_key');setApiKey('');setTempKey('');setShowSettings(true);}} style={{background:'#fff',color:T.red,border:`1px solid ${T.red}`,borderRadius:5,padding:'6px 12px',fontSize:11,cursor:'pointer'}}>Rimuovi</button>}
          </div>
        </div>
      )}
      <div style={{flex:1,overflowY:'auto',padding:14,display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            <div style={{maxWidth:'85%',padding:'10px 13px',borderRadius:m.role==='user'?'12px 12px 2px 12px':'12px 12px 12px 2px',background:m.role==='user'?T.blue:'#f1f5f9',color:m.role==='user'?'#fff':T.text,fontSize:12,lineHeight:1.6,whiteSpace:'pre-wrap'}}>
              {m.text}
            </div>
          </div>
        ))}
        <div ref={endRef}/>
      </div>
      <div style={{padding:'8px 12px',borderTop:`1px solid ${T.border}`,display:'flex',gap:6,flexWrap:'wrap'}}>
        {quick.map((q,i)=>(
          <button key={i} onClick={()=>{setInput(q);}} style={{background:'#f1f5f9',border:`1px solid ${T.border}`,borderRadius:16,padding:'3px 10px',fontSize:10,cursor:'pointer',color:T.text}}>{q}</button>
        ))}
      </div>
      <div style={{padding:'10px 12px',borderTop:`1px solid ${T.border}`,display:'flex',gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>!busy&&e.key==='Enter'&&send()} placeholder={apiKey?'Fai una domanda...':'Imposta API key (⚙)'}
          disabled={busy} style={{flex:1,border:`1px solid ${T.border}`,borderRadius:8,padding:'8px 12px',fontSize:13,opacity:busy?.6:1}}/>
        <button onClick={send} disabled={busy||!apiKey}
          style={{background:busy||!apiKey?T.textL:T.blue,color:'#fff',border:'none',borderRadius:8,padding:'8px 14px',cursor:busy||!apiKey?'not-allowed':'pointer',fontSize:13,fontWeight:600}}>{busy?'⏳':'→'}</button>
      </div>
    </div>
  );
};

/* ─── PAGE: GESTIONE SAL ────────────────────────────────── */
const PageSAL = ()=>{
  const [tabSAL,setTabSAL]=useState('attivi');  // 'attivi' | 'passivi'
  const [meseSel,setMeseSel]=useState(new Date().toISOString().slice(0,7));
  const [showForm,setShowForm]=useState(false);
  // Nuovo SAL form
  const [salCommessa,setSalCommessa]=useState('');
  const [salPct,setSalPct]=useState('');
  const [salDesc,setSalDesc]=useState('');
  const mesiNomi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const mesiDisp=(()=>{ const now=new Date(); const arr=[]; for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); const val=d.toISOString().slice(0,7); arr.push({val,label:mesiNomi[d.getMonth()]+' '+d.getFullYear()}); } return arr; })();

  // SAL già registrati per il mese selezionato (attivi)
  const meseLabel = mesiDisp.find(m=>m.val===meseSel)?.label||meseSel;
  const salMeseAttivi = D.sal.filter(s=>s.mese&&mesiDisp.find(m=>m.val===meseSel&&s.mese.toLowerCase().includes(m.label.split(' ')[0].toLowerCase())));

  // Tutte le commesse + ordini + extra
  const tuttiLavori = [
    ...D.commesse.filter(c=>c.stato==='Attiva').map(c=>({id:c.id,codice:c.codice,nome:c.nome,tipo:c.tipoLavoro,cliente:c.cliente,contr:c.importoContrattuale,accPerc:c.acconto?c.acconto.perc:null,garPerc:c.garanzia?c.garanzia.perc:null,terminePag:c.terminePag,salEsistente:D.sal.filter(s=>s.commessa===c.id&&s.mese.toLowerCase().includes(meseLabel.split(' ')[0].toLowerCase())).length>0?'compilato':'non compilato'})),
    ...D.extra.filter(e=>e.stato!=='Incompleto').map(e=>({id:e.id,codice:e.codice,nome:e.desc,tipo:'Extra',cliente:e.cliente,contr:e.importo,accPerc:null,garPerc:e.gar?e.gar.perc:null,terminePag:'30gg FM',salEsistente:'non previsto'})),
  ];

  // Passivi: fatture passive per fornitore
  const tuttiPassivi = D.fatturePassive.map(f=>({
    id:f.id,codice:f.num,nome:f.fornitore,tipo:'Passiva',cliente:f.commessa,contr:f.lordo,
    salEsistente: 'compilato', // le fatture passive vengono da FIC
  }));

  // Calcolo automatico SAL da percentuale
  const commessaSel = D.commesse.find(c=>c.id===salCommessa);
  const pctN = parseFloat(salPct)||0;
  const calc = commessaSel && pctN>0 ? (()=>{
    const lordo = Math.round(commessaSel.importoContrattuale * pctN/100);
    const accPerc = commessaSel.acconto?.perc||0;
    const recAcc = Math.round(lordo * accPerc/100);
    const fattEmessa = lordo - recAcc;
    const garPerc = commessaSel.garanzia?.perc||0;
    const garanzia = Math.round(fattEmessa * garPerc/100);
    const netto = fattEmessa - garanzia;
    return {lordo,recAcc,fattEmessa,garanzia,netto,accPerc,garPerc};
  })() : null;

  // StatoBadgeSAL è definito a livello modulo (fuori dal componente)

  return (
    <div style={{padding:24}}>
      {/* Banner importante */}
      <div style={{background:'linear-gradient(135deg,#0c1425,#1e3a5f)',borderRadius:10,padding:16,marginBottom:20,color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>📝 SAL – Solo inserimento manuale</div>
          <div style={{fontSize:12,opacity:.75}}>Il sistema NON suggerisce né inventa SAL automatici. Ogni SAL viene registrato manualmente, mese per mese.</div>
        </div>
        <Btn onClick={()=>setShowForm(true)}>+ Inserisci SAL</Btn>
      </div>

      {/* Filtro mese */}
      <div style={{display:'flex',gap:10,marginBottom:20,alignItems:'center'}}>
        <span style={{fontWeight:600,fontSize:13}}>Mese di controllo:</span>
        {mesiDisp.map(m=>(
          <button key={m.val} onClick={()=>setMeseSel(m.val)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${T.border}`,background:meseSel===m.val?T.blue:'transparent',color:meseSel===m.val?'#fff':T.text,fontSize:12,cursor:'pointer',fontWeight:meseSel===m.val?700:400}}>
            {m.label}
          </button>
        ))}
      </div>

      {/* Tab SAL Attivi / Passivi */}
      <div style={{display:'flex',gap:0,borderBottom:`1px solid ${T.border}`,marginBottom:18}}>
        {[{id:'attivi',label:'SAL Attivi (nostri verso cliente)'},{id:'passivi',label:'SAL Passivi (sub/fornitori verso di noi)'}].map(t=>(
          <div key={t.id} onClick={()=>setTabSAL(t.id)} style={{padding:'8px 20px',cursor:'pointer',borderBottom:tabSAL===t.id?`2px solid ${T.blue}`:'2px solid transparent',color:tabSAL===t.id?T.blue:T.textL,fontWeight:tabSAL===t.id?600:400,marginBottom:-1,fontSize:13}}>{t.label}</div>
        ))}
      </div>

      {/* SAL ATTIVI */}
      {tabSAL==='attivi'&&(
        <div>
          {/* Riepilogo stato mese */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:18}}>
            <KPICard label="Compilati" value={tuttiLavori.filter(l=>l.salEsistente==='compilato').length} color={T.green} />
            <KPICard label="Mancanti" value={tuttiLavori.filter(l=>l.salEsistente==='non compilato').length} color={T.red} alert={tuttiLavori.filter(l=>l.salEsistente==='non compilato').length>0} />
            <KPICard label="Non previsti" value={tuttiLavori.filter(l=>l.salEsistente==='non previsto').length} color={T.textL} />
            <KPICard label="Lavori attivi totale" value={tuttiLavori.length} color={T.blue} />
          </div>
          <Card style={{padding:0}}>
            <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:14}}>
              Controllo SAL Attivi – {meseLabel}
            </div>
            <Table headers={[{label:'Tipo'},{label:'Codice'},{label:'Nome'},{label:'Cliente'},{label:'Contratto',right:true},{label:'SAL mese'},{label:'Azioni'}]}>
              {tuttiLavori.map(l=>(
                <tr key={l.id} style={{background:l.salEsistente==='non compilato'?'#fff5f5':l.salEsistente==='compilato'?'#f0fdf4':'transparent'}}>
                  <Td><span style={{fontSize:10,fontWeight:700,color:l.tipo==='Commessa'?T.blue:l.tipo==='Ordine'?T.green:T.purple}}>{l.tipo}</span></Td>
                  <Td bold>{l.codice}</Td>
                  <Td>{l.nome}</Td>
                  <Td>{l.cliente}</Td>
                  <Td right>{fmt(l.contr)}</Td>
                  <Td><StatoBadgeSAL s={l.salEsistente}/></Td>
                  <Td>
                    {l.salEsistente==='non compilato'&&(
                      <Btn size='sm' onClick={()=>{setSalCommessa(l.id);setShowForm(true);}}>+ Inserisci SAL</Btn>
                    )}
                    {l.salEsistente==='compilato'&&(
                      <span style={{fontSize:12,color:T.green}}>✓ Registrato</span>
                    )}
                    {l.salEsistente==='non previsto'&&(
                      <span style={{fontSize:12,color:T.textL}}>Extra – nessun SAL mensile</span>
                    )}
                  </Td>
                </tr>
              ))}
            </Table>
          </Card>

          {/* SAL già registrati nel mese */}
          {D.sal.length>0&&(
            <Card style={{marginTop:16,padding:0}}>
              <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:14}}>SAL Attivi registrati nel sistema</div>
              <Table headers={[{label:'Mese'},{label:'Commessa'},{label:'SAL Lordo',right:true},{label:'Rec. Acconto',right:true},{label:'Fattura emessa',right:true},{label:'Garanzia',right:true},{label:'Netto previsto',right:true},{label:'Stato'}]}>
                {D.sal.map(s=>(
                  <tr key={s.id}>
                    <Td nowrap>{s.mese}</Td>
                    <Td bold><span style={{background:T.blueL,color:T.blue,padding:'2px 6px',borderRadius:4,fontSize:11}}>{s.commessa}</span></Td>
                    <Td right bold>{fmt(s.lordo)}</Td>
                    <Td right color={T.amber}>{s.recAcc>0?fmt(s.recAcc):'—'}</Td>
                    <Td right>{s.fattEmessa?fmt(s.fattEmessa):'—'}</Td>
                    <Td right color={T.amber}>{s.garanzia>0?fmt(s.garanzia):'—'}</Td>
                    <Td right bold color={T.green}>{fmt(s.incassoPrev)}</Td>
                    <Td><Badge text={s.stato}/></Td>
                  </tr>
                ))}
              </Table>
            </Card>
          )}
        </div>
      )}

      {/* SAL PASSIVI */}
      {tabSAL==='passivi'&&(
        <div>
          <Card style={{padding:0}}>
            <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.border}`,fontWeight:700,fontSize:14}}>
              Fatture Passive – {meseLabel} &nbsp;<FicBadge/>
              <span style={{fontSize:11,color:T.textL,fontWeight:400,marginLeft:8}}>Dati da Fatture in Cloud – sola lettura</span>
            </div>
            <Table headers={[{label:'Fornitore'},{label:'Commessa'},{label:'N. Fattura'},{label:'Lordo',right:true},{label:'Garanzia',right:true},{label:'Comp. sub',right:true},{label:'Netto',right:true},{label:'Scadenza'},{label:'Stato'}]}>
              {D.fatturePassive.map(f=>(
                <tr key={f.id}>
                  <Td bold>{f.fornitore}</Td>
                  <Td><span style={{background:T.blueL,color:T.blue,padding:'2px 6px',borderRadius:4,fontSize:11}}>{f.commessaCodice||f.commessa||''}</span></Td>
                  <Td nowrap><span style={{fontFamily:'monospace',fontSize:11}}>{f.num}</span></Td>
                  <Td right>{fmt(f.lordo)}</Td>
                  <Td right color={T.amber}>{fmt(f.garanzia)}</Td>
                  <Td right color={T.blue}>{fmt(f.compSub)}</Td>
                  <Td right bold color={T.red}>{fmt(f.netto)}</Td>
                  <Td nowrap>{fmtDate(f.scadenza)}</Td>
                  <Td><Badge text={f.stato}/></Td>
                </tr>
              ))}
            </Table>
          </Card>
        </div>
      )}

      {/* FORM INSERIMENTO SAL */}
      {showForm&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div style={{background:T.white,borderRadius:12,boxShadow:'0 20px 60px rgba(0,0,0,.2)',width:'100%',maxWidth:600,maxHeight:'90vh',overflow:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',borderBottom:`1px solid ${T.border}`,position:'sticky',top:0,background:T.white}}>
              <span style={{fontWeight:700,fontSize:16}}>📝 Inserisci SAL</span>
              <button onClick={()=>setShowForm(false)} style={{border:'none',background:'none',fontSize:20,cursor:'pointer',color:T.textL}}>✕</button>
            </div>
            <div style={{padding:20}}>
              <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:6,padding:'8px 12px',marginBottom:16,fontSize:12,color:'#92400e'}}>
                ⚠️ I SAL sono esclusivamente ad inserimento <b>manuale</b>. Il sistema calcola i totali, non propone SAL automatici.
              </div>
              <div style={{marginBottom:12}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:T.textL,marginBottom:4}}>Commessa / Ordine</label>
                <select value={salCommessa} onChange={e=>setSalCommessa(e.target.value)} style={{width:'100%',border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 10px',fontSize:13}}>
                  <option value="">— Seleziona —</option>
                  {D.commesse.filter(c=>c.stato==='Attiva').map(c=><option key={c.id} value={c.id}>{c.codice} – {c.nome} ({c.cliente})</option>)}
                </select>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div>
                  <label style={{display:'block',fontSize:12,fontWeight:600,color:T.textL,marginBottom:4}}>Mese di riferimento</label>
                  <select style={{width:'100%',border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 10px',fontSize:13}}>
                    {mesiDisp.map(m=><option key={m.val} value={m.val}>{m.label}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{display:'block',fontSize:12,fontWeight:600,color:T.textL,marginBottom:4}}>% SAL del mese (su contratto)</label>
                  <input type="number" value={salPct} onChange={e=>setSalPct(e.target.value)} placeholder="es. 8.5" min="0" max="100" step="0.1" style={{width:'100%',border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 10px',fontSize:13}}/>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{display:'block',fontSize:12,fontWeight:600,color:T.textL,marginBottom:4}}>Descrizione (opzionale)</label>
                <input type="text" value={salDesc} onChange={e=>setSalDesc(e.target.value)} placeholder="es. SAL marzo – lavorazioni elettriche completate" style={{width:'100%',border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 10px',fontSize:13}}/>
              </div>

              {/* Calcolo automatico */}
              {calc&&(
                <div style={{background:'#f0f7ff',border:`1px solid ${T.blue}30`,borderRadius:10,padding:16,marginTop:4}}>
                  <div style={{fontWeight:700,fontSize:13,color:T.blue,marginBottom:12}}>⚡ Calcolo automatico</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                    <div style={{padding:10,background:T.white,borderRadius:6,border:`1px solid ${T.border}`}}>
                      <div style={{fontSize:10,color:T.textL,marginBottom:2}}>SAL Lordo ({salPct}% di {fmt(commessaSel?.importoContrattuale||0)})</div>
                      <div style={{fontWeight:700,fontSize:16}}>{fmt(calc.lordo)}</div>
                    </div>
                    <div style={{padding:10,background:'#faf5ff',borderRadius:6,border:'1px solid #e9d5ff'}}>
                      <div style={{fontSize:10,color:T.textL,marginBottom:2}}>− Recupero acconto ({calc.accPerc}%)</div>
                      <div style={{fontWeight:700,fontSize:16,color:T.purple}}>{fmt(calc.recAcc)}</div>
                    </div>
                    <div style={{padding:10,background:T.white,borderRadius:6,border:`1px solid ${T.border}`}}>
                      <div style={{fontSize:10,color:T.textL,marginBottom:2}}>= Importo fattura emettibile</div>
                      <div style={{fontWeight:700,fontSize:16,color:T.blue}}>{fmt(calc.fattEmessa)}</div>
                    </div>
                    <div style={{padding:10,background:'#fffbeb',borderRadius:6,border:'1px solid #fde68a'}}>
                      <div style={{fontSize:10,color:T.textL,marginBottom:2}}>− Garanzia ({calc.garPerc}%)</div>
                      <div style={{fontWeight:700,fontSize:16,color:T.amber}}>{fmt(calc.garanzia)}</div>
                    </div>
                    <div style={{padding:10,background:T.greenL,borderRadius:6,border:`1px solid #bbf7d0`,gridColumn:'span 2'}}>
                      <div style={{fontSize:10,color:T.textL,marginBottom:2}}>= Netto previsto da incassare · Scadenza: {commessaSel?.terminePag}</div>
                      <div style={{fontWeight:800,fontSize:20,color:T.green}}>{fmt(calc.netto)}</div>
                    </div>
                  </div>
                  <div style={{marginTop:10,fontSize:11,color:T.textL}}>
                    Formula: Lordo {fmt(calc.lordo)} − Rec.Acc {fmt(calc.recAcc)} = Fattura {fmt(calc.fattEmessa)} − Garanzia {fmt(calc.garanzia)} = Netto {fmt(calc.netto)}
                  </div>
                  {/* Anteprima barre dopo registrazione SAL */}
                  {commessaSel&&(()=>{
                    const newSalAbs = (commessaSel.salProdAttivoTot||0) + calc.lordo;
                    const newAccRes = Math.max(0,(commessaSel.acconto?.residuo||0) - calc.recAcc);
                    const fakeC = {...commessaSel, salProdAttivoTot: newSalAbs, acconto: commessaSel.acconto?{...commessaSel.acconto, residuo: newAccRes}:null };
                    return (
                      <div style={{marginTop:14,padding:12,background:'#f8fafc',borderRadius:8,border:`1px dashed ${T.border}`}}>
                        <div style={{fontSize:11,fontWeight:700,color:T.textL,marginBottom:8}}>📊 Anteprima avanzamento DOPO registrazione SAL</div>
                        <DualProgressBar c={fakeC} showLabels={true} height={8}/>
                      </div>
                    );
                  })()}
                </div>
              )}
              {!commessaSel&&salPct&&<div style={{padding:12,background:'#f1f5f9',borderRadius:6,fontSize:12,color:T.textL}}>Seleziona una commessa per calcolare automaticamente gli importi.</div>}
              {commessaSel&&!salPct&&<div style={{padding:12,background:'#f1f5f9',borderRadius:6,fontSize:12,color:T.textL}}>Inserisci la % SAL del mese per calcolare automaticamente importi, acconto e garanzia.</div>}

              <div style={{display:'flex',justifyContent:'space-between',marginTop:20}}>
                <Btn onClick={()=>setShowForm(false)} variant='outline'>Annulla</Btn>
                <Btn onClick={()=>setShowForm(false)}>✓ Registra SAL</Btn>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

    email:'e.ferrigno@effevisrl.it',
    web:'www.effevisrl.it',
  };

  // Esporta commessa completa come JSON
  const esportaCommessa = (commessaId,formato)=>{
    const c = D.commesse.find(x=>x.id===commessaId);
    if(!c) return;
    const payload = {
      commessa: c,
      cliente: D.anagrafica.find(a=>a.nome===c.cliente)||null,
      fattureAttive: D.fattureAttive.filter(f=>f.commessa===c.codice||f.commessa===c.id),
      fatturePassive: D.fatturePassive.filter(f=>f.commessa===c.codice||f.commessa===c.id),
      extra: D.extra.filter(e=>e.commessaMadre===c.id||e.commessaMadre===c.codice),
      compensazioni: D.compensazioni.filter(k=>k.commessa===c.codice||k.commessa===c.id),
      garanzie: D.garanzie.filter(g=>g.commessa===c.codice||g.commessa===c.id),
      acconti: D.acconti.filter(a=>a.commessa===c.codice||a.commessa===c.id),
      noteCredito: D.noteCredito.filter(n=>n.commessa===c.codice||n.commessa===c.id),
      scadenziario: D.scadenziario.filter(s=>s.commessa===c.codice||s.commessa===c.id),
      auditLog: D.auditLog.filter(l=>l.oggetto&&(l.oggetto.includes(c.codice)||l.oggetto.includes(c.id))),
      esportato: new Date().toISOString(),
      da: EFFEVI,
    };
    if(formato==='json'){
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`commessa-${c.codice}-export.json`;a.click();
      URL.revokeObjectURL(url);
    } else if(formato==='csv'){
      // Genera CSV semplice con i dati principali
      let csv='COMMESSA EXPORT – '+c.codice+' – '+EFFEVI.nome+'\n\n';
      csv+='=== DATI BASE ===\n';
      csv+=`Codice,${c.codice}\nNome,${c.nome}\nCliente,${c.cliente}\nTipo,${c.tipoLavoro}\nImporto contrattuale,${c.importoContrattuale}\nStato,${c.stato}\nData inizio,${c.dataInizio||''}\nData fine,${c.dataFine||''}\n\n`;
      csv+='=== FATTURE ATTIVE ===\nNumero,Cliente,Commessa,Data,Lordo,Garanzia,Netto,Stato\n';
      payload.fattureAttive.forEach(f=>csv+=`${f.num},${f.cliente},${f.commessaCodice||f.commessa||''},${f.data||''},${f.lordo},${f.garanzia||0},${f.netto},${f.stato}\n`);
      csv+='\n=== FATTURE PASSIVE ===\nNumero,Fornitore,Commessa,Data,Lordo,Garanzia,Netto,Stato\n';
      payload.fatturePassive.forEach(f=>csv+=`${f.num},${f.fornitore||''},${f.commessaCodice||f.commessa||''},${f.data||''},${f.lordo},${f.garanzia||0},${f.netto||0},${f.stato}\n`);
      csv+='\n=== SCADENZARIO ===\nData,Tipo,Controparte,Importo,Stato,Regola\n';
      payload.scadenziario.forEach(s=>csv+=`${s.data},${s.tipo},${s.cp},${s.importo},${s.stato},${s.regola||''}\n`);
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`commessa-${c.codice}-export.csv`;a.click();
      URL.revokeObjectURL(url);
    }

    {id:'compensazioni',label:'Compensazioni',desc:'Storico operazioni di compensazione'},
    {id:'garanzieAcc',label:'Garanzie & Acconti',desc:'Posizione garanzie e acconti residui'},
    {id:'primaNota',label:'Prima Nota',desc:'Registro entrate/uscite'},
    {id:'banca',label:'Riconciliazione Bancaria',desc:'Movimenti e stato riconciliazione'},
    {id:'exportCommessa',label:'Export Commessa completa',desc:'Esporta tutto lo storico di una commessa'},
  ];

  return (

        </Card>

        {/* Right panel: report preview */}
        <div>
          {/* Header Effevi */}
          <Card style={{marginBottom:12,borderTop:`4px solid ${T.blue}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:800,fontSize:18,color:T.blue,marginBottom:2}}>{EFFEVI.nome}</div>
                <div style={{fontSize:12,color:T.textL}}>{EFFEVI.ind}</div>
                <div style={{fontSize:12,color:T.textL}}>{EFFEVI.piva}</div>

              <div style={{textAlign:'right'}}>

              </div>
            </div>
          </Card>

          {/* Report content */}
          {selReport==='riepilogo'&&(
            <Card>
              <SectionTitle children="Riepilogo KPI Globali"/>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>

          let modeAttive=false, modePassive=false;
          data.forEach((row)=>{
            const rowStr=row.join(' ').toLowerCase();
            if(rowStr.includes('fatture emesse')||rowStr.includes('fattura emessa')){modeAttive=true;modePassive=false;return;}
            if(rowStr.includes('fatture ricevute')||rowStr.includes('fattura ricevuta')){modePassive=true;modeAttive=false;return;}
            if(row.every(c=>!c)) {modeAttive=false;modePassive=false;return;}
            const num=String(row[0]||'').trim();
            if(!num||num.toLowerCase()==='numero'||num.toLowerCase()==='num') return;
            const dt=String(row[1]||'').trim();

            });

        } else {
          setPreview(null);

        }

  const tipoLabel={fattureAttive:'Fatture Attive',fatturePassive:'Fatture Passive'};

  return (
    <div style={{padding:24,maxWidth:1100}}>
      <Card style={{marginBottom:20}}>

        madre_id: c.madreId, autonomo: c.autonomo,
        acconto: c.acconto, garanzia: c.garanzia,
        comp_enabled: c.compEnabled,
        regole_pagamento: c.regolePagamento||null,
        documenti: c.documenti||[],
      };
      await fetch(`${SB_URL}/rest/v1/commesse`,{
        method:'POST', headers: SB_H_WRITE, body: JSON.stringify(payload),
      });
    } catch(err) {
      console.warn('Commessa salvata solo in sessione (tabella commesse non ancora disponibile):', err.message);
    }
  },[bumpData]);

  /* CRUD Template Regole Pagamento */
  const addTemplate = useCallback(async (tpl)=>{
    const tmpId = `tmp-${Date.now()}`;
    const item = { ...tpl, id: tmpId };
    D.templateRegole.push(item);
    bumpData();
    try {
      const r = await fetch(`${SB_URL}/rest/v1/template_regole_pagamento`, {
        method:'POST', headers:{...SB_H_WRITE, Prefer:'return=representation'},
        body: JSON.stringify({ nome:tpl.nome, cliente_default:tpl.clienteDefault||null, descrizione:tpl.descrizione||null, regole_pagamento:tpl.regolePagamento }),
      });
      if(r.ok){ const [saved] = await r.json(); item.id = saved.id; bumpData(); }
    } catch(err){ console.warn('Template solo in sessione:', err.message); }
  },[bumpData]);
  const deleteTemplate = useCallback(async (id)=>{
    D.templateRegole = D.templateRegole.filter(t=>t.id!==id);
    bumpData();
    try {
      await fetch(`${SB_URL}/rest/v1/template_regole_pagamento?id=eq.${id}`, { method:'DELETE', headers:SB_H_WRITE });
    } catch(err){ console.warn('Delete template solo in sessione:', err.message); }
  },[bumpData]);

  /* CRUD Modalità Pagamento */
  const addMP = useCallback(async (mp)=>{
    const tmpId = `tmp-${Date.now()}`;
    const item = { ...mp, id: tmpId };
    D.modalitaPagamento.push(item);
    bumpData();
    try {
      const r = await fetch(`${SB_URL}/rest/v1/modalita_pagamento`, {
        method:'POST', headers:{...SB_H_WRITE, Prefer:'return=representation'},
        body: JSON.stringify({ nome:mp.nome, strumento:mp.strumento, giorni:mp.giorni, riferimento:mp.riferimento, giorni_extra:mp.giorniExtra, note:mp.note||null }),
      });
      if(r.ok){ const [saved] = await r.json(); item.id = saved.id; bumpData(); }
    } catch(err){ console.warn('MP solo in sessione:', err.message); }
  },[bumpData]);
  const updateMP = useCallback(async (id, patch)=>{
    const i = D.modalitaPagamento.findIndex(m=>m.id===id);
    if(i<0) return;
    Object.assign(D.modalitaPagamento[i], patch);
    bumpData();
    try {
      await fetch(`${SB_URL}/rest/v1/modalita_pagamento?id=eq.${id}`, {
        method:'PATCH', headers:SB_H_WRITE,
        body: JSON.stringify({ nome:patch.nome, strumento:patch.strumento, giorni:patch.giorni, riferimento:patch.riferimento, giorni_extra:patch.giorniExtra, note:patch.note||null }),
      });
    } catch(err){ console.warn('Update MP solo in sessione:', err.message); }
  },[bumpData]);
  const deleteMP = useCallback(async (id)=>{
    D.modalitaPagamento = D.modalitaPagamento.filter(m=>m.id!==id);
    bumpData();
    try {
      await fetch(`${SB_URL}/rest/v1/modalita_pagamento?id=eq.${id}`, { method:'DELETE', headers:SB_H_WRITE });
    } catch(err){ console.warn('Delete MP solo in sessione:', err.message); }
  },[bumpData]);

  /* Aggiorna una commessa esistente: merge campi + persistenza su Supabase via PATCH */
  const updateCommessa = useCallback(async (id, patch)=>{
    const i = D.commesse.findIndex(c=>c.id===id);
    if(i<0) return;
    Object.assign(D.commesse[i], patch);
    linkFatture();
    ricalcolaKPI();
    bumpData();
    try {
      const c = D.commesse[i];
      const payload = {
        codice: c.codice, nome: c.nome, cliente: c.cliente,
        nr_ordine: c.nrOrdine||null,
        tipo_lavoro: c.tipoLavoro, importo_contrattuale: c.importoContrattuale,
        stato: c.stato, data_inizio: c.dataInizio, data_fine: c.dataFine,
        fatt_mode: c.fattMode, pag_mode: c.pagMode,
        madre_id: c.madreId, autonomo: c.autonomo,
        acconto: c.acconto, garanzia: c.garanzia,
        comp_enabled: c.compEnabled,
        regole_pagamento: c.regolePagamento||null,
        documenti: c.documenti||[],
      };
      await fetch(`${SB_URL}/rest/v1/commesse?id=eq.${id}`, {
        method:'PATCH', headers: SB_H_WRITE, body: JSON.stringify(payload),
      });
    } catch(err) {
      console.warn('Update commessa solo in sessione:', err.message);
    }
  },[bumpData]);

  const handleReset = ()=>{
    D.commesse.splice(D_DEMO_COMMESSE_LEN);
    D.anagrafica.splice(D_DEMO_ANAGRAFICA_LEN);
    window._regoleCustom=window._regoleCustom?.slice(0,2)||[];
    setPage('dashboard');
    setResetKey(k=>k+1);
  };

  const crumbs = BREAD[page]||[{label:TITLES[page]||page}];
  const contentStyle={flex:1,overflowY:'auto',background:T.bg,display:'flex',flexDirection:'column'};

  return (
    <div key={resetKey} style={{display:'flex',height:'100vh',overflow:'hidden',background:T.bg,fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif'}}>
      <Sidebar page={page} onNav={navigate} onSearch={()=>setSearchOpen(true)}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',marginRight:aiOpen?380:0,transition:'margin-right .2s'}}>
        <Header page={page} onAI={()=>setAiOpen(a=>!a)} selectedCommessa={page==='dettaglioCommessa'?selCommessa:null}/>
        <Breadcrumb items={crumbs} onNav={navigate}/>
        <div style={contentStyle}>
          {dbLoading&&<div style={{position:'fixed',inset:0,background:'rgba(255,255,255,.85)',zIndex:999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
  <div style={{width:40,height:40,border:'4px solid #e2e8f0',borderTop:'4px solid #2563eb',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
  <div style={{fontSize:14,color:'#64748b'}}>Caricamento dati da Supabase...</div>
  <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
</div>}
        {page==='dashboard'&&<PageDashboard onNav={navigate} openModal={openModal}/>}
          {page==='watchlist'&&<PageWatchlist onNav={navigate} openModal={openModal}/>}
          {page==='dettaglioCommessa'&&<PageDettaglioCommessa commessa={selCommessa} onNav={navigate} openModal={openModal} updateCommessa={updateCommessa} addTemplate={addTemplate} deleteTemplate={deleteTemplate}/>}
          {page==='scadenziario'&&<PageScadenziario openModal={openModal}/>}
          {page==='fattureAttive'&&<PageFattureAttive onNav={navigate} openModal={openModal}/>}
          {page==='fatturePassive'&&<PageFatturePassive openModal={openModal}/>}
          {page==='attiveSub'&&<PageAttiveSub openModal={openModal}/>}
          {page==='storicoComp'&&<PageStoricoComp/>}
          {page==='noteCredito'&&<PageNoteCredito/>}
          {page==='nuovaCommessa'&&<PageNuovaCommessa onNav={navigate} addCommessa={addCommessa}/>}
          {page==='modalitaPagamento'&&<PageModalitaPagamento addMP={addMP} updateMP={updateMP} deleteMP={deleteMP}/>}
          {page==='analisiExtra'&&<PageAnalisiExtra onNav={navigate}/>}
          {page==='sal'&&<PageSAL/>}
          {page==='listaExtra'&&<PageListaExtra onNav={navigate} openModal={openModal}/>}
          {page==='regoleEcon'&&<PageRegoleEcon selected={selExtra}/>}
          {page==='garanzieAcc'&&<PageGaranzieAcconti openModal={openModal}/>}
          {page==='auditLog'&&<PageAuditLog/>}
          {page==='anagrafica'&&<PageAnagrafica onDataChange={bumpData}/>}
          {page==='importa'&&<PageImporta bumpData={bumpData}/>}
          {page==='utenze'&&<PageUtenze/>}
          {page==='fornitori'&&<PageFornitori/>}
          {page==='subappaltatori'&&<PageSubappaltatori onNav={navigate}/>}
          {page==='fornitoriGen'&&<PageFornitoriGen/>}
          {page==='primaNota'&&<PagePrimaNota/>}
          {page==='banca'&&<PageBanca/>}
          {page==='report'&&<PageReport onReset={handleReset}/>}
        </div>
      </div>
      {aiOpen&&<AIPanel onClose={()=>setAiOpen(false)}/>}
      {modal&&<ModalContent type={modal.type} data={modal.data} onClose={closeModal}/>}
      {searchOpen&&<GlobalSearch onNav={navigate} onClose={()=>setSearchOpen(false)}/>}
    </div>
  );
};

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
